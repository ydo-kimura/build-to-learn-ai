<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" role="img" aria-label="SVM maximum margin boundary">
  <rect width="640" height="360" rx="12" fill="#f8fafc"/>
  <text x="170" y="32" font-family="system-ui,sans-serif" font-size="16" fill="#1e293b" font-weight="700">SVM: widest margin boundary</text>
  <!-- Red points -->
  <circle cx="120" cy="100" r="10" fill="#ef4444"/>
  <circle cx="160" cy="140" r="10" fill="#ef4444"/>
  <circle cx="100" cy="180" r="10" fill="#ef4444"/>
  <circle cx="180" cy="220" r="10" fill="#ef4444"/>
  <circle cx="140" cy="260" r="10" fill="#ef4444"/>
  <!-- Blue points -->
  <circle cx="480" cy="90" r="10" fill="#3b82f6"/>
  <circle cx="520" cy="130" r="10" fill="#3b82f6"/>
  <circle cx="460" cy="170" r="10" fill="#3b82f6"/>
  <circle cx="500" cy="210" r="10" fill="#3b82f6"/>
  <circle cx="540" cy="250" r="10" fill="#3b82f6"/>
  <!-- Support vectors -->
  <circle cx="180" cy="220" r="16" fill="none" stroke="#ef4444" stroke-width="3"/>
  <circle cx="460" cy="170" r="16" fill="none" stroke="#3b82f6" stroke-width="3"/>
  <text x="195" y="250" font-family="system-ui,sans-serif" font-size="10" fill="#b91c1c" font-weight="600">support vector</text>
  <!-- Decision boundary -->
  <line x1="220" y1="60" x2="420" y2="300" stroke="#1e293b" stroke-width="3"/>
  <!-- Margin lines -->
  <line x1="190" y1="50" x2="390" y2="290" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="6 4"/>
  <line x1="250" y1="70" x2="450" y2="310" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="6 4"/>
  <rect x="300" y="140" width="80" height="30" rx="4" fill="#ecfdf5" stroke="#6ee7b7"/>
  <text x="340" y="160" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#047857" font-weight="600">margin</text>
  <rect x="40" y="300" width="560" height="44" rx="8" fill="#fff" stroke="#e2e8f0"/>
  <text x="320" y="328" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#475569">Maximize distance to nearest points on each side</text>
</svg>
