<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">LoRAとQLoRA</title>
  <desc id="desc">凍結したベースモデルに小さな学習可能な低ランクアダプターを追加して適応する。</desc>
  <rect width="1200" height="630" fill="#3b0764"/>
  <text x="70" y="120" fill="#e9d5ff" font-family="sans-serif" font-size="48" font-weight="700">LoRA / QLoRA</text>
  <text x="70" y="185" fill="#fff" font-family="sans-serif" font-size="32">凍結したベースモデル ＋ 小さなアダプター</text>
  <rect x="100" y="285" width="360" height="150" rx="24" fill="#a78bfa"/><text x="170" y="375" fill="#2e1065" font-family="sans-serif" font-size="34">ベースモデル W</text>
  <rect x="650" y="255" width="360" height="90" rx="20" fill="#34d399"/><text x="735" y="313" fill="#064e3b" font-family="sans-serif" font-size="30">アダプター B × A</text>
  <rect x="650" y="370" width="360" height="90" rx="20" fill="#fbbf24"/><text x="735" y="428" fill="#451a03" font-family="sans-serif" font-size="30">量子化 W（QLoRA）</text>
  <path d="M470 360h145" stroke="#f9a8d4" stroke-width="10"/><path d="m595 335 35 25-35 25" fill="none" stroke="#f9a8d4" stroke-width="10"/>
</svg>
