<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 380" role="img" aria-label="Code agent loop">
  <rect width="700" height="380" rx="12" fill="#f8fafc"/>
  <rect x="24" y="20" width="652" height="56" rx="8" fill="#fff" stroke="#3b82f6" stroke-width="2"/>
  <text x="350" y="54" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-size="20" fill="#3b82f6" font-weight="700">Code agent loop</text>
  <rect x="24" y="88" width="652" height="252" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="1.5"/>
  <g transform="translate(90, 108)"><rect x="30" y="40" width="110" height="50" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
<text x="85" y="60" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-size="10" fill="#1d4ed8" font-weight="700">LLM writes</text>
<text x="85" y="78" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-size="10" fill="#64748b">Python code</text>
<line x1="140" y1="65" x2="190" y2="65" stroke="#64748b" stroke-width="2"/><polygon points="190,65 184,62 184,68" fill="#64748b"/>
<rect x="190" y="40" width="110" height="50" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
<text x="245" y="60" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-size="10" fill="#b45309" font-weight="700">Sandbox</text>
<text x="245" y="78" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-size="10" fill="#64748b">execute</text>
<line x1="300" y1="65" x2="350" y2="65" stroke="#64748b" stroke-width="2"/><polygon points="350,65 344,62 344,68" fill="#64748b"/>
<rect x="350" y="45" width="90" height="40" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
<text x="395" y="70" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-size="11" fill="#15803d" font-weight="700">Result</text></g>
  <text x="350" y="352" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-size="12" fill="#64748b">LLM writes code → sandbox runs → return result</text>
</svg>