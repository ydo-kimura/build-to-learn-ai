<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 380" role="img" aria-label="Session memory">
  <rect width="700" height="380" rx="12" fill="#f8fafc"/>
  <rect x="24" y="20" width="652" height="56" rx="8" fill="#fff" stroke="#3b82f6" stroke-width="2"/>
  <text x="350" y="54" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-size="20" fill="#3b82f6" font-weight="700">Session memory</text>
  <rect x="24" y="88" width="652" height="252" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="1.5"/>
  <g transform="translate(90, 108)"><rect x="40" y="20" width="360" height="110" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="1.5"/>
<rect x="55" y="35" width="200" height="28" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
<text x="65" y="54" text-anchor="start" font-family="DejaVu Sans, sans-serif" font-size="10" fill="#1d4ed8">User: Hello</text>
<rect x="180" y="70" width="200" height="28" rx="6" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
<text x="190" y="89" text-anchor="start" font-family="DejaVu Sans, sans-serif" font-size="10" fill="#6d28d9">Bot: Hi there!</text>
<rect x="55" y="105" width="330" height="22" rx="4" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
<text x="65" y="120" text-anchor="start" font-family="DejaVu Sans, sans-serif" font-size="10" fill="#94a3b8">Type a message...</text></g>
  <text x="350" y="352" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-size="12" fill="#64748b">Store past messages; send history each API call</text>
</svg>