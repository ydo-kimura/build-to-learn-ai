<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 380" role="img" aria-label="A policy check feeds an LLM judge, which routes pass and fail results to safe output or fallback"><defs><filter id="s"><feDropShadow dx="0" dy="6" stdDeviation="7" flood-opacity=".1"/></filter><marker id="a" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0 0L8 4L0 8Z" fill="#475569"/></marker></defs><rect width="700" height="380" rx="20" fill="#f8fafc"/><rect x="24" y="20" width="652" height="56" rx="14" fill="#fff" stroke="#7c3aed" stroke-width="2" filter="url(#s)"/><text x="350" y="55" text-anchor="middle" font-family="Arial,sans-serif" font-size="22" fill="#6d28d9" font-weight="700">Defense layers</text><rect x="52" y="96" width="596" height="210" rx="18" fill="#fff" stroke="#ede9fe" stroke-width="2" filter="url(#s)"/><text x="350" y="124" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#64748b">Judge results route to release or safe recovery</text><rect x="70" y="160" width="140" height="66" rx="12" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/><text x="140" y="188" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" fill="#1d4ed8" font-weight="700">Policy</text><text x="140" y="208" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#64748b">allowed behavior</text><path d="M210 193H270" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#a)"/><rect x="270" y="145" width="150" height="96" rx="12" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="2"/><text x="345" y="185" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" fill="#6d28d9" font-weight="700">LLM judge</text><text x="345" y="207" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#64748b">pass / fail</text><path d="M420 193H468V140H500" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#a)"/><text x="448" y="151" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#15803d" font-weight="700">PASS</text><rect x="500" y="110" width="130" height="60" rx="12" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/><text x="565" y="137" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#15803d" font-weight="700">Safe output</text><text x="565" y="155" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#64748b">release</text><path d="M420 193H468V240H500" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#a)"/><text x="478" y="257" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#b91c1c" font-weight="700">FAIL</text><rect x="500" y="210" width="130" height="60" rx="12" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/><text x="565" y="237" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#b91c1c" font-weight="700">Fallback</text><text x="565" y="255" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#64748b">safe recovery</text><text x="350" y="348" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#475569">Policy → judge → pass or fallback</text></svg>
