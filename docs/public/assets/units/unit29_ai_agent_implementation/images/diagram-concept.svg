<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 430" role="img" aria-label="ReAct reasoning and action loop">
  <defs>
    <marker id="arrow" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto"><path d="M0 0L7 3.5L0 7Z" fill="#64748b"/></marker>
    <style>.title{font:700 23px Inter,Arial,sans-serif;fill:#172554}.label{font:700 17px Inter,Arial,sans-serif}.note{font:500 14px Inter,Arial,sans-serif;fill:#475569}.small{font:600 12px Inter,Arial,sans-serif;fill:#64748b}</style>
  </defs>
  <rect width="760" height="430" rx="22" fill="#f8fafc"/><rect x="24" y="22" width="712" height="58" rx="15" fill="#fff" stroke="#2563eb" stroke-width="2"/><text x="380" y="59" text-anchor="middle" class="title">ReAct: reason, act, observe</text>
  <rect x="42" y="104" width="676" height="270" rx="20" fill="#fff" stroke="#dbe4f0" stroke-width="2"/>
  <text x="72" y="137" class="small">ONE DECISION CYCLE</text>
  <rect x="72" y="172" width="160" height="86" rx="16" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/><text x="152" y="207" text-anchor="middle" class="label" fill="#1d4ed8">Thought</text><text x="152" y="232" text-anchor="middle" class="note">reason about next step</text>
  <line x1="232" y1="215" x2="274" y2="215" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="274" y="172" width="160" height="86" rx="16" fill="#fff7ed" stroke="#f97316" stroke-width="2"/><text x="354" y="207" text-anchor="middle" class="label" fill="#c2410c">Action</text><text x="354" y="232" text-anchor="middle" class="note">call a tool</text>
  <line x1="434" y1="215" x2="476" y2="215" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="476" y="172" width="160" height="86" rx="16" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/><text x="556" y="207" text-anchor="middle" class="label" fill="#047857">Observation</text><text x="556" y="232" text-anchor="middle" class="note">read the result</text>
  <path d="M556 258V312H152V258" fill="none" stroke="#64748b" stroke-width="2" stroke-dasharray="7 6" marker-end="url(#arrow)"/><text x="354" y="337" text-anchor="middle" class="small">repeat until the task is complete</text>
  <text x="380" y="405" text-anchor="middle" class="note">The model alternates between thinking and doing, using observations to choose the next action.</text>
</svg>
