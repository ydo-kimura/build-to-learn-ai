<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 430" role="img" aria-label="LangGraph state node edge concepts">
  <defs><marker id="arrow" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto"><path d="M0 0L7 3.5L0 7Z" fill="#64748b"/></marker><style>.title{font:700 23px Inter,Arial,sans-serif;fill:#172554}.label{font:700 16px Inter,Arial,sans-serif}.note{font:500 13px Inter,Arial,sans-serif;fill:#475569}.small{font:600 12px Inter,Arial,sans-serif;fill:#64748b}</style></defs>
  <rect width="760" height="430" rx="22" fill="#f8fafc"/><rect x="24" y="22" width="712" height="58" rx="15" fill="#fff" stroke="#2563eb" stroke-width="2"/><text x="380" y="59" text-anchor="middle" class="title">LangGraph: state + nodes + edges</text>
  <rect x="42" y="104" width="676" height="270" rx="20" fill="#fff" stroke="#dbe4f0" stroke-width="2"/><text x="72" y="137" class="small">A GRAPH IS A CONTROLLED STATE MACHINE</text>
  <rect x="72" y="183" width="166" height="86" rx="16" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/><text x="155" y="217" text-anchor="middle" class="label" fill="#1d4ed8">State</text><text x="155" y="242" text-anchor="middle" class="note">shared ticket data</text>
  <line x1="238" y1="226" x2="290" y2="226" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="290" y="183" width="166" height="86" rx="16" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="2"/><text x="373" y="217" text-anchor="middle" class="label" fill="#6d28d9">Node</text><text x="373" y="242" text-anchor="middle" class="note">read → update state</text>
  <line x1="456" y1="226" x2="508" y2="226" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="508" y="183" width="166" height="86" rx="16" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/><text x="591" y="217" text-anchor="middle" class="label" fill="#047857">Edge</text><text x="591" y="242" text-anchor="middle" class="note">choose next node</text>
  <path d="M591 269V315H155V269" fill="none" stroke="#64748b" stroke-width="2" stroke-dasharray="7 6" marker-end="url(#arrow)"/><text x="373" y="340" text-anchor="middle" class="small">updated state drives the next transition</text>
  <text x="380" y="405" text-anchor="middle" class="note">Explicit state and edges make branching, persistence, and human approval visible.</text>
</svg>
