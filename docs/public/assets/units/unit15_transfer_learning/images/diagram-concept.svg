<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-label="Transfer learning freezes a pretrained backbone and trains a new head">
<defs><marker id="a" markerWidth="4" markerHeight="4" refX="8" refY="4" markerUnits="strokeWidth" viewBox="0 0 8 8" orient="auto"><path d="M0 0L8 4L0 8Z" fill="#64748b"/></marker><style>.t{font:700 24px sans-serif;fill:#fff}.h{font:700 18px sans-serif;fill:#0f172a}.s{font:500 14px sans-serif;fill:#64748b}.f{stroke:#64748b;stroke-width:3;fill:none;marker-end:url(#a)}</style></defs>
<rect width="960" height="540" rx="24" fill="#f8fafc"/><rect x="28" y="24" width="904" height="68" rx="16" fill="#0f172a"/><text x="64" y="67" class="t">Transfer learning: reuse, then adapt</text><text x="896" y="66" text-anchor="end" class="s" fill="#cbd5e1">pretrained knowledge + new labels</text>
<rect x="44" y="122" width="872" height="348" rx="20" fill="#fff" stroke="#e2e8f0" stroke-width="2"/><rect x="90" y="214" width="350" height="126" rx="18" fill="#e2e8f0" stroke="#64748b" stroke-width="3"/><rect x="530" y="214" width="300" height="126" rx="18" fill="#dcfce7" stroke="#22c55e" stroke-width="3"/><path d="M441.5 277H528.5" class="f"/><g text-anchor="middle"><text x="265" y="254" class="h">Pretrained backbone</text><text x="265" y="282" class="s">edges → shapes → features</text><text x="265" y="309" class="s">freeze parameters</text><text x="680" y="254" class="h">New classification head</text><text x="680" y="282" class="s">learn task-specific classes</text><text x="680" y="309" class="s">train parameters</text></g><rect x="182" y="162" width="596" height="34" rx="10" fill="#f1f5f9"/><text x="480" y="185" text-anchor="middle" class="s">Use a large model’s visual vocabulary instead of starting from zero.</text><text x="480" y="414" text-anchor="middle" class="s">Small dataset · shorter training · fewer trainable parameters</text>
</svg>
