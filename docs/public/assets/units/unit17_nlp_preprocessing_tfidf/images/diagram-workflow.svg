<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" role="img" aria-labelledby="title desc">
  <title id="title">TF-IDF combines independent TF and IDF signals</title>
  <desc id="desc">Term frequency from a document and inverse document frequency from the collection flow independently into a TF-IDF score.</desc>
  <defs><marker id="a" markerWidth="4" markerHeight="4" refX="8" refY="4" markerUnits="strokeWidth" viewBox="0 0 8 8" orient="auto"><path d="M0 0L8 4L0 8Z" fill="#64748b"/></marker></defs>
  <rect width="900" height="520" rx="24" fill="#f8fafc"/>
  <rect x="32" y="28" width="836" height="72" rx="16" fill="#fff" stroke="#7c3aed" stroke-width="3"/>
  <text x="64" y="74" font-family="DejaVu Sans,sans-serif" font-size="28" font-weight="700" fill="#2e1065">Why TF-IDF highlights a word</text>
  <text x="838" y="73" text-anchor="end" font-family="DejaVu Sans,sans-serif" font-size="16" fill="#7c3aed">frequency × rarity</text>
  <g font-family="DejaVu Sans,sans-serif">
    <rect x="60" y="145" width="210" height="130" rx="18" fill="#fff" stroke="#3b82f6" stroke-width="2"/>
    <text x="90" y="184" font-size="19" font-weight="700" fill="#1d4ed8">Document A</text>
    <text x="90" y="217" font-size="16" fill="#334155">AI data AI model</text>
    <text x="90" y="251" font-size="15" fill="#64748b">“AI” appears often here</text>
    <rect x="60" y="330" width="210" height="130" rx="18" fill="#fff" stroke="#f59e0b" stroke-width="2"/>
    <text x="90" y="369" font-size="19" font-weight="700" fill="#b45309">Collection</text>
    <text x="90" y="402" font-size="16" fill="#334155">Doc A · Doc B · Doc C</text>
    <text x="90" y="436" font-size="15" fill="#64748b">“AI” is rare across docs</text>
    <rect x="350" y="145" width="190" height="130" rx="18" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
    <text x="445" y="184" text-anchor="middle" font-size="20" font-weight="700" fill="#1d4ed8">TF</text>
    <text x="445" y="219" text-anchor="middle" font-size="16" fill="#334155">term frequency</text>
    <rect x="350" y="330" width="190" height="130" rx="18" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
    <text x="445" y="369" text-anchor="middle" font-size="20" font-weight="700" fill="#b45309">IDF</text>
    <text x="445" y="404" text-anchor="middle" font-size="16" fill="#334155">inverse document</text>
    <text x="445" y="428" text-anchor="middle" font-size="16" fill="#334155">frequency</text>
    <rect x="620" y="217.5" width="220" height="170" rx="18" fill="#fff" stroke="#16a34a" stroke-width="3"/>
    <text x="730" y="257.5" text-anchor="middle" font-size="20" font-weight="700" fill="#15803d">TF-IDF score</text>
    <text x="730" y="298.5" text-anchor="middle" font-size="27" font-weight="700" fill="#166534">TF × IDF</text>
    <rect x="650" y="325.5" width="160" height="38" rx="10" fill="#dcfce7"/>
    <text x="730" y="350.5" text-anchor="middle" font-size="15" font-weight="700" fill="#15803d">important word</text>
    <line x1="270" y1="210" x2="350" y2="210" stroke="#64748b" stroke-width="3" marker-end="url(#a)"/>
    <line x1="270" y1="395" x2="350" y2="395" stroke="#64748b" stroke-width="3" marker-end="url(#a)"/>
    <path d="M540 210H575L620 272.5" fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#a)"/>
    <path d="M540 395H575L620 332.5" fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#a)"/>
    <text x="450" y="496" text-anchor="middle" font-size="16" fill="#854d0e">TF and IDF are independent inputs that merge into one score.</text>
  </g>
</svg>
