<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 590" role="img" aria-labelledby="title desc">
  <title id="title">End-to-end machine learning pipeline</title>
  <desc id="desc">A connected pipeline moves from raw data through cleaning, splitting, training, tuning, and evaluation, with a feedback loop to improve the model.</desc>
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#f8fbff"/><stop offset="1" stop-color="#eef4ff"/></linearGradient><marker id="arrow" markerWidth="8" markerHeight="8" refX="8" refY="4" markerUnits="userSpaceOnUse" viewBox="0 0 8 8" orient="auto"><path d="M0 0L8 4L0 8Z" fill="#64748b"/></marker><filter id="shadow" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#1e3a8a" flood-opacity=".12"/></filter><style>.flow{fill:none;stroke:#64748b;stroke-width:3;marker-end:url(#arrow)}</style></defs>
  <rect width="1200" height="590" rx="28" fill="url(#bg)"/><text x="60" y="68" fill="#0f172a" font-family="Inter,Arial,sans-serif" font-size="36" font-weight="800">From raw data to a trustworthy model</text><text x="60" y="102" fill="#64748b" font-family="Inter,Arial,sans-serif" font-size="20">A repeatable pipeline keeps preprocessing, model selection, and evaluation connected.</text>
  <g filter="url(#shadow)"><rect x="55" y="150" width="1090" height="300" rx="24" fill="#fff"/><rect x="55" y="480" width="1090" height="78" rx="20" fill="#0f3c9e"/></g>
  <g font-family="Inter,Arial,sans-serif"><text x="88" y="190" fill="#1d4ed8" font-size="17" font-weight="800" letter-spacing="2">THE PIPELINE</text>
    <g><rect x="88" y="235" width="145" height="105" rx="18" fill="#eff6ff" stroke="#60a5fa" stroke-width="2"/><circle cx="118" cy="267" r="17" fill="#2563eb"/><text x="118" y="273" text-anchor="middle" fill="#fff" font-size="18" font-weight="800">1</text><text x="148" y="273" fill="#1d4ed8" font-size="22" font-weight="800">LOAD</text><text x="108" y="305" fill="#475569" font-size="17">raw table</text><text x="108" y="327" fill="#475569" font-size="17">features + label</text></g>
    <g><rect x="273" y="235" width="145" height="105" rx="18" fill="#f5f3ff" stroke="#a78bfa" stroke-width="2"/><circle cx="303" cy="267" r="17" fill="#7c3aed"/><text x="303" y="273" text-anchor="middle" fill="#fff" font-size="18" font-weight="800">2</text><text x="332" y="273" fill="#6d28d9" font-size="22" font-weight="800">CLEAN</text><text x="293" y="305" fill="#475569" font-size="17">missing values</text><text x="293" y="327" fill="#475569" font-size="17">scale + encode</text></g>
    <g><rect x="458" y="235" width="145" height="105" rx="18" fill="#fffbeb" stroke="#fbbf24" stroke-width="2"/><circle cx="488" cy="267" r="17" fill="#f59e0b"/><text x="488" y="273" text-anchor="middle" fill="#fff" font-size="18" font-weight="800">3</text><text x="517" y="273" fill="#b45309" font-size="22" font-weight="800">SPLIT</text><text x="478" y="305" fill="#475569" font-size="17">train / test</text><text x="478" y="327" fill="#475569" font-size="17">no leakage</text></g>
    <g><rect x="643" y="235" width="145" height="105" rx="18" fill="#f0fdf4" stroke="#86efac" stroke-width="2"/><circle cx="673" cy="267" r="17" fill="#16a34a"/><text x="673" y="273" text-anchor="middle" fill="#fff" font-size="18" font-weight="800">4</text><text x="702" y="273" fill="#15803d" font-size="22" font-weight="800">TRAIN</text><text x="663" y="305" fill="#475569" font-size="17">fit candidates</text><text x="663" y="327" fill="#475569" font-size="17">learn patterns</text></g>
    <g><rect x="828" y="235" width="145" height="105" rx="18" fill="#fff7ed" stroke="#fb923c" stroke-width="2"/><circle cx="858" cy="267" r="17" fill="#f97316"/><text x="858" y="273" text-anchor="middle" fill="#fff" font-size="18" font-weight="800">5</text><text x="887" y="273" fill="#c2410c" font-size="22" font-weight="800">TUNE</text><text x="848" y="305" fill="#475569" font-size="16">cross-validation</text><text x="848" y="327" fill="#475569" font-size="17">choose settings</text></g>
    <g><rect x="1013" y="235" width="100" height="105" rx="18" fill="#faf5ff" stroke="#c084fc" stroke-width="2"/><text x="1063" y="273" text-anchor="middle" fill="#7e22ce" font-size="22" font-weight="800">EVAL</text><text x="1063" y="305" text-anchor="middle" fill="#475569" font-size="17">final test</text><text x="1063" y="327" text-anchor="middle" fill="#475569" font-size="17">report</text></g>
    <path d="M234 287H272" class="flow"/><path d="M419 287H457" class="flow"/><path d="M604 287H642" class="flow"/><path d="M789 287H827" class="flow"/><path d="M974 287H1012" class="flow"/>
    <path d="M900 341V398H715V341" class="flow" stroke-dasharray="8 8"/><text x="806" y="430" text-anchor="middle" fill="#1d4ed8" font-size="17" font-weight="700">iterate when the score is not good enough</text>
    <text x="600" y="513" text-anchor="middle" fill="#bfdbfe" font-size="19" font-weight="800">A good capstone is more than a model call</text><text x="600" y="537" text-anchor="middle" fill="#fff" font-size="18">It is a reproducible system: the same data rules, evaluation rules, and decision trail can run again.</text>
  </g>
</svg>
