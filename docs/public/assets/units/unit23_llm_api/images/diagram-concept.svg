<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-label="LLM API request and response between an application and a JSON response">
  <defs><marker id="request" markerWidth="4" markerHeight="4" refX="8" refY="4" markerUnits="strokeWidth" viewBox="0 0 8 8" orient="auto"><path d="M0 0L8 4L0 8Z" fill="#2563eb"/></marker><marker id="response" markerWidth="4" markerHeight="4" refX="8" refY="4" markerUnits="strokeWidth" viewBox="0 0 8 8" orient="auto"><path d="M0 0L8 4L0 8Z" fill="#16a34a"/></marker><filter id="shadow" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity=".10"/></filter></defs>
  <rect width="1200" height="700" rx="28" fill="#f8fafc"/><text x="70" y="78" font-family="DejaVu Sans,sans-serif" font-size="32" font-weight="800" fill="#172554">One API call, two directions</text><text x="70" y="113" font-family="DejaVu Sans,sans-serif" font-size="17" fill="#64748b">A program sends a request, the model produces a response, and the client parses the returned JSON.</text>
  <g filter="url(#shadow)"><rect x="70" y="205" width="220" height="250" rx="24" fill="#fff" stroke="#2563eb" stroke-width="3"/><rect x="105" y="255" width="150" height="62" rx="14" fill="#dbeafe"/><text x="180" y="294" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="21" font-weight="800" fill="#1d4ed8">Your app</text><text x="180" y="365" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="16" fill="#475569">Python client</text><text x="180" y="394" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="15" fill="#64748b">API key + messages</text></g>
  <g filter="url(#shadow)"><rect x="420" y="180" width="360" height="300" rx="24" fill="#fff" stroke="#f59e0b" stroke-width="3"/><rect x="465" y="230" width="270" height="74" rx="14" fill="#fef3c7"/><text x="600" y="258" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="22" font-weight="800" fill="#b45309">POST</text><text x="600" y="286" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="22" font-weight="800" fill="#b45309">/chat/completions</text><text x="600" y="350" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="17" fill="#475569">system + user messages</text><text x="600" y="382" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="17" fill="#475569">model + parameters</text><text x="600" y="430" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="15" fill="#92400e">request in · response out</text></g>
  <g filter="url(#shadow)"><rect x="910" y="205" width="220" height="250" rx="24" fill="#fff" stroke="#16a34a" stroke-width="3"/><rect x="945" y="255" width="150" height="62" rx="14" fill="#dcfce7"/><text x="1020" y="294" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="21" font-weight="800" fill="#15803d">JSON</text><text x="1020" y="365" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="16" fill="#475569">answer + usage</text><text x="1020" y="394" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="15" fill="#64748b">choices[0]</text></g>
  <path d="M290 300H420" fill="none" stroke="#2563eb" stroke-width="3" marker-end="url(#request)"/><text x="355" y="270" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="16" font-weight="700" fill="#2563eb">request</text>
  <path d="M780 390H910" fill="none" stroke="#16a34a" stroke-width="3" marker-end="url(#response)"/><text x="845" y="360" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="16" font-weight="700" fill="#15803d">response body</text>
  <path d="M1020 455V535H180V455" fill="none" stroke="#16a34a" stroke-width="3" stroke-dasharray="10 9" marker-end="url(#response)"/><text x="600" y="570" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="16" font-weight="700" fill="#15803d">return to the client</text>
  <text x="600" y="635" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="19" font-weight="700" fill="#334155">Request: app → API · Response: API → JSON → app</text>
</svg>
