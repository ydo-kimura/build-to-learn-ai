<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-label="Prompting patterns branch from a task and converge on validation"><defs><marker id="a" markerWidth="4" markerHeight="4" refX="8" refY="4" markerUnits="strokeWidth" viewBox="0 0 8 8" orient="auto"><path d="M0 0L8 4L0 8Z" fill="#64748b"/></marker><filter id="s" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity=".10"/></filter></defs><rect width="1200" height="700" rx="28" fill="#f8fafc"/><text x="70" y="78" font-family="DejaVu Sans,sans-serif" font-size="32" font-weight="800" fill="#172554">Prompt patterns</text><text x="70" y="113" font-family="DejaVu Sans,sans-serif" font-size="17" fill="#64748b">Zero-shot, few-shot, and chain-of-thought are alternative ways to guide the same task.</text><g filter="url(#s)"><rect x="70" y="270" width="210" height="130" rx="24" fill="#fff" stroke="#2563eb" stroke-width="3"/><text x="175" y="322" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="23" font-weight="800" fill="#1d4ed8">Task</text><text x="175" y="356" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="16" fill="#475569">same user goal</text></g><g filter="url(#s)"><rect x="390" y="145" width="240" height="90" rx="22" fill="#fff" stroke="#2563eb" stroke-width="3"/><text x="510" y="183" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="22" font-weight="800" fill="#1d4ed8">Zero-shot</text><text x="510" y="211" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="15" fill="#64748b">instruction only</text></g><g filter="url(#s)"><rect x="390" y="290" width="240" height="90" rx="22" fill="#fff" stroke="#7c3aed" stroke-width="3"/><text x="510" y="328" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="22" font-weight="800" fill="#6d28d9">Few-shot</text><text x="510" y="356" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="15" fill="#64748b">add examples</text></g><g filter="url(#s)"><rect x="390" y="435" width="240" height="90" rx="22" fill="#fff" stroke="#f59e0b" stroke-width="3"/><text x="510" y="473" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="22" font-weight="800" fill="#b45309">CoT</text><text x="510" y="501" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="15" fill="#64748b">show intermediate steps</text></g><g filter="url(#s)"><rect x="850" y="270" width="280" height="130" rx="24" fill="#fff" stroke="#16a34a" stroke-width="3"/><text x="990" y="322" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="23" font-weight="800" fill="#15803d">Validate</text><text x="990" y="356" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="16" fill="#475569">schema + tests</text></g><path d="M281.5 335H330" fill="none" stroke="#64748b" stroke-width="3"/><path d="M330 335V190H388.5" fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#a)"/><path d="M330 335H388.5" fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#a)"/><path d="M330 335V480H388.5" fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#a)"/><path d="M631.5 190H730V335" fill="none" stroke="#64748b" stroke-width="3"/><path d="M631.5 335H730" fill="none" stroke="#64748b" stroke-width="3"/><path d="M631.5 480H730V335" fill="none" stroke="#64748b" stroke-width="3"/><circle cx="730" cy="335" r="4" fill="#64748b"/><path d="M730 335H848.5" fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#a)"/><text x="318" y="165" text-anchor="end" font-family="DejaVu Sans,sans-serif" font-size="15" font-weight="700" fill="#64748b">choose one pattern</text><text x="990" y="245" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="15" font-weight="700" fill="#64748b">evaluate chosen output</text><text x="600" y="625" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="19" font-weight="700" fill="#334155">Use the lightest pattern that gives the task enough structure.</text></svg>
