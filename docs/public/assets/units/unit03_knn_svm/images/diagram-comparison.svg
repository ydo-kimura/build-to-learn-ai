<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1536 860" role="img" aria-label="K-NN and SVM solve classification differently: neighbor voting versus a learned decision boundary">
  <defs><linearGradient id="bg" x2="1" y2="1"><stop stop-color="#f8fbff"/><stop offset="1" stop-color="#eef2ff"/></linearGradient><linearGradient id="blue"><stop stop-color="#2563eb"/><stop offset="1" stop-color="#4f46e5"/></linearGradient><marker id="step-arrow" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 1L7 4L0 7" fill="none" stroke="#94a3b8" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></marker><filter id="shadow"><feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#172554" flood-opacity=".12"/></filter></defs>
  <rect width="1536" height="860" rx="28" fill="url(#bg)"/><rect x="40" y="34" width="1456" height="112" rx="22" fill="#fff" filter="url(#shadow)"/><rect x="70" y="63" width="220" height="54" rx="27" fill="url(#blue)"/><text x="180" y="99" text-anchor="middle" font-family="Arial,sans-serif" font-size="22" font-weight="700" fill="#fff">METHOD CHOICE</text><text x="322" y="100" font-family="Arial,sans-serif" font-size="38" font-weight="700" fill="#172554">Two ways to draw a class boundary</text><text x="70" y="184" font-family="Arial,sans-serif" font-size="22" fill="#475569">K-NN decides locally at prediction time. SVM learns a global boundary from the most informative points.</text>
  <g filter="url(#shadow)"><rect x="40" y="224" width="700" height="570" rx="24" fill="#fff"/><rect x="40" y="224" width="700" height="74" rx="24" fill="#c2410c"/><rect x="40" y="274" width="700" height="24" fill="#c2410c"/><text x="76" y="271" font-family="Arial,sans-serif" font-size="30" font-weight="700" fill="#fff">K-NN • local memory</text><circle cx="160" cy="390" r="24" fill="#2563eb"/><text x="205" y="398" font-family="Arial,sans-serif" font-size="22" font-weight="700" fill="#1d4ed8">stores all examples</text><circle cx="160" cy="475" r="24" fill="#f97316"/><text x="205" y="483" font-family="Arial,sans-serif" font-size="22" font-weight="700" fill="#c2410c">looks at nearest K</text><circle cx="160" cy="560" r="24" fill="#0f766e"/><text x="205" y="568" font-family="Arial,sans-serif" font-size="22" font-weight="700" fill="#0f766e">votes at query time</text><path d="M160 420V445M160 505V530" stroke="#94a3b8" stroke-width="4" marker-end="url(#step-arrow)"/><rect x="100" y="650" width="580" height="74" rx="16" fill="#fff7ed"/><text x="390" y="696" text-anchor="middle" font-family="Arial,sans-serif" font-size="21" font-weight="700" fill="#c2410c">good for similarity and small datasets</text></g>
  <g filter="url(#shadow)"><rect x="796" y="224" width="700" height="570" rx="24" fill="#fff"/><rect x="796" y="224" width="700" height="74" rx="24" fill="url(#blue)"/><rect x="796" y="274" width="700" height="24" fill="url(#blue)"/><text x="832" y="271" font-family="Arial,sans-serif" font-size="30" font-weight="700" fill="#fff">SVM • learned boundary</text><circle cx="916" cy="390" r="24" fill="#2563eb"/><text x="961" y="398" font-family="Arial,sans-serif" font-size="22" font-weight="700" fill="#1d4ed8">finds the widest margin</text><circle cx="916" cy="475" r="24" fill="#f97316"/><text x="961" y="483" font-family="Arial,sans-serif" font-size="22" font-weight="700" fill="#c2410c">keeps support vectors</text><circle cx="916" cy="560" r="24" fill="#0f766e"/><text x="961" y="568" font-family="Arial,sans-serif" font-size="22" font-weight="700" fill="#0f766e">kernel handles curves</text><path d="M916 420V445M916 505V530" stroke="#94a3b8" stroke-width="4" marker-end="url(#step-arrow)"/><rect x="856" y="650" width="580" height="74" rx="16" fill="#eff6ff"/><text x="1146" y="696" text-anchor="middle" font-family="Arial,sans-serif" font-size="21" font-weight="700" fill="#1d4ed8">strong for high-dimensional data</text></g>
  <rect x="378" y="808" width="780" height="42" rx="12" fill="#fff" stroke="#cbd5e1" stroke-width="2"/><text x="768" y="836" text-anchor="middle" font-family="Arial,sans-serif" font-size="20" font-weight="700" fill="#475569">Both need feature scaling when distance or margin depends on feature units.</text>
</svg>
