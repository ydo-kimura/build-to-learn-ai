<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1536 860" role="img" aria-label="Machine learning workflow: split data into training and test sets before fitting and evaluating a model">
  <defs><linearGradient id="bg" x2="1" y2="1"><stop stop-color="#f8fbff"/><stop offset="1" stop-color="#eef2ff"/></linearGradient><linearGradient id="blue"><stop stop-color="#2563eb"/><stop offset="1" stop-color="#4f46e5"/></linearGradient><filter id="shadow"><feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#172554" flood-opacity=".12"/></filter><marker id="arr" markerWidth="4" markerHeight="4" refX="8" refY="4" markerUnits="strokeWidth" viewBox="0 0 8 8" orient="auto"><path d="M0 0L8 4L0 8Z" fill="#2563eb"/></marker></defs>
  <rect width="1536" height="860" rx="28" fill="url(#bg)"/><rect x="40" y="34" width="1456" height="112" rx="22" fill="#fff" filter="url(#shadow)"/><rect x="70" y="63" width="210" height="54" rx="27" fill="url(#blue)"/><text x="175" y="99" text-anchor="middle" font-family="Arial,sans-serif" font-size="22" font-weight="700" fill="#fff">ML WORKFLOW</text><text x="312" y="100" font-family="Arial,sans-serif" font-size="38" font-weight="700" fill="#172554">Keep the test set unseen until evaluation</text>
  <text x="70" y="184" font-family="Arial,sans-serif" font-size="22" fill="#475569">Training data teaches the model. Test data answers the honest question: does it work on examples it has never seen?</text>
  <g filter="url(#shadow)"><rect x="40" y="260" width="280" height="400" rx="24" fill="#fff"/><rect x="40" y="260" width="280" height="70" rx="24" fill="#334155"/><rect x="40" y="306" width="280" height="24" fill="#334155"/><text x="180" y="304" text-anchor="middle" font-family="Arial,sans-serif" font-size="27" font-weight="700" fill="#fff">ALL DATA</text><g fill="#cbd5e1"><rect x="90" y="390" width="180" height="36" rx="10"/><rect x="90" y="442" width="180" height="36" rx="10"/><rect x="90" y="494" width="180" height="36" rx="10"/><rect x="90" y="546" width="180" height="36" rx="10"/></g><text x="180" y="620" text-anchor="middle" font-family="Arial,sans-serif" font-size="20" font-weight="700" fill="#475569">100% of examples</text></g>
  <path d="M320 460H390" fill="none" stroke="#2563eb" stroke-width="5" stroke-linecap="round" marker-end="url(#arr)"/><text x="355" y="430" text-anchor="middle" font-family="Arial,sans-serif" font-size="21" font-weight="700" fill="#2563eb">split</text>
  <g filter="url(#shadow)"><rect x="390" y="224" width="430" height="472" rx="24" fill="#fff"/><rect x="390" y="224" width="430" height="70" rx="24" fill="url(#blue)"/><rect x="390" y="270" width="430" height="24" fill="url(#blue)"/><text x="605" y="268" text-anchor="middle" font-family="Arial,sans-serif" font-size="27" font-weight="700" fill="#fff">TRAIN / TEST SPLIT</text><rect x="440" y="365" width="330" height="98" rx="16" fill="#dcfce7" stroke="#4ade80" stroke-width="3"/><text x="605" y="405" text-anchor="middle" font-family="Arial,sans-serif" font-size="25" font-weight="700" fill="#15803d">Train 80%</text><text x="605" y="440" text-anchor="middle" font-family="Arial,sans-serif" font-size="21" fill="#166534">model may learn from this</text><rect x="440" y="500" width="330" height="98" rx="16" fill="#ffedd5" stroke="#fb923c" stroke-width="3"/><text x="605" y="540" text-anchor="middle" font-family="Arial,sans-serif" font-size="25" font-weight="700" fill="#c2410c">Test 20%</text><text x="605" y="575" text-anchor="middle" font-family="Arial,sans-serif" font-size="21" fill="#9a3412">keep hidden until the end</text></g>
  <path d="M820 410H900" fill="none" stroke="#2563eb" stroke-width="5" stroke-linecap="round" marker-end="url(#arr)"/><path d="M820 550H900" fill="none" stroke="#2563eb" stroke-width="5" stroke-linecap="round" marker-end="url(#arr)"/>
  <g filter="url(#shadow)"><rect x="900" y="224" width="270" height="472" rx="24" fill="#fff"/><rect x="900" y="224" width="270" height="70" rx="24" fill="#7c3aed"/><rect x="900" y="270" width="270" height="24" fill="#7c3aed"/><text x="1035" y="268" text-anchor="middle" font-family="Arial,sans-serif" font-size="27" font-weight="700" fill="#fff">MODEL</text><rect x="950" y="365" width="170" height="90" rx="16" fill="#f5f3ff" stroke="#a78bfa" stroke-width="3"/><text x="1035" y="405" text-anchor="middle" font-family="Arial,sans-serif" font-size="24" font-weight="700" fill="#6d28d9">.fit()</text><text x="1035" y="435" text-anchor="middle" font-family="Arial,sans-serif" font-size="20" fill="#5b21b6">learn a rule</text><path d="M1035 455V520" stroke="#7c3aed" stroke-width="4" marker-end="url(#arr)"/><rect x="950" y="520" width="170" height="90" rx="16" fill="#eff6ff" stroke="#60a5fa" stroke-width="3"/><text x="1035" y="560" text-anchor="middle" font-family="Arial,sans-serif" font-size="24" font-weight="700" fill="#1d4ed8">.predict()</text><text x="1035" y="590" text-anchor="middle" font-family="Arial,sans-serif" font-size="20" fill="#1e40af">make a guess</text></g>
  <path d="M1170 550H1240" fill="none" stroke="#2563eb" stroke-width="5" stroke-linecap="round" marker-end="url(#arr)"/><g filter="url(#shadow)"><rect x="1240" y="260" width="256" height="400" rx="24" fill="#fff"/><rect x="1240" y="260" width="256" height="70" rx="24" fill="#0f766e"/><rect x="1240" y="306" width="256" height="24" fill="#0f766e"/><text x="1368" y="304" text-anchor="middle" font-family="Arial,sans-serif" font-size="27" font-weight="700" fill="#fff">EVALUATE</text><circle cx="1368" cy="444" r="90" fill="#ecfdf5" stroke="#14b8a6" stroke-width="5"/><text x="1368" y="430" text-anchor="middle" font-family="Arial,sans-serif" font-size="24" font-weight="700" fill="#0f766e">MSE</text><text x="1368" y="476" text-anchor="middle" font-family="Arial,sans-serif" font-size="19" fill="#475569">prediction vs truth</text><text x="1368" y="590" text-anchor="middle" font-family="Arial,sans-serif" font-size="21" font-weight="700" fill="#0f766e">honest score</text></g><rect x="340" y="744" width="856" height="54" rx="16" fill="#fff" stroke="#cbd5e1" stroke-width="2"/><text x="768" y="779" text-anchor="middle" font-family="Arial,sans-serif" font-size="24" font-weight="700" fill="#475569">Never let test data influence .fit() — that would be data leakage.</text>
</svg>
