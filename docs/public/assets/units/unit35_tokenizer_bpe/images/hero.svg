<svg xmlns="http://www.w3.org/2000/svg" width="1536" height="1024" viewBox="0 0 1536 1024" role="img" aria-labelledby="title desc">
  <title id="title">Tokenizer and BPE</title>
  <desc id="desc">A large text card becomes two reusable subword token chips.</desc>
  <defs>
    <linearGradient id="textCard" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eff6ff"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="tokenCard" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ecfdf5"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#0f172a" flood-opacity="0.1"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0 0L10 5L0 10Z" fill="#64748b"/>
    </marker>
  </defs>

  <rect width="1536" height="1024" fill="#ffffff"/>
  <circle cx="1478" cy="70" r="150" fill="#eff6ff" opacity="0.8"/>
  <circle cx="74" cy="964" r="150" fill="#ecfdf5" opacity="0.75"/>

  <g font-family="Inter, Arial, sans-serif">
    <text x="88" y="124" fill="#07122f" font-size="88" font-weight="800" letter-spacing="-2">Tokenizer &amp; BPE</text>
    <text x="92" y="177" fill="#52627a" font-size="29">Text becomes reusable subword tokens</text>
    <rect x="1292" y="86" width="154" height="50" rx="25" fill="#e8f1ff" stroke="#93c5fd"/>
    <text x="1369" y="119" fill="#1556c0" font-size="18" font-weight="800" text-anchor="middle" letter-spacing="1">UNIT 35</text>

    <g filter="url(#shadow)">
      <rect x="132" y="332" width="438" height="350" rx="34" fill="url(#textCard)" stroke="#60a5fa" stroke-width="3"/>
      <rect x="798" y="292" width="600" height="430" rx="36" fill="url(#tokenCard)" stroke="#34d399" stroke-width="3"/>
    </g>

    <rect x="178" y="382" width="100" height="44" rx="22" fill="#dbeafe"/>
    <text x="228" y="412" fill="#1556c0" font-size="18" font-weight="800" text-anchor="middle" letter-spacing="1">TEXT</text>
    <text x="351" y="530" fill="#07122f" font-family="SFMono-Regular, Consolas, monospace" font-size="64" font-weight="800" text-anchor="middle">playing</text>
    <path d="M190 583h322" stroke="#bfdbfe" stroke-width="3" stroke-linecap="round"/>
    <circle cx="225" cy="625" r="8" fill="#60a5fa"/>
    <circle cx="253" cy="625" r="8" fill="#93c5fd"/>
    <circle cx="281" cy="625" r="8" fill="#bfdbfe"/>

    <path d="M570 507H797" fill="none" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>
    <text x="667" y="475" fill="#52627a" font-size="20" font-weight="800" text-anchor="middle" letter-spacing="1">TOKENIZE</text>

    <rect x="846" y="344" width="166" height="44" rx="22" fill="#d1fae5"/>
    <text x="929" y="374" fill="#07824d" font-size="18" font-weight="800" text-anchor="middle" letter-spacing="1">SUBWORDS</text>
    <rect x="854" y="438" width="232" height="152" rx="28" fill="#dbeafe" stroke="#60a5fa" stroke-width="2"/>
    <rect x="1110" y="438" width="214" height="152" rx="28" fill="#d1fae5" stroke="#34d399" stroke-width="2"/>
    <text x="970" y="532" fill="#1556c0" font-family="SFMono-Regular, Consolas, monospace" font-size="54" font-weight="800" text-anchor="middle">play</text>
    <text x="1217" y="532" fill="#07824d" font-family="SFMono-Regular, Consolas, monospace" font-size="54" font-weight="800" text-anchor="middle">ing</text>
    <rect x="956" y="640" width="284" height="42" rx="21" fill="#ffffff" stroke="#a7f3d0"/>
    <text x="1098" y="668" fill="#08633f" font-size="17" font-weight="800" text-anchor="middle" letter-spacing="0.8">REUSABLE TOKEN CHIPS</text>

    <text x="768" y="850" fill="#334155" font-size="27" font-weight="700" text-anchor="middle">playing → play + ing</text>
  </g>
</svg>
