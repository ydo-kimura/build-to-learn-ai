<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-label="PyTorch tensor shapes through a linear layer">
<defs><marker id="a" markerWidth="4" markerHeight="4" refX="8" refY="4" markerUnits="strokeWidth" viewBox="0 0 8 8" orient="auto"><path d="M0 0L8 4L0 8Z" fill="#64748b"/></marker><style>.t{font:700 24px sans-serif;fill:#fff}.h{font:700 18px sans-serif;fill:#0f172a}.s{font:500 14px sans-serif;fill:#64748b}.flow{stroke:#64748b;stroke-width:3;fill:none;marker-end:url(#a)}</style></defs>
<rect width="960" height="540" rx="24" fill="#f8fafc"/><rect x="28" y="24" width="904" height="68" rx="16" fill="#0f172a"/><text x="64" y="67" class="t">Tensor shapes → model output</text><text x="896" y="66" text-anchor="end" class="s" fill="#cbd5e1">PyTorch mental model</text>
<rect x="44" y="122" width="872" height="348" rx="20" fill="#fff" stroke="#e2e8f0" stroke-width="2"/>
<g><rect x="101" y="216" width="190" height="120" rx="16" fill="#dbeafe" stroke="#3b82f6" stroke-width="3"/><rect x="375" y="216" width="210" height="120" rx="16" fill="#ede9fe" stroke="#8b5cf6" stroke-width="3"/><rect x="669" y="216" width="190" height="120" rx="16" fill="#dcfce7" stroke="#22c55e" stroke-width="3"/></g>
<g text-anchor="middle"><text x="196" y="254" class="h">Tensor X</text><text x="196" y="282" class="s">shape: (batch, 4)</text><text x="196" y="307" class="s">data + device</text><text x="480" y="254" class="h">nn.Linear(4, 3)</text><text x="480" y="282" class="s">matrix multiply</text><text x="480" y="307" class="s">+ bias</text><text x="764" y="254" class="h">logits</text><text x="764" y="282" class="s">shape: (batch, 3)</text><text x="764" y="307" class="s">class scores</text></g>
<path d="M292.5 276H373.5" class="flow"/><path d="M586.5 276H667.5" class="flow"/><rect x="154" y="164" width="652" height="34" rx="10" fill="#f1f5f9"/><text x="480" y="187" text-anchor="middle" class="s">A tensor keeps the numbers, shape, and computation context together.</text>
