<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1536 820" role="img" aria-label="Attention weights: Query and Key determine how each token focuses on the others">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#f8fbff"/><stop offset="1" stop-color="#eef2ff"/></linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#2563eb"/><stop offset="1" stop-color="#4f46e5"/></linearGradient>
    <linearGradient id="violet" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#7c3aed"/><stop offset="1" stop-color="#a855f7"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#172554" flood-opacity=".12"/></filter>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0 0L8 4L0 8Z" fill="#2563eb"/></marker>
    <marker id="red-arrow" markerWidth="4" markerHeight="4" refX="8" refY="4" markerUnits="strokeWidth" viewBox="0 0 8 8" orient="auto"><path d="M0 0L8 4L0 8Z" fill="#dc2626"/></marker>
  </defs>
  <rect width="1536" height="860" rx="28" fill="url(#bg)"/>
  <rect x="40" y="34" width="1456" height="112" rx="22" fill="#fff" filter="url(#shadow)"/>
  <rect x="70" y="63" width="158" height="54" rx="27" fill="url(#blue)"/>
  <text x="149" y="99" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#fff">CORE IDEA</text>
  <text x="262" y="100" font-family="Arial, sans-serif" font-size="38" font-weight="700" fill="#172554">Attention = learn which tokens matter to each other</text>
  <text x="70" y="184" font-family="Arial, sans-serif" font-size="22" fill="#475569">For the token <tspan font-weight="700" fill="#dc2626">it</tspan>, a high attention weight points to the useful context: <tspan font-weight="700" fill="#15803d">animal</tspan>.</text>

  <g filter="url(#shadow)">
    <rect x="40" y="224" width="430" height="570" rx="24" fill="#fff"/>
    <rect x="40" y="224" width="430" height="74" rx="24" fill="url(#blue)"/>
    <rect x="40" y="274" width="430" height="24" fill="url(#blue)"/>
    <text x="72" y="271" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#fff">1  Input tokens</text>
    <text x="72" y="339" font-family="Arial, sans-serif" font-size="22" fill="#64748b">The model compares every token</text>
    <text x="72" y="369" font-family="Arial, sans-serif" font-size="22" fill="#64748b">with every other token.</text>
    <g font-family="Arial, sans-serif" font-size="22" font-weight="700" text-anchor="middle">
      <rect x="72" y="420" width="108" height="58" rx="14" fill="#dbeafe" stroke="#60a5fa" stroke-width="3"/><text x="126" y="457" fill="#1d4ed8">animal</text>
      <rect x="192" y="420" width="108" height="58" rx="14" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="3"/><text x="246" y="457" fill="#475569">street</text>
      <rect x="312" y="420" width="108" height="58" rx="14" fill="#fee2e2" stroke="#f87171" stroke-width="3"/><text x="366" y="457" fill="#b91c1c">it</text>
      <rect x="72" y="498" width="108" height="58" rx="14" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="3"/><text x="126" y="535" fill="#475569">because</text>
      <rect x="192" y="498" width="108" height="58" rx="14" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="3"/><text x="246" y="535" fill="#475569">was</text>
      <rect x="312" y="498" width="108" height="58" rx="14" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="3"/><text x="366" y="535" fill="#475569">tired</text>
    </g>
    <path d="M366 420V394H126V420" fill="none" stroke="#dc2626" stroke-width="4" stroke-dasharray="10 8" marker-end="url(#red-arrow)"/>
    <text x="72" y="650" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#15803d">Meaning is built from context</text>
    <text x="72" y="686" font-family="Arial, sans-serif" font-size="20" fill="#475569">not from one word in isolation.</text>
    <rect x="72" y="716" width="356" height="44" rx="12" fill="#ecfdf5"/><text x="250" y="745" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#15803d">Q × K → attention weights</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="520" y="224" width="560" height="570" rx="24" fill="#fff"/>
    <rect x="520" y="224" width="560" height="74" rx="24" fill="url(#violet)"/><rect x="520" y="274" width="560" height="24" fill="url(#violet)"/>
    <text x="552" y="271" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#fff">2  Attention matrix</text>
    <text x="552" y="339" font-family="Arial, sans-serif" font-size="22" fill="#64748b">Each row answers: “Where should I look?”</text>
    <text x="820" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#475569">Keys →</text>
    <text x="580" y="555" transform="rotate(-90 580 555)" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#475569">Queries ↓</text>
    <text x="820" y="414" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" font-weight="700" fill="#7c3aed">softmax → probabilities</text>
    <g transform="translate(640 420)">
      <rect width="360" height="280" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="3"/>
      <g stroke="#fff" stroke-width="5">
        <rect x="8" y="8" width="80" height="58" rx="8" fill="#bfdbfe"/><rect x="96" y="8" width="80" height="58" rx="8" fill="#dbeafe"/><rect x="184" y="8" width="80" height="58" rx="8" fill="#93c5fd"/><rect x="272" y="8" width="80" height="58" rx="8" fill="#e0e7ff"/>
        <rect x="8" y="74" width="80" height="58" rx="8" fill="#dbeafe"/><rect x="96" y="74" width="80" height="58" rx="8" fill="#bfdbfe"/><rect x="184" y="74" width="80" height="58" rx="8" fill="#c4b5fd"/><rect x="272" y="74" width="80" height="58" rx="8" fill="#dbeafe"/>
        <rect x="8" y="140" width="80" height="58" rx="8" fill="#bfdbfe"/><rect x="96" y="140" width="80" height="58" rx="8" fill="#dbeafe"/><rect x="184" y="140" width="80" height="58" rx="8" fill="#fee2e2"/><rect x="272" y="140" width="80" height="58" rx="8" fill="#fca5a5"/>
        <rect x="8" y="206" width="80" height="58" rx="8" fill="#c4b5fd"/><rect x="96" y="206" width="80" height="58" rx="8" fill="#dbeafe"/><rect x="184" y="206" width="80" height="58" rx="8" fill="#fca5a5"/><rect x="272" y="206" width="80" height="58" rx="8" fill="#bfdbfe"/>
      </g>
    </g>
    <rect x="552" y="722" width="496" height="50" rx="12" fill="#f5f3ff"/><text x="800" y="756" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#7c3aed">bright cell = strong relationship</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1130" y="224" width="366" height="570" rx="24" fill="#fff"/>
    <rect x="1130" y="224" width="366" height="74" rx="24" fill="#0f766e"/><rect x="1130" y="274" width="366" height="24" fill="#0f766e"/>
    <text x="1162" y="271" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#fff">3  Output</text>
    <text x="1162" y="339" font-family="Arial, sans-serif" font-size="22" fill="#64748b">Weighted values create</text>
    <text x="1162" y="369" font-family="Arial, sans-serif" font-size="22" fill="#64748b">a context-aware representation.</text>
    <circle cx="1313" cy="500" r="96" fill="#ecfdf5" stroke="#14b8a6" stroke-width="5"/>
    <path d="M1260 490 L1290 520 L1368 442" fill="none" stroke="#0f766e" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="1313" y="642" text-anchor="middle" font-family="Arial, sans-serif" font-size="25" font-weight="700" fill="#0f766e">“it” → animal</text>
    <text x="1313" y="680" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#475569">the model can use</text>
    <text x="1313" y="710" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#475569">the right context</text>
    <rect x="1162" y="730" width="302" height="42" rx="10" fill="#ecfdf5"/><text x="1313" y="759" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#0f766e">attention output</text>
  </g>
  <path d="M470 508 H520" stroke="#2563eb" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M1080 508 H1130" stroke="#2563eb" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
</svg>
