<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-label="RAG indexing and retrieval: documents are indexed, questions retrieve context, and the LLM answers with both">
  <defs>
    <marker id="a" markerWidth="4" markerHeight="4" refX="8" refY="4" markerUnits="strokeWidth" viewBox="0 0 8 8" orient="auto"><path d="M0 0L8 4L0 8Z" fill="#64748b"/></marker>
    <marker id="orange" markerWidth="4" markerHeight="4" refX="8" refY="4" markerUnits="strokeWidth" viewBox="0 0 8 8" orient="auto"><path d="M0 0L8 4L0 8Z" fill="#f59e0b"/></marker>
    <marker id="green" markerWidth="4" markerHeight="4" refX="8" refY="4" markerUnits="strokeWidth" viewBox="0 0 8 8" orient="auto"><path d="M0 0L8 4L0 8Z" fill="#16a34a"/></marker>
    <marker id="blue" markerWidth="4" markerHeight="4" refX="8" refY="4" markerUnits="strokeWidth" viewBox="0 0 8 8" orient="auto"><path d="M0 0L8 4L0 8Z" fill="#2563eb"/></marker>
    <filter id="s" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity=".10"/></filter>
  </defs>
  <rect width="1200" height="700" rx="28" fill="#f8fafc"/>
  <text x="70" y="78" font-family="DejaVu Sans,sans-serif" font-size="32" font-weight="800" fill="#172554">RAG from scratch</text>
  <text x="70" y="113" font-family="DejaVu Sans,sans-serif" font-size="17" fill="#64748b">Build the index once, then retrieve grounded context for each new question.</text>

  <rect x="60" y="160" width="700" height="205" rx="24" fill="#eff6ff" stroke="#bfdbfe" stroke-width="2"/>
  <text x="90" y="198" font-family="DejaVu Sans,sans-serif" font-size="16" font-weight="800" fill="#1d4ed8">1 · BUILD THE INDEX ONCE</text>
  <g filter="url(#s)">
    <rect x="90" y="230" width="170" height="95" rx="18" fill="#fff" stroke="#2563eb" stroke-width="3"/>
    <text x="175" y="270" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="21" font-weight="800" fill="#1d4ed8">Documents</text>
    <text x="175" y="299" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="15" fill="#64748b">source knowledge</text>
  </g>
  <g filter="url(#s)">
    <rect x="305" y="230" width="190" height="95" rx="18" fill="#fff" stroke="#7c3aed" stroke-width="3"/>
    <text x="400" y="270" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="21" font-weight="800" fill="#6d28d9">Chunk + embed</text>
    <text x="400" y="299" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="15" fill="#64748b">text → vectors</text>
  </g>
  <g filter="url(#s)">
    <rect x="540" y="230" width="180" height="95" rx="18" fill="#fff" stroke="#f59e0b" stroke-width="3"/>
    <text x="630" y="270" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="21" font-weight="800" fill="#b45309">Vector DB</text>
    <text x="630" y="299" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="15" fill="#64748b">store embeddings</text>
  </g>
  <path d="M260 278H305" fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#a)"/>
  <path d="M495 278H540" fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#a)"/>

  <rect x="60" y="390" width="700" height="205" rx="24" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="2"/>
  <text x="90" y="428" font-family="DejaVu Sans,sans-serif" font-size="16" font-weight="800" fill="#15803d">2 · RETRIEVE FOR EACH QUESTION</text>
  <g filter="url(#s)">
    <rect x="90" y="460" width="170" height="95" rx="18" fill="#fff" stroke="#16a34a" stroke-width="3"/>
    <text x="175" y="500" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="21" font-weight="800" fill="#15803d">Question</text>
    <text x="175" y="529" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="15" fill="#64748b">user query</text>
  </g>
  <g filter="url(#s)">
    <rect x="305" y="460" width="190" height="95" rx="18" fill="#fff" stroke="#0f766e" stroke-width="3"/>
    <text x="400" y="500" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="21" font-weight="800" fill="#0f766e">Query embed</text>
    <text x="400" y="529" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="15" fill="#64748b">same vector space</text>
  </g>
  <g filter="url(#s)">
    <rect x="525" y="460" width="210" height="95" rx="18" fill="#fff" stroke="#f97316" stroke-width="3"/>
    <text x="630" y="493" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="20" font-weight="800" fill="#c2410c">Search endpoint</text>
    <text x="630" y="525" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="15" fill="#64748b">top-k context</text>
  </g>
  <path d="M260 508H305" fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#a)"/>
  <path d="M495 508H525" fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#a)"/>
  <path d="M630 325V460" fill="none" stroke="#f59e0b" stroke-width="3" stroke-dasharray="8 8" marker-end="url(#orange)"/>
  <text x="605" y="410" text-anchor="end" font-family="DejaVu Sans,sans-serif" font-size="14" font-weight="700" fill="#b45309">search indexed vectors</text>

  <g filter="url(#s)">
    <rect x="840" y="245" width="290" height="260" rx="24" fill="#fff" stroke="#16a34a" stroke-width="3"/>
    <rect x="880" y="295" width="210" height="70" rx="15" fill="#dcfce7"/>
    <text x="985" y="338" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="22" font-weight="800" fill="#15803d">LLM answer</text>
    <text x="985" y="410" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="17" fill="#475569">question + retrieved context</text>
    <text x="985" y="445" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="15" fill="#64748b">grounded response</text>
  </g>
  <path d="M735 508H790V375H840" fill="none" stroke="#16a34a" stroke-width="3" marker-end="url(#green)"/>
  <path d="M175 555V580H985V505" fill="none" stroke="#2563eb" stroke-width="3" stroke-dasharray="10 9" marker-end="url(#blue)"/>
  <text x="600" y="640" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="18" font-weight="700" fill="#334155">Retrieval supplies evidence; the question keeps the answer on task.</text>
</svg>
