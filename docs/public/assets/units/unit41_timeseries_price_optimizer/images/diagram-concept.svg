<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" role="img" aria-label="Time-aware machine learning uses walk-forward splits, features, a trained model, and a future forecast">
  <defs><marker id="arrow" markerWidth="4" markerHeight="4" refX="8" refY="4" orient="auto" markerUnits="strokeWidth" viewBox="0 0 8 8"><path d="M0 0L8 4L0 8Z" fill="#64748b"/></marker></defs>
  <rect width="900" height="500" rx="24" fill="#f8fafc"/><text x="54" y="58" font-family="Arial,sans-serif" font-size="28" font-weight="700" fill="#0f2d6b">Time-Aware Machine Learning</text><text x="54" y="88" font-family="Arial,sans-serif" font-size="15" fill="#64748b">Respect time order to avoid leaking the future</text>
  <g font-family="Arial,sans-serif">
    <rect x="40" y="150" width="145" height="116" rx="18" fill="#eff6ff" stroke="#3b82f6" stroke-width="3"/><text x="112" y="190" text-anchor="middle" font-size="18" font-weight="700" fill="#1d4ed8">HISTORY</text><text x="112" y="222" text-anchor="middle" font-size="15" fill="#334155">past observations</text><text x="112" y="246" text-anchor="middle" font-size="13" fill="#64748b">t−2 · t−1 · t</text>
    <line x1="185" y1="208" x2="210" y2="208" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="210" y="150" width="145" height="116" rx="18" fill="#fff7ed" stroke="#f59e0b" stroke-width="3"/><text x="282" y="190" text-anchor="middle" font-size="18" font-weight="700" fill="#b45309">SPLIT</text><text x="282" y="222" text-anchor="middle" font-size="15" fill="#334155">walk-forward</text><text x="282" y="246" text-anchor="middle" font-size="13" fill="#64748b">train → validate</text>
    <line x1="355" y1="208" x2="380" y2="208" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="380" y="150" width="145" height="116" rx="18" fill="#eef2ff" stroke="#6366f1" stroke-width="3"/><text x="452" y="190" text-anchor="middle" font-size="18" font-weight="700" fill="#4338ca">FEATURES</text><text x="452" y="222" text-anchor="middle" font-size="15" fill="#334155">lags · rolling stats</text><text x="452" y="246" text-anchor="middle" font-size="13" fill="#64748b">known at prediction time</text>
    <line x1="525" y1="208" x2="550" y2="208" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="550" y="150" width="150" height="116" rx="18" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="3"/><text x="625" y="190" text-anchor="middle" font-size="18" font-weight="700" fill="#6d28d9">TRAIN MODEL</text><text x="625" y="222" text-anchor="middle" font-size="15" fill="#334155">fit on past data</text><text x="625" y="246" text-anchor="middle" font-size="13" fill="#64748b">validate each window</text>
    <line x1="700" y1="208" x2="730" y2="208" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="730" y="150" width="130" height="116" rx="18" fill="#ecfdf5" stroke="#10b981" stroke-width="3"/><text x="795" y="190" text-anchor="middle" font-size="18" font-weight="700" fill="#047857">FORECAST</text><text x="795" y="222" text-anchor="middle" font-size="15" fill="#334155">future t+1</text><text x="795" y="246" text-anchor="middle" font-size="13" fill="#64748b">honest estimate</text>
    <rect x="164" y="344" width="572" height="70" rx="18" fill="#fff" stroke="#cbd5e1" stroke-width="2"/><text x="450" y="374" text-anchor="middle" font-size="16" font-weight="700" fill="#475569">The model may use the past, never the future</text><text x="450" y="398" text-anchor="middle" font-size="13" fill="#64748b">A time-based split protects evaluation from data leakage</text>
  </g>
</svg>
