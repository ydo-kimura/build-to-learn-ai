<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 580" role="img" aria-labelledby="title desc">
  <title id="title">Five-fold cross-validation rotates the test fold</title>
  <desc id="desc">Five rows show each fold taking a turn as the test set while the other four folds are used for training, followed by an average score.</desc>
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#f8fbff"/><stop offset="1" stop-color="#eef4ff"/></linearGradient><filter id="shadow" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#1e3a8a" flood-opacity=".12"/></filter></defs>
  <rect width="1200" height="580" rx="28" fill="url(#bg)"/><text x="60" y="68" fill="#0f172a" font-family="Inter,Arial,sans-serif" font-size="36" font-weight="800">Cross-validation turns one split into five fair tests</text><text x="60" y="102" fill="#64748b" font-family="Inter,Arial,sans-serif" font-size="20">Every sample gets a turn as unseen data, so the final score is less dependent on luck.</text>
  <g filter="url(#shadow)"><rect x="55" y="145" width="810" height="405" rx="24" fill="#fff"/><rect x="900" y="145" width="245" height="405" rx="24" fill="#0f3c9e"/></g>
  <g font-family="Inter,Arial,sans-serif"><rect x="85" y="173" width="130" height="32" rx="16" fill="#dbeafe"/><text x="150" y="195" text-anchor="middle" fill="#1d4ed8" font-size="17" font-weight="800">K = 5 FOLDS</text><text x="85" y="242" fill="#0f172a" font-size="24" font-weight="800">Rotate the test fold</text>
    <g transform="translate(85 275)"><text x="0" y="-18" fill="#64748b" font-size="17" font-weight="700">RUN</text><text x="117" y="-18" fill="#64748b" font-size="17" font-weight="700">FOLD 1</text><text x="225" y="-18" fill="#64748b" font-size="17" font-weight="700">FOLD 2</text><text x="333" y="-18" fill="#64748b" font-size="17" font-weight="700">FOLD 3</text><text x="441" y="-18" fill="#64748b" font-size="17" font-weight="700">FOLD 4</text><text x="549" y="-18" fill="#64748b" font-size="17" font-weight="700">FOLD 5</text>
      <g font-size="18" font-weight="700" text-anchor="middle"><text x="20" y="28" fill="#1d4ed8">1</text><text x="20" y="76" fill="#1d4ed8">2</text><text x="20" y="124" fill="#1d4ed8">3</text><text x="20" y="172" fill="#1d4ed8">4</text><text x="20" y="220" fill="#1d4ed8">5</text></g>
      <g stroke="#cbd5e1" stroke-width="1"><rect x="77" y="0" width="540" height="35" rx="8" fill="#dbeafe"/><rect x="77" y="48" width="540" height="35" rx="8" fill="#dbeafe"/><rect x="77" y="96" width="540" height="35" rx="8" fill="#dbeafe"/><rect x="77" y="144" width="540" height="35" rx="8" fill="#dbeafe"/><rect x="77" y="192" width="540" height="35" rx="8" fill="#dbeafe"/></g>
      <g fill="#fbbf24" stroke="#f59e0b" stroke-width="1"><rect x="77" y="0" width="108" height="35" rx="8"/><rect x="185" y="48" width="108" height="35" rx="8"/><rect x="293" y="96" width="108" height="35" rx="8"/><rect x="401" y="144" width="108" height="35" rx="8"/><rect x="509" y="192" width="108" height="35" rx="8"/></g>
      <g fill="#0f172a" font-size="17" text-anchor="middle"><text x="131" y="23">TEST</text><text x="239" y="71">TEST</text><text x="347" y="119">TEST</text><text x="455" y="167">TEST</text><text x="563" y="215">TEST</text></g>
    </g>
    <rect x="115" y="505" width="300" height="34" rx="17" fill="#eff6ff"/><circle cx="137" cy="522" r="7" fill="#dbeafe" stroke="#60a5fa"/><text x="155" y="528" fill="#1d4ed8" font-size="17" font-weight="700">TRAIN = blue • TEST = gold</text>
    <path d="M470 535 H900" stroke="#2563eb" stroke-width="3"/><path d="M900 535 l-10 -5 m10 5 l-10 5" fill="none" stroke="#2563eb" stroke-width="3" stroke-linecap="round"/><text x="635" y="523" text-anchor="middle" fill="#1d4ed8" font-size="18" font-weight="700">average the five scores</text>
    <text x="1022" y="210" text-anchor="middle" fill="#bfdbfe" font-size="17" font-weight="800" letter-spacing="2">RESULT</text><text x="1022" y="280" text-anchor="middle" fill="#fff" font-size="29" font-weight="800">More robust</text><text x="1022" y="315" text-anchor="middle" fill="#fff" font-size="29" font-weight="800">performance</text><rect x="945" y="365" width="155" height="105" rx="18" fill="#fff" opacity=".12"/><text x="1022" y="404" text-anchor="middle" fill="#bfdbfe" font-size="18">CV score</text><text x="1022" y="448" text-anchor="middle" fill="#fff" font-size="37" font-weight="800">mean</text><text x="1022" y="500" text-anchor="middle" fill="#dbeafe" font-size="18">not one lucky split</text>
  </g>
</svg>
