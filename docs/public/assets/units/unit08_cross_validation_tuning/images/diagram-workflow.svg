<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 590" role="img" aria-labelledby="title desc">
  <title id="title">Grid search selects the best hyperparameter combination</title>
  <desc id="desc">A score heatmap compares max depth and learning rate, highlights the best cell, and sends it to a selected model card.</desc>
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#f8fbff"/><stop offset="1" stop-color="#f5f3ff"/></linearGradient><linearGradient id="heat" x1="0" y1="1" x2="1" y2="0"><stop stop-color="#dbeafe"/><stop offset=".55" stop-color="#60a5fa"/><stop offset="1" stop-color="#16a34a"/></linearGradient><filter id="shadow" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#1e3a8a" flood-opacity=".12"/></filter></defs>
  <rect width="1200" height="590" rx="28" fill="url(#bg)"/><text x="60" y="68" fill="#0f172a" font-family="Inter,Arial,sans-serif" font-size="36" font-weight="800">Grid search makes the tuning decision visible</text><text x="60" y="102" fill="#64748b" font-family="Inter,Arial,sans-serif" font-size="20">Try a defined set of combinations, score each with cross-validation, then keep the strongest candidate.</text>
  <g filter="url(#shadow)"><rect x="80" y="145" width="640" height="415" rx="24" fill="#fff"/><rect x="760" y="145" width="360" height="415" rx="24" fill="#fff"/></g>
  <g font-family="Inter,Arial,sans-serif"><rect x="112" y="173" width="142" height="32" rx="16" fill="#ede9fe"/><text x="183" y="195" text-anchor="middle" fill="#6d28d9" font-size="17" font-weight="800">SEARCH SPACE</text><text x="112" y="242" fill="#0f172a" font-size="24" font-weight="800">Mean CV score for each combination</text>
    <g transform="translate(160 290)"><text x="252" y="-28" text-anchor="middle" fill="#64748b" font-size="18" font-weight="700">learning rate</text><text x="50" y="2" text-anchor="middle" fill="#64748b" font-size="17">0.01</text><text x="160" y="2" text-anchor="middle" fill="#64748b" font-size="17">0.10</text><text x="270" y="2" text-anchor="middle" fill="#64748b" font-size="17">1.00</text><text x="-54" y="112" transform="rotate(-90 -54 112)" text-anchor="middle" fill="#64748b" font-size="18" font-weight="700">max_depth</text><text x="-20" y="72" text-anchor="end" fill="#64748b" font-size="17">3</text><text x="-20" y="142" text-anchor="end" fill="#64748b" font-size="17">5</text><text x="-20" y="212" text-anchor="end" fill="#64748b" font-size="17">7</text>
      <g stroke="#fff" stroke-width="3"><rect x="0" y="20" width="100" height="60" fill="#bfdbfe"/><rect x="110" y="20" width="100" height="60" fill="#93c5fd"/><rect x="220" y="20" width="100" height="60" fill="#60a5fa"/><rect x="0" y="90" width="100" height="60" fill="#93c5fd"/><rect x="110" y="90" width="100" height="60" fill="#60a5fa"/><rect x="220" y="90" width="100" height="60" fill="#22c55e"/><rect x="0" y="160" width="100" height="60" fill="#bfdbfe"/><rect x="110" y="160" width="100" height="60" fill="#93c5fd"/><rect x="220" y="160" width="100" height="60" fill="#60a5fa"/></g><g fill="#0f172a" font-size="20" font-weight="800" text-anchor="middle"><text x="50" y="57">0.65</text><text x="160" y="57">0.74</text><text x="270" y="57">0.68</text><text x="50" y="127">0.78</text><text x="160" y="127">0.86</text><text x="270" y="127" fill="#fff">0.91</text><text x="50" y="197">0.69</text><text x="160" y="197">0.81</text><text x="270" y="197">0.75</text></g><rect x="220" y="90" width="100" height="60" rx="4" fill="none" stroke="#15803d" stroke-width="7"/></g>
    <text x="112" y="536" fill="#15803d" font-size="18" font-weight="800">Highest mean score wins → max_depth 5, learning_rate 0.10</text>
    <path d="M720 350 H760" stroke="#2563eb" stroke-width="3"/><path d="M760 350 l-10 -6 m10 6 l-10 6" fill="none" stroke="#2563eb" stroke-width="3" stroke-linecap="round"/>
    <rect x="792" y="180" width="130" height="32" rx="16" fill="#dcfce7"/><text x="857" y="201" text-anchor="middle" fill="#15803d" font-size="17" font-weight="800">SELECT</text><text x="792" y="252" fill="#0f172a" font-size="27" font-weight="800">Best candidate</text><rect x="792" y="285" width="296" height="105" rx="18" fill="#f0fdf4" stroke="#86efac" stroke-width="2"/><text x="820" y="322" fill="#15803d" font-size="20" font-weight="800">model configuration</text><text x="820" y="352" fill="#0f172a" font-size="20">max_depth = 5</text><text x="820" y="378" fill="#0f172a" font-size="20">learning_rate = 0.10</text><rect x="792" y="430" width="296" height="62" rx="16" fill="#0f3c9e"/><text x="940" y="457" text-anchor="middle" fill="#bfdbfe" font-size="17">CV score</text><text x="940" y="480" text-anchor="middle" fill="#fff" font-size="24" font-weight="800">0.91 • ready to compare</text>
  </g>
</svg>
