<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-label="Choosing LangChain or LlamaIndex"><defs><filter id="s"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity=".10"/></filter></defs><rect width="1200" height="700" rx="28" fill="#f8fafc"/><text x="70" y="78" font-family="DejaVu Sans,sans-serif" font-size="32" font-weight="800" fill="#172554">Choosing the right abstraction</text><text x="70" y="113" font-family="DejaVu Sans,sans-serif" font-size="17" fill="#64748b">Both frameworks can build RAG; choose based on the center of gravity of your app.</text><g filter="url(#s)"><rect x="90" y="190" width="440" height="350" rx="28" fill="#fff" stroke="#f59e0b" stroke-width="3"/><rect x="90" y="190" width="440" height="82" rx="28" fill="#fef3c7"/><text x="310" y="242" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="28" font-weight="800" fill="#92400e">LangChain</text><text x="150" y="335" font-family="DejaVu Sans,sans-serif" font-size="20" font-weight="700" fill="#334155">Best when you need:</text><text x="150" y="380" font-family="DejaVu Sans,sans-serif" font-size="18" fill="#475569">• many tools and app components</text><text x="150" y="420" font-family="DejaVu Sans,sans-serif" font-size="18" fill="#475569">• custom chains and agents</text><text x="150" y="460" font-family="DejaVu Sans,sans-serif" font-size="18" fill="#475569">• explicit composition</text></g><g filter="url(#s)"><rect x="670" y="190" width="440" height="350" rx="28" fill="#fff" stroke="#16a34a" stroke-width="3"/><rect x="670" y="190" width="440" height="82" rx="28" fill="#dcfce7"/><text x="890" y="242" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="28" font-weight="800" fill="#166534">LlamaIndex</text><text x="730" y="335" font-family="DejaVu Sans,sans-serif" font-size="20" font-weight="700" fill="#334155">Best when you need:</text><text x="730" y="380" font-family="DejaVu Sans,sans-serif" font-size="18" fill="#475569">• data ingestion and indexing</text><text x="730" y="420" font-family="DejaVu Sans,sans-serif" font-size="18" fill="#475569">• RAG-first workflows</text><text x="730" y="460" font-family="DejaVu Sans,sans-serif" font-size="18" fill="#475569">• fast document querying</text></g><text x="600" y="625" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="19" font-weight="700" fill="#334155">The right choice follows the product requirement, not the logo.</text></svg>
