<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 470" role="img" aria-labelledby="title desc"><title id="title">One agent runtime routes to three business tasks and then to business APIs</title><desc id="desc">A shared agent runtime splits at one junction to three tasks, which merge at another junction before one API call.</desc><defs><marker id="arrow" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto"><path d="M0 0L7 3.5L0 7Z" fill="#64748b"/></marker><style>.title{font:700 23px Inter,Arial,sans-serif;fill:#172554}.label{font:700 15px Inter,Arial,sans-serif}.note{font:500 13px Inter,Arial,sans-serif;fill:#475569}.small{font:600 12px Inter,Arial,sans-serif;fill:#64748b}</style></defs><rect width="760" height="470" rx="22" fill="#f8fafc"/><rect x="24" y="22" width="712" height="58" rx="15" fill="#fff" stroke="#2563eb" stroke-width="2"/><text x="380" y="59" text-anchor="middle" class="title">One agent runtime, many business tasks</text><rect x="42" y="104" width="676" height="304" rx="20" fill="#fff" stroke="#dbe4f0" stroke-width="2"/><text x="72" y="137" class="small">SHARED ORCHESTRATION PATTERN</text><rect x="72" y="220" width="180" height="80" rx="16" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/><text x="162" y="253" text-anchor="middle" class="label" fill="#1d4ed8">Agent runtime</text><text x="162" y="277" text-anchor="middle" class="note">memory + handoffs</text><path d="M252 260H286V260" fill="none" stroke="#64748b" stroke-width="2"/><circle cx="286" cy="260" r="4" fill="#64748b"/><rect x="320" y="150" width="170" height="60" rx="14" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="2"/><text x="405" y="185" text-anchor="middle" class="label" fill="#6d28d9">Report generation</text><rect x="320" y="230" width="170" height="60" rx="14" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/><text x="405" y="265" text-anchor="middle" class="label" fill="#047857">Data processing</text><rect x="320" y="310" width="170" height="60" rx="14" fill="#fff7ed" stroke="#f97316" stroke-width="2"/><text x="405" y="345" text-anchor="middle" class="label" fill="#c2410c">Business automation</text><path d="M286 260V180H320" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/><path d="M286 260H320" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/><path d="M286 260V340H320" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/><path d="M490 180H530V260" fill="none" stroke="#64748b" stroke-width="2"/><path d="M490 260H530" fill="none" stroke="#64748b" stroke-width="2"/><path d="M490 340H530V260" fill="none" stroke="#64748b" stroke-width="2"/><circle cx="530" cy="260" r="4" fill="#64748b"/><path d="M530 260H560" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/><rect x="560" y="220" width="142" height="80" rx="16" fill="#fff" stroke="#94a3b8" stroke-width="2"/><text x="631" y="253" text-anchor="middle" class="label" fill="#334155">Business APIs</text><text x="631" y="277" text-anchor="middle" class="note">real-world actions</text><text x="380" y="447" text-anchor="middle" class="note">The runtime chooses a task; one shared API boundary performs the action.</text></svg>
