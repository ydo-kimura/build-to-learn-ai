<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" role="img" aria-label="Input and output guardrails">
  <defs><marker id="arrow" markerWidth="4" markerHeight="4" refX="8" refY="4" markerUnits="strokeWidth" viewBox="0 0 8 8" orient="auto"><path d="M0 0L8 4L0 8Z" fill="#64748b"/></marker></defs>
  <rect width="900" height="500" rx="24" fill="#f8fafc"/><text x="54" y="58" font-family="Arial,sans-serif" font-size="28" font-weight="700" fill="#0f2d6b">Guardrails Around the LLM</text><text x="54" y="88" font-family="Arial,sans-serif" font-size="15" fill="#64748b">Inspect both sides of the model boundary</text>
  <g font-family="Arial,sans-serif">
    <rect x="40" y="150" width="130" height="132" rx="18" fill="#eff6ff" stroke="#3b82f6" stroke-width="3"/><text x="105" y="188" text-anchor="middle" font-size="18" font-weight="700" fill="#1d4ed8">USER</text><text x="105" y="212" text-anchor="middle" font-size="18" font-weight="700" fill="#1d4ed8">INPUT</text><text x="105" y="248" text-anchor="middle" font-size="13" fill="#64748b">prompt injection?</text>
    <line x1="170" y1="216" x2="200" y2="216" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="200" y="150" width="150" height="132" rx="18" fill="#fff1f2" stroke="#ef4444" stroke-width="3"/><text x="275" y="188" text-anchor="middle" font-size="18" font-weight="700" fill="#b91c1c">INPUT</text><text x="275" y="212" text-anchor="middle" font-size="18" font-weight="700" fill="#b91c1c">CHECK</text><text x="275" y="244" text-anchor="middle" font-size="14" fill="#334155">PII · jailbreak</text><text x="275" y="266" text-anchor="middle" font-size="13" fill="#64748b">allow or block</text>
    <line x1="350" y1="216" x2="380" y2="216" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="380" y="150" width="140" height="132" rx="18" fill="#eef2ff" stroke="#6366f1" stroke-width="3"/><text x="450" y="202" text-anchor="middle" font-size="18" font-weight="700" fill="#4338ca">MAIN LLM</text><text x="450" y="238" text-anchor="middle" font-size="13" fill="#64748b">generate response</text>
    <line x1="520" y1="216" x2="550" y2="216" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="550" y="150" width="160" height="132" rx="18" fill="#fff1f2" stroke="#ef4444" stroke-width="3"/><text x="630" y="188" text-anchor="middle" font-size="18" font-weight="700" fill="#b91c1c">OUTPUT</text><text x="630" y="212" text-anchor="middle" font-size="18" font-weight="700" fill="#b91c1c">CHECK</text><text x="630" y="244" text-anchor="middle" font-size="14" fill="#334155">PII · hallucination</text><text x="630" y="266" text-anchor="middle" font-size="13" fill="#64748b">rewrite or reject</text>
    <line x1="710" y1="216" x2="740" y2="216" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="740" y="150" width="120" height="132" rx="18" fill="#ecfdf5" stroke="#10b981" stroke-width="3"/><text x="800" y="188" text-anchor="middle" font-size="18" font-weight="700" fill="#047857">SAFE</text><text x="800" y="212" text-anchor="middle" font-size="18" font-weight="700" fill="#047857">OUTPUT</text><text x="800" y="244" text-anchor="middle" font-size="13" fill="#64748b">approved</text><text x="800" y="264" text-anchor="middle" font-size="13" fill="#64748b">result</text>
    <rect x="190" y="354" width="520" height="56" rx="16" fill="#fff" stroke="#cbd5e1" stroke-width="2"/><text x="450" y="389" text-anchor="middle" font-size="15" fill="#475569">Guardrails create decision points, not just warnings</text>
  </g>
</svg>
