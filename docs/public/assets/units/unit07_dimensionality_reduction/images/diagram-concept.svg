<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">PCA projects high-dimensional data onto two principal components</title>
  <desc id="desc">A visual comparison of a correlated three-dimensional data cloud and its two-dimensional PCA projection.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#f8fbff"/><stop offset="1" stop-color="#eef4ff"/></linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#2563eb"/><stop offset="1" stop-color="#1d4ed8"/></linearGradient>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M1 1 L8 4.5 L1 8" fill="none" stroke="#2563eb" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></marker>
    <marker id="axis-arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0 1L7 4L0 7" fill="none" stroke="#64748b" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#1e3a8a" flood-opacity=".12"/></filter>
  </defs>
  <rect width="1200" height="650" rx="28" fill="url(#bg)"/>
  <text x="60" y="68" fill="#0f172a" font-family="Inter,Arial,sans-serif" font-size="36" font-weight="800">PCA finds the view that preserves the signal</text>
  <text x="60" y="102" fill="#64748b" font-family="Inter,Arial,sans-serif" font-size="20">Compress many features into a few principal components while keeping the largest variance.</text>
  <g filter="url(#shadow)">
    <rect x="55" y="140" width="425" height="370" rx="24" fill="#fff"/>
    <rect x="505" y="140" width="190" height="370" rx="24" fill="#fff"/>
    <rect x="720" y="140" width="425" height="370" rx="24" fill="#fff"/>
  </g>
  <g font-family="Inter,Arial,sans-serif">
    <rect x="82" y="164" width="135" height="30" rx="15" fill="#dbeafe"/><text x="149" y="185" text-anchor="middle" fill="#1d4ed8" font-size="18" font-weight="800">BEFORE</text>
    <text x="82" y="237" fill="#0f172a" font-size="28" font-weight="800">High-dimensional data</text>
    <text x="82" y="267" fill="#64748b" font-size="20">Many features; hard to see and compute</text>
    <g transform="translate(20 60) scale(.86) translate(100 300)" stroke="#cbd5e1" stroke-width="2" fill="none">
      <path d="M0 130 L165 165 L285 105 L120 70 Z"/><path d="M0 130 L0 20 L120 -40 L120 70"/><path d="M120 70 L285 105 L285 -5 L120 -40"/>
      <path d="M0 75 L120 15 L285 50" stroke-dasharray="7 8"/><path d="M60 143 L60 3" stroke-dasharray="7 8"/><path d="M190 129 L190 -25" stroke-dasharray="7 8"/>
    </g>
    <g transform="translate(20 60) scale(.86)" fill="#2563eb" opacity=".88">
      <circle cx="150" cy="390" r="6"/><circle cx="177" cy="373" r="6"/><circle cx="202" cy="381" r="6"/><circle cx="225" cy="352" r="6"/><circle cx="251" cy="365" r="6"/><circle cx="270" cy="336" r="6"/><circle cx="294" cy="350" r="6"/><circle cx="320" cy="319" r="6"/><circle cx="343" cy="330" r="6"/><circle cx="367" cy="303" r="6"/>
    </g>
    <text x="82" y="472" fill="#1d4ed8" font-size="20" font-weight="700">30 features → difficult to visualize</text>
    <path d="M480 410 H561" fill="none" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow)"/>
    <path d="M639 410 H720" fill="none" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow)"/>
    <text x="600" y="290" text-anchor="middle" fill="#1d4ed8" font-size="18" font-weight="800">PROJECT</text>
    <text x="600" y="320" text-anchor="middle" fill="#64748b" font-size="18">choose directions</text>
    <text x="600" y="352" text-anchor="middle" fill="#64748b" font-size="18">with maximum variance</text>
    <circle cx="600" cy="410" r="39" fill="#eff6ff" stroke="#93c5fd" stroke-width="2"/><text x="600" y="417" text-anchor="middle" fill="#2563eb" font-size="24" font-weight="800">PCA</text>
    <rect x="747" y="164" width="135" height="30" rx="15" fill="#dcfce7"/><text x="814" y="185" text-anchor="middle" fill="#15803d" font-size="18" font-weight="800">AFTER</text>
    <text x="747" y="237" fill="#0f172a" font-size="28" font-weight="800">Two principal components</text>
    <text x="747" y="267" fill="#64748b" font-size="20"><tspan x="747" dy="0">A compact PC1 × PC2 view</tspan><tspan x="747" dy="26">of the same samples</tspan></text>
    <g transform="translate(770 305)">
      <path d="M0 150 H325 M0 150 V0" stroke="#94a3b8" stroke-width="2" marker-end="url(#axis-arrow)"/><path d="M0 112 H325 M0 74 H325 M0 36 H325" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="5 7"/>
      <g fill="#2563eb" opacity=".88"><circle cx="20" cy="128" r="6"/><circle cx="45" cy="116" r="6"/><circle cx="70" cy="112" r="6"/><circle cx="95" cy="99" r="6"/><circle cx="121" cy="88" r="6"/><circle cx="147" cy="85" r="6"/><circle cx="173" cy="70" r="6"/><circle cx="198" cy="62" r="6"/><circle cx="224" cy="53" r="6"/><circle cx="250" cy="42" r="6"/><circle cx="277" cy="35" r="6"/></g>
      <path d="M10 136 L290 28" stroke="#f97316" stroke-width="4" stroke-linecap="round"/><text x="162" y="183" text-anchor="middle" fill="#64748b" font-size="18">PC1</text><text x="-18" y="75" transform="rotate(-90 -18 75)" text-anchor="middle" fill="#64748b" font-size="18">PC2</text>
    </g>
    <rect x="747" y="454" width="350" height="38" rx="15" fill="#f0fdf4"/><text x="922" y="480" text-anchor="middle" fill="#15803d" font-size="18" font-weight="700">Less noise • easier analysis • faster models</text>
  </g>
</svg>
