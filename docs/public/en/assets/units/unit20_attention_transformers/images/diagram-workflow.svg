<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1536 860" role="img" aria-label="Transformer block with attention, feed-forward layers, and local residual connections">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#f8fbff"/><stop offset="1" stop-color="#eef2ff"/></linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#2563eb"/><stop offset="1" stop-color="#4f46e5"/></linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#ea580c"/><stop offset="1" stop-color="#f59e0b"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#172554" flood-opacity=".12"/></filter>
    <marker id="flow" markerWidth="4" markerHeight="4" refX="8" refY="4" markerUnits="strokeWidth" viewBox="0 0 8 8" orient="auto"><path d="M0 0L8 4L0 8Z" fill="#2563eb"/></marker>
    <marker id="small" markerWidth="4" markerHeight="4" refX="8" refY="4" markerUnits="strokeWidth" viewBox="0 0 8 8" orient="auto"><path d="M0 0L8 4L0 8Z" fill="#64748b"/></marker>
    <marker id="orangeArrow" markerWidth="4" markerHeight="4" refX="8" refY="4" markerUnits="strokeWidth" viewBox="0 0 8 8" orient="auto"><path d="M0 0L8 4L0 8Z" fill="#ea580c"/></marker>
    <marker id="redArrow" markerWidth="4" markerHeight="4" refX="8" refY="4" markerUnits="strokeWidth" viewBox="0 0 8 8" orient="auto"><path d="M0 0L8 4L0 8Z" fill="#dc2626"/></marker>
    <marker id="greenArrow" markerWidth="4" markerHeight="4" refX="8" refY="4" markerUnits="strokeWidth" viewBox="0 0 8 8" orient="auto"><path d="M0 0L8 4L0 8Z" fill="#16a34a"/></marker>
  </defs>
  <rect width="1536" height="920" rx="28" fill="url(#bg)"/>
  <rect x="40" y="34" width="1456" height="112" rx="22" fill="#fff" filter="url(#shadow)"/>
  <rect x="70" y="63" width="220" height="54" rx="27" fill="url(#blue)"/><text x="180" y="98" text-anchor="middle" font-family="Arial,sans-serif" font-size="20" font-weight="700" letter-spacing=".5" fill="#fff">TRANSFORMER</text>
  <text x="322" y="100" font-family="Arial,sans-serif" font-size="38" font-weight="700" fill="#172554">Read in parallel, preserve order, refine meaning</text>
  <text x="70" y="184" font-family="Arial,sans-serif" font-size="22" fill="#475569">Each sublayer has its own residual path: the transformed signal and the shortcut meet at <tspan font-weight="700" fill="#2563eb">Add + LayerNorm</tspan>.</text>

  <g filter="url(#shadow)">
    <rect x="40" y="240" width="240" height="500" rx="24" fill="#fff"/><rect x="40" y="240" width="240" height="70" rx="24" fill="#334155"/><rect x="40" y="286" width="240" height="24" fill="#334155"/>
    <text x="160" y="284" text-anchor="middle" font-family="Arial,sans-serif" font-size="26" font-weight="700" fill="#fff">INPUT</text><text x="160" y="368" text-anchor="middle" font-family="Arial,sans-serif" font-size="22" font-weight="700" fill="#334155">tokens</text>
    <g font-family="Arial,sans-serif" font-size="19" font-weight="700" text-anchor="middle"><rect x="82" y="405" width="156" height="45" rx="12" fill="#f1f5f9"/><text x="160" y="434" fill="#475569">The cat</text><rect x="82" y="463" width="156" height="45" rx="12" fill="#f1f5f9"/><text x="160" y="492" fill="#475569">chased</text><rect x="82" y="521" width="156" height="45" rx="12" fill="#f1f5f9"/><text x="160" y="550" fill="#475569">the dog</text></g>
    <text x="160" y="650" text-anchor="middle" font-family="Arial,sans-serif" font-size="20" fill="#64748b">embedding vectors</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="320" y="240" width="240" height="500" rx="24" fill="#fff"/><rect x="320" y="240" width="240" height="70" rx="24" fill="url(#blue)"/><rect x="320" y="286" width="240" height="24" fill="url(#blue)"/>
    <text x="440" y="284" text-anchor="middle" font-family="Arial,sans-serif" font-size="25" font-weight="700" fill="#fff">POSITION</text><text x="440" y="360" text-anchor="middle" font-family="Arial,sans-serif" font-size="22" font-weight="700" fill="#1d4ed8">add order information</text>
    <g font-family="Arial,sans-serif" font-size="20" text-anchor="middle"><rect x="360" y="410" width="160" height="50" rx="12" fill="#dbeafe"/><text x="440" y="442" fill="#1d4ed8">+ pos 1</text><rect x="360" y="476" width="160" height="50" rx="12" fill="#bfdbfe"/><text x="440" y="508" fill="#1d4ed8">+ pos 2</text><rect x="360" y="542" width="160" height="50" rx="12" fill="#93c5fd"/><text x="440" y="574" fill="#1d4ed8">+ pos 3</text></g>
    <text x="440" y="650" text-anchor="middle" font-family="Arial,sans-serif" font-size="20" fill="#64748b">parallel processing</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="600" y="210" width="330" height="530" rx="24" fill="#fff" stroke="#2563eb" stroke-width="4"/><rect x="600" y="210" width="330" height="78" rx="24" fill="url(#blue)"/><rect x="600" y="264" width="330" height="24" fill="url(#blue)"/>
    <text x="765" y="259" text-anchor="middle" font-family="Arial,sans-serif" font-size="29" font-weight="700" fill="#fff">SELF-ATTENTION</text><text x="765" y="336" text-anchor="middle" font-family="Arial,sans-serif" font-size="20" font-weight="700" fill="#475569">mix context across tokens</text>
    <rect x="640" y="380" width="105" height="48" rx="12" fill="#dbeafe"/><text x="692" y="411" text-anchor="middle" font-family="Arial,sans-serif" font-size="18" font-weight="700" fill="#1d4ed8">INPUT X</text>
    <rect x="760" y="380" width="140" height="48" rx="12" fill="#ede9fe"/><text x="830" y="411" text-anchor="middle" font-family="Arial,sans-serif" font-size="16" font-weight="700" fill="#6d28d9">Q×K → weights</text>
    <rect x="690" y="470" width="210" height="48" rx="12" fill="#ffedd5"/><text x="795" y="501" text-anchor="middle" font-family="Arial,sans-serif" font-size="18" font-weight="700" fill="#c2410c">weights × V → context</text>
    <rect x="640" y="600" width="260" height="58" rx="14" fill="#eff6ff" stroke="#60a5fa" stroke-width="3"/><text x="770" y="635" text-anchor="middle" font-family="Arial,sans-serif" font-size="20" font-weight="700" fill="#1d4ed8">ADD + LAYERNORM</text>
    <path d="M745 404H760" fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#small)"/><path d="M830 428V470" fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#small)"/><path d="M795 518V600" fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#small)"/>
    <path d="M670 428V600" fill="none" stroke="#64748b" stroke-width="3" stroke-dasharray="8 8" marker-end="url(#small)"/><text x="650" y="520" font-family="Arial,sans-serif" font-size="17" font-weight="700" fill="#64748b" transform="rotate(-90 650 520)">shortcut</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="970" y="240" width="300" height="500" rx="24" fill="#fff"/><rect x="970" y="240" width="300" height="70" rx="24" fill="url(#orange)"/><rect x="970" y="286" width="300" height="24" fill="url(#orange)"/>
    <text x="1120" y="284" text-anchor="middle" font-family="Arial,sans-serif" font-size="25" font-weight="700" fill="#fff">FEED-FORWARD</text><text x="1120" y="360" text-anchor="middle" font-family="Arial,sans-serif" font-size="21" font-weight="700" fill="#c2410c">transform each token</text>
    <rect x="1010" y="380" width="110" height="48" rx="12" fill="#fff7ed" stroke="#fb923c" stroke-width="3"/><text x="1065" y="411" text-anchor="middle" font-family="Arial,sans-serif" font-size="18" font-weight="700" fill="#c2410c">INPUT X'</text>
    <rect x="1060" y="460" width="180" height="54" rx="13" fill="#ffedd5" stroke="#fb923c" stroke-width="3"/><text x="1150" y="495" text-anchor="middle" font-family="Arial,sans-serif" font-size="20" font-weight="700" fill="#c2410c">Linear → ReLU</text>
    <rect x="1060" y="532" width="180" height="54" rx="13" fill="#fef3c7" stroke="#f59e0b" stroke-width="3"/><text x="1150" y="567" text-anchor="middle" font-family="Arial,sans-serif" font-size="20" font-weight="700" fill="#b45309">Linear</text>
    <rect x="1000" y="620" width="240" height="58" rx="14" fill="#fff7ed" stroke="#fb923c" stroke-width="3"/><text x="1120" y="655" text-anchor="middle" font-family="Arial,sans-serif" font-size="20" font-weight="700" fill="#c2410c">ADD + LAYERNORM</text>
    <path d="M1120 404H1150V460" fill="none" stroke="#ea580c" stroke-width="3" marker-end="url(#orangeArrow)"/>
    <path d="M1150 514V532" fill="none" stroke="#ea580c" stroke-width="3" marker-end="url(#orangeArrow)"/><path d="M1150 586V620" fill="none" stroke="#ea580c" stroke-width="3" marker-end="url(#orangeArrow)"/>
    <path d="M1035 428V620" fill="none" stroke="#64748b" stroke-width="3" stroke-dasharray="8 8" marker-end="url(#small)"/><text x="1015" y="540" font-family="Arial,sans-serif" font-size="17" font-weight="700" fill="#64748b" transform="rotate(-90 1015 540)">shortcut</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1310" y="240" width="186" height="500" rx="24" fill="#fff"/><rect x="1310" y="240" width="186" height="70" rx="24" fill="#0f766e"/><rect x="1310" y="286" width="186" height="24" fill="#0f766e"/>
    <text x="1403" y="284" text-anchor="middle" font-family="Arial,sans-serif" font-size="25" font-weight="700" fill="#fff">OUTPUT</text><circle cx="1403" cy="440" r="48" fill="#ecfdf5" stroke="#14b8a6" stroke-width="5"/><path d="M1379 440L1397 458L1429 422" fill="none" stroke="#0f766e" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/><text x="1403" y="560" text-anchor="middle" font-family="Arial,sans-serif" font-size="21" font-weight="700" fill="#0f766e">context</text><text x="1403" y="590" text-anchor="middle" font-family="Arial,sans-serif" font-size="21" font-weight="700" fill="#0f766e">aware</text>
  </g>

  <g fill="none" stroke="#2563eb" stroke-width="4" stroke-linecap="round" marker-end="url(#flow)"><path d="M280 430H320"/><path d="M560 414H600"/><path d="M900 629H950V404H1010"/><path d="M1240 649H1310"/></g>
  <text x="768" y="830" text-anchor="middle" font-family="Arial,sans-serif" font-size="22" font-weight="700" fill="#475569">Each sublayer combines a learned transform with a clean shortcut path.</text>
</svg>
