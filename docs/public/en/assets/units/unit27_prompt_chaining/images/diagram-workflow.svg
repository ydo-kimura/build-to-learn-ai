<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-label="Benefits of prompt chaining"><defs><marker id="a" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0 0L8 3L0 6Z" fill="#64748b"/></marker><filter id="s"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity=".10"/></filter></defs><rect width="1200" height="700" rx="28" fill="#f8fafc"/><text x="70" y="78" font-family="DejaVu Sans,sans-serif" font-size="32" font-weight="800" fill="#172554">Why split the work?</text><text x="70" y="113" font-family="DejaVu Sans,sans-serif" font-size="17" fill="#64748b">Chaining trades one giant prompt for a pipeline you can inspect and improve.</text><path d="M290 340H390" stroke="#64748b" stroke-width="4" marker-end="url(#a)"/><path d="M600 340H700" stroke="#64748b" stroke-width="4" marker-end="url(#a)"/><path d="M910 340H1010" stroke="#64748b" stroke-width="4" marker-end="url(#a)"/><g filter="url(#s)"><rect x="70" y="210" width="220" height="250" rx="24" fill="#fff" stroke="#2563eb" stroke-width="3"/><text x="180" y="275" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="23" font-weight="800" fill="#1d4ed8">Decompose</text><text x="180" y="345" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="18" fill="#334155">one job per step</text><text x="180" y="385" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="15" fill="#64748b">less ambiguity</text></g><g filter="url(#s)"><rect x="390" y="210" width="210" height="250" rx="24" fill="#fff" stroke="#7c3aed" stroke-width="3"/><text x="495" y="275" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="23" font-weight="800" fill="#6d28d9">Inspect</text><text x="495" y="345" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="18" fill="#334155">see intermediate data</text><text x="495" y="385" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="15" fill="#64748b">debug faster</text></g><g filter="url(#s)"><rect x="700" y="210" width="210" height="250" rx="24" fill="#fff" stroke="#f59e0b" stroke-width="3"/><text x="805" y="275" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="23" font-weight="800" fill="#b45309">Validate</text><text x="805" y="345" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="18" fill="#334155">test each output</text><text x="805" y="385" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="15" fill="#64748b">catch errors early</text></g><g filter="url(#s)"><rect x="1010" y="210" width="140" height="250" rx="24" fill="#fff" stroke="#16a34a" stroke-width="3"/><text x="1080" y="275" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="22" font-weight="800" fill="#15803d">Ship</text><text x="1080" y="345" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="18" fill="#334155">quality</text><text x="1080" y="385" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="15" fill="#64748b">repeatable</text></g></svg>
