<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-label="Prompt chaining flow"><defs><marker id="a" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0 0L8 3L0 6Z" fill="#64748b"/></marker><filter id="s"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity=".10"/></filter></defs><rect width="1200" height="700" rx="28" fill="#f8fafc"/><text x="70" y="78" font-family="DejaVu Sans,sans-serif" font-size="32" font-weight="800" fill="#172554">Prompt chaining</text><text x="70" y="113" font-family="DejaVu Sans,sans-serif" font-size="17" fill="#64748b">Each step has one job; its output becomes the next step's input.</text><path d="M260 340H335" stroke="#64748b" stroke-width="4" marker-end="url(#a)"/><path d="M555 340H630" stroke="#64748b" stroke-width="4" marker-end="url(#a)"/><path d="M850 340H925" stroke="#64748b" stroke-width="4" marker-end="url(#a)"/><g filter="url(#s)"><rect x="70" y="210" width="190" height="250" rx="24" fill="#fff" stroke="#2563eb" stroke-width="3"/><text x="165" y="270" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="22" font-weight="800" fill="#1d4ed8">Input</text><rect x="105" y="315" width="120" height="62" rx="12" fill="#dbeafe"/><text x="165" y="354" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="18" fill="#1e40af">topic</text></g><g filter="url(#s)"><rect x="335" y="210" width="220" height="250" rx="24" fill="#fff" stroke="#7c3aed" stroke-width="3"/><text x="445" y="270" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="22" font-weight="800" fill="#6d28d9">Prompt 1</text><rect x="385" y="315" width="120" height="62" rx="12" fill="#ede9fe"/><text x="445" y="354" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="18" fill="#6d28d9">title</text></g><g filter="url(#s)"><rect x="630" y="210" width="220" height="250" rx="24" fill="#fff" stroke="#f59e0b" stroke-width="3"/><text x="740" y="270" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="22" font-weight="800" fill="#b45309">Prompt 2</text><rect x="680" y="315" width="120" height="62" rx="12" fill="#fef3c7"/><text x="740" y="354" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="18" fill="#92400e">outline</text></g><g filter="url(#s)"><rect x="925" y="210" width="205" height="250" rx="24" fill="#fff" stroke="#16a34a" stroke-width="3"/><text x="1027" y="270" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="22" font-weight="800" fill="#15803d">Prompt 3</text><rect x="965" y="315" width="125" height="62" rx="12" fill="#dcfce7"/><text x="1027" y="354" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="18" fill="#166534">final post</text></g><text x="600" y="610" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="19" font-weight="700" fill="#334155">Small, testable steps make complex generation easier to debug.</text></svg>
