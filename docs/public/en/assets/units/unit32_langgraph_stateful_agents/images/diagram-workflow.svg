<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 470" role="img" aria-labelledby="title desc"><title id="title">LangGraph support ticket routing with three evenly spaced conditional branches</title><desc id="desc">A ticket enters a classifier, then one shared junction branches to Billing, Technical, or Escalate.</desc><defs><marker id="arrow" markerWidth="4" markerHeight="4" refX="8" refY="4" markerUnits="strokeWidth" viewBox="0 0 8 8" orient="auto"><path d="M0 0L8 4L0 8Z" fill="#64748b"/></marker><style>.title{font:700 23px Inter,Arial,sans-serif;fill:#172554}.label{font:700 15px Inter,Arial,sans-serif}.note{font:500 13px Inter,Arial,sans-serif;fill:#475569}.small{font:600 12px Inter,Arial,sans-serif;fill:#64748b}</style></defs><rect width="760" height="470" rx="22" fill="#f8fafc"/><rect x="24" y="22" width="712" height="58" rx="15" fill="#fff" stroke="#2563eb" stroke-width="2"/><text x="380" y="59" text-anchor="middle" class="title">Ticket routing with conditional edges</text><rect x="42" y="104" width="676" height="304" rx="20" fill="#fff" stroke="#dbe4f0" stroke-width="2"/><text x="72" y="137" class="small">ONE STATE, THREE POSSIBLE ROUTES</text><rect x="72" y="231" width="145" height="78" rx="16" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/><text x="144" y="263" text-anchor="middle" class="label" fill="#1d4ed8">Incoming ticket</text><text x="144" y="287" text-anchor="middle" class="note">shared State</text><rect x="270" y="231" width="142" height="78" rx="16" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="2"/><text x="341" y="263" text-anchor="middle" class="label" fill="#6d28d9">Classify</text><text x="341" y="287" text-anchor="middle" class="note">inspect intent</text><path d="M218 270H269" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/><path d="M413 270H450" fill="none" stroke="#64748b" stroke-width="2"/><circle cx="450" cy="270" r="4" fill="#64748b"/><rect x="500" y="155" width="166" height="50" rx="14" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/><text x="583" y="186" text-anchor="middle" class="label" fill="#047857">Billing</text><rect x="500" y="245" width="166" height="50" rx="14" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/><text x="583" y="276" text-anchor="middle" class="label" fill="#1d4ed8">Technical</text><rect x="500" y="335" width="166" height="50" rx="14" fill="#fff7ed" stroke="#f97316" stroke-width="2"/><text x="583" y="366" text-anchor="middle" class="label" fill="#c2410c">Escalate to human</text><path d="M450 270V180H499" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/><path d="M450 270H499" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/><path d="M450 270V360H499" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/><text x="380" y="447" text-anchor="middle" class="note">Conditional edges keep routing rules explicit and easy to test.</text></svg>
