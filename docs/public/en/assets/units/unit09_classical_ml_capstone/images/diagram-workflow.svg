<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 610" role="img" aria-labelledby="title desc">
  <title id="title">Machine learning capstone deliverables</title>
  <desc id="desc">The capstone produces three connected artifacts: an evaluation report, a saved model, and a reproducible notebook.</desc>
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#f8fbff"/><stop offset="1" stop-color="#f5f3ff"/></linearGradient><marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M1 1 L8 4.5 L1 8" fill="none" stroke="#2563eb" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></marker><filter id="shadow" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#1e3a8a" flood-opacity=".12"/></filter></defs>
  <rect width="1200" height="610" rx="28" fill="url(#bg)"/><text x="60" y="68" fill="#0f172a" font-family="Inter,Arial,sans-serif" font-size="36" font-weight="800">A finished project leaves an evidence trail</text><text x="60" y="102" fill="#64748b" font-family="Inter,Arial,sans-serif" font-size="20">The model is only one output. A professional capstone also explains what happened and how to reproduce it.</text>
  <g filter="url(#shadow)"><rect x="55" y="150" width="1090" height="370" rx="24" fill="#fff"/><rect x="55" y="550" width="1090" height="45" rx="16" fill="#0f3c9e"/></g>
  <g font-family="Inter,Arial,sans-serif"><text x="88" y="190" fill="#7c3aed" font-size="17" font-weight="800" letter-spacing="2">THREE DELIVERABLES</text>
    <g><rect x="88" y="225" width="285" height="240" rx="22" fill="#fff7ed" stroke="#fb923c" stroke-width="2"/><circle cx="145" cy="285" r="28" fill="#f97316"/><path d="M132 277 H158 M132 287 H158 M132 297 H151" stroke="#fff" stroke-width="4" stroke-linecap="round"/><text x="190" y="275" fill="#c2410c" font-size="23" font-weight="800"><tspan x="190" dy="0">EVALUATION</tspan><tspan x="190" dy="29">REPORT</tspan></text><text x="118" y="342" fill="#475569" font-size="19">Metrics and comparisons</text><text x="118" y="369" fill="#475569" font-size="19">RMSE / accuracy / CV</text><rect x="118" y="405" width="210" height="32" rx="16" fill="#fff"/><text x="223" y="426" text-anchor="middle" fill="#c2410c" font-size="17" font-weight="700">why this model won</text></g>
    <g><rect x="458" y="225" width="285" height="240" rx="22" fill="#f0fdf4" stroke="#4ade80" stroke-width="2"/><circle cx="515" cy="285" r="28" fill="#16a34a"/><path d="M503 278 H528 V304 H503 Z M508 273 H523 V278 H508 Z" fill="none" stroke="#fff" stroke-width="3"/><text x="560" y="283" fill="#15803d" font-size="23" font-weight="800">SAVED MODEL</text><text x="488" y="342" fill="#475569" font-size="19">Trained artifact</text><text x="488" y="369" fill="#475569" font-size="19">ready for later inference</text><rect x="488" y="405" width="210" height="32" rx="16" fill="#fff"/><text x="593" y="426" text-anchor="middle" fill="#15803d" font-size="17" font-weight="700">versioned + reusable</text></g>
    <g><rect x="828" y="225" width="285" height="240" rx="22" fill="#eff6ff" stroke="#60a5fa" stroke-width="2"/><circle cx="885" cy="285" r="28" fill="#2563eb"/><path d="M872 272 H893 L900 279 V305 H872 Z M893 272 V280 H900 M878 289 H894 M878 299 H894" fill="none" stroke="#fff" stroke-width="3" stroke-linejoin="round"/><text x="930" y="283" fill="#1d4ed8" font-size="23" font-weight="800">NOTEBOOK</text><text x="858" y="342" fill="#475569" font-size="19">Data, code, charts</text><text x="858" y="369" fill="#475569" font-size="19">and decisions in one place</text><rect x="858" y="405" width="210" height="32" rx="16" fill="#fff"/><text x="963" y="426" text-anchor="middle" fill="#1d4ed8" font-size="17" font-weight="700">reproducible story</text></g>
    <text x="600" y="579" text-anchor="middle" fill="#fff" font-size="18" font-weight="700">Together: a result you can explain, reproduce, and improve.</text>
  </g>
</svg>
