<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" role="img" aria-labelledby="title desc"><title id="title">From word id to embedding</title><desc id="desc">A word id selects one row from an embedding matrix and returns a dense vector for a neural network.</desc><defs><marker id="a" markerWidth="4" markerHeight="4" refX="8" refY="4" markerUnits="strokeWidth" viewBox="0 0 8 8" orient="auto"><path d="M0 0L8 4L0 8Z" fill="#64748b"/></marker></defs><rect width="900" height="520" rx="24" fill="#f8fafc"/><rect x="32" y="28" width="836" height="72" rx="16" fill="#fff" stroke="#7c3aed" stroke-width="3"/><text x="64" y="74" font-family="DejaVu Sans,sans-serif" font-size="28" font-weight="700" fill="#2e1065">A lookup turns IDs into meaning-rich vectors</text><text x="838" y="73" text-anchor="end" font-family="DejaVu Sans,sans-serif" font-size="16" fill="#7c3aed">embedding layer</text><g font-family="DejaVu Sans,sans-serif"><rect x="62" y="170" width="168" height="220" rx="18" fill="#fff" stroke="#3b82f6" stroke-width="2"/><text x="92" y="210" font-size="20" font-weight="700" fill="#1d4ed8">Word ID</text><rect x="94" y="250" width="104" height="56" rx="12" fill="#dbeafe"/><text x="146" y="286" text-anchor="middle" font-size="24" font-weight="700" fill="#1d4ed8">42</text><text x="92" y="348" font-size="15" fill="#64748b">“cat” in vocabulary</text><line x1="230" y1="280" x2="282" y2="280" stroke="#64748b" stroke-width="3" marker-end="url(#a)"/><rect x="282" y="170" width="268" height="220" rx="18" fill="#fff" stroke="#f59e0b" stroke-width="2"/><text x="312" y="210" font-size="20" font-weight="700" fill="#b45309">Embedding matrix</text><text x="312" y="240" font-size="14" fill="#64748b">one row per word</text><g stroke="#f59e0b" stroke-width="1.5"><rect x="312" y="260" width="180" height="28" fill="#fef3c7"/><rect x="312" y="288" width="180" height="28" fill="#fde68a"/><rect x="312" y="316" width="180" height="28" fill="#fef3c7"/><rect x="312" y="344" width="180" height="28" fill="#fde68a"/></g><line x1="312" y1="330" x2="492" y2="330" stroke="#dc2626" stroke-width="4"/><text x="505" y="335" font-size="13" fill="#dc2626">row 42</text><line x1="550" y1="280" x2="602" y2="280" stroke="#64748b" stroke-width="3" marker-end="url(#a)"/><rect x="602" y="170" width="236" height="220" rx="18" fill="#fff" stroke="#16a34a" stroke-width="2"/><text x="632" y="210" font-size="20" font-weight="700" fill="#15803d">Dense vector</text><text x="632" y="244" font-size="16" fill="#334155">[ 0.18, -0.42,</text><text x="632" y="271" font-size="16" fill="#334155">  0.77, … ]</text><circle cx="670" cy="326" r="8" fill="#2563eb"/><circle cx="712" cy="306" r="8" fill="#7c3aed"/><circle cx="754" cy="338" r="8" fill="#16a34a"/><text x="632" y="370" font-size="15" fill="#64748b">feeds the neural net</text></g><rect x="62" y="432" width="776" height="56" rx="14" fill="#f0fdf4"/><text x="450" y="467" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="17" font-weight="600" fill="#166534">Words with similar usage tend to land near one another.</text></svg>
