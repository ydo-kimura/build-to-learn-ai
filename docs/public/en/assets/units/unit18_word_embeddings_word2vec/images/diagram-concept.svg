<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" role="img" aria-labelledby="title desc"><title id="title">Word2Vec learns from context</title><desc id="desc">Words used in similar contexts receive nearby dense vectors.</desc><defs><marker id="a" markerWidth="4" markerHeight="4" refX="8" refY="4" markerUnits="strokeWidth" viewBox="0 0 8 8" orient="auto"><path d="M0 0L8 4L0 8Z" fill="#64748b"/></marker></defs><rect width="900" height="520" rx="24" fill="#f8fafc"/><rect x="32" y="28" width="836" height="72" rx="16" fill="#fff" stroke="#2563eb" stroke-width="3"/><text x="64" y="74" font-family="DejaVu Sans,sans-serif" font-size="28" font-weight="700" fill="#172554">Meaning comes from context</text><text x="838" y="73" text-anchor="end" font-family="DejaVu Sans,sans-serif" font-size="16" fill="#2563eb">Word2Vec</text><g font-family="DejaVu Sans,sans-serif"><rect x="58" y="166" width="244" height="250" rx="18" fill="#fff" stroke="#94a3b8" stroke-width="2"/><text x="88" y="205" font-size="20" font-weight="700" fill="#172554">1 · Context window</text><text x="88" y="246" font-size="17" fill="#334155">the cat drinks milk</text><rect x="88" y="280" width="184" height="46" rx="10" fill="#dbeafe"/><text x="180" y="309" text-anchor="middle" font-size="18" font-weight="700" fill="#1d4ed8">target: cat</text><text x="88" y="366" font-size="15" fill="#64748b">nearby words are clues</text><line x1="302" y1="290" x2="348" y2="290" stroke="#64748b" stroke-width="3" marker-end="url(#a)"/><rect x="348" y="166" width="204" height="250" rx="18" fill="#fff" stroke="#7c3aed" stroke-width="2"/><text x="378" y="205" font-size="20" font-weight="700" fill="#6d28d9">2 · Learn</text><text x="378" y="245" font-size="17" fill="#334155">predict context</text><circle cx="412" cy="300" r="18" fill="#c4b5fd"/><circle cx="458" cy="280" r="18" fill="#a78bfa"/><circle cx="504" cy="322" r="18" fill="#8b5cf6"/><line x1="412" y1="300" x2="458" y2="280" stroke="#c4b5fd" stroke-width="2"/><line x1="458" y1="280" x2="504" y2="322" stroke="#c4b5fd" stroke-width="2"/><text x="378" y="366" font-size="15" fill="#64748b">adjust vector values</text><line x1="552" y1="290" x2="598" y2="290" stroke="#64748b" stroke-width="3" marker-end="url(#a)"/><rect x="598" y="166" width="244" height="250" rx="18" fill="#fff" stroke="#16a34a" stroke-width="2"/><text x="628" y="205" font-size="20" font-weight="700" fill="#15803d">3 · Similar space</text><circle cx="684" cy="294" r="24" fill="#bfdbfe" stroke="#2563eb" stroke-width="3"/><circle cx="750" cy="274" r="24" fill="#c4b5fd" stroke="#7c3aed" stroke-width="3"/><circle cx="718" cy="352" r="24" fill="#bbf7d0" stroke="#16a34a" stroke-width="3"/><text x="684" y="300" text-anchor="middle" font-size="14" fill="#1e3a8a">cat</text><text x="750" y="280" text-anchor="middle" font-size="14" fill="#4c1d95">dog</text><text x="718" y="358" text-anchor="middle" font-size="14" fill="#14532d">pet</text><text x="628" y="390" font-size="15" fill="#64748b">similar contexts → nearby</text></g><rect x="58" y="446" width="784" height="42" rx="12" fill="#eff6ff"/><text x="450" y="473" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="16" font-weight="600" fill="#1e40af">Word2Vec discovers the axes; people do not hand-design them.</text></svg>
