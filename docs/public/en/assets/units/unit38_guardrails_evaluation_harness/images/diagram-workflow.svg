<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" role="img" aria-label="An evaluation harness runs test cases, captures candidate output, judges it against a rubric, and tracks scores">
  <defs>
    <filter id="s"><feDropShadow dx="0" dy="6" stdDeviation="7" flood-opacity=".1"/></filter>
    <marker id="a" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0 0L8 4L0 8Z" fill="#475569"/></marker>
  </defs>
  <rect width="900" height="400" rx="20" fill="#f8fafc"/>
  <rect x="24" y="20" width="852" height="56" rx="14" fill="#fff" stroke="#7c3aed" stroke-width="2" filter="url(#s)"/>
  <text x="450" y="55" text-anchor="middle" font-family="Arial,sans-serif" font-size="22" fill="#6d28d9" font-weight="700">Evaluation harness</text>
  <rect x="28" y="96" width="844" height="226" rx="18" fill="#fff" stroke="#ede9fe" stroke-width="2" filter="url(#s)"/>
  <rect x="40" y="125" width="135" height="65" rx="12" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="107" y="153" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#1d4ed8" font-weight="700">Test cases</text>
  <text x="107" y="173" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#64748b">inputs</text>
  <path d="M175 157H205" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>
  <rect x="205" y="125" width="135" height="65" rx="12" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="2"/>
  <text x="272" y="153" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#6d28d9" font-weight="700">App / LLM</text>
  <text x="272" y="173" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#64748b">run candidate</text>
  <path d="M340 157H370" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>
  <rect x="370" y="125" width="145" height="65" rx="12" fill="#fff7ed" stroke="#f59e0b" stroke-width="2"/>
  <text x="442" y="153" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#b45309" font-weight="700">Candidate output</text>
  <text x="442" y="173" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#64748b">actual answer</text>
  <rect x="545" y="202" width="140" height="65" rx="12" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="2"/>
  <text x="615" y="230" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#6d28d9" font-weight="700">LLM judge</text>
  <text x="615" y="250" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#64748b">rubric decision</text>
  <path d="M685 234H715" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>
  <rect x="715" y="202" width="135" height="65" rx="12" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="782" y="230" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#15803d" font-weight="700">Scores</text>
  <text x="782" y="250" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#64748b">regression log</text>
  <rect x="370" y="245" width="145" height="60" rx="12" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="442" y="271" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#b91c1c" font-weight="700">Expected / rubric</text>
  <text x="442" y="289" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#64748b">reference criteria</text>
  <path d="M515 157H530V234" fill="none" stroke="#475569" stroke-width="2"/>
  <path d="M515 275H530V234" fill="none" stroke="#475569" stroke-width="2"/>
  <circle cx="530" cy="234" r="4" fill="#475569"/>
  <path d="M530 234H545" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>
  <text x="450" y="348" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#475569">Judge the candidate against the expected behavior, then track regressions</text>
</svg>
