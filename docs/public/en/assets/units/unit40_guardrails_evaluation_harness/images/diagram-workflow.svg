<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" role="img" aria-labelledby="title desc"><title id="title">Evaluation harness compares candidate output with expected behavior</title><desc id="desc">Test cases run through an app or LLM to produce candidate output; expected behavior and rubric independently enter a judge that produces scores.</desc><defs><marker id="arrow" markerWidth="4" markerHeight="4" refX="8" refY="4" markerUnits="strokeWidth" viewBox="0 0 8 8" orient="auto"><path d="M0 0L8 4L0 8Z" fill="#64748b"/></marker></defs><rect width="900" height="560" rx="24" fill="#f8fafc"/><text x="54" y="58" font-family="Arial,sans-serif" font-size="28" font-weight="700" fill="#4c1d95">Evaluation Harness</text><text x="54" y="88" font-family="Arial,sans-serif" font-size="15" fill="#64748b">Turn test cases into repeatable quality gates</text><g font-family="Arial,sans-serif"><rect x="54" y="150" width="150" height="110" rx="18" fill="#eff6ff" stroke="#3b82f6" stroke-width="3"/><text x="129" y="190" text-anchor="middle" font-size="18" font-weight="700" fill="#1d4ed8">TEST CASES</text><text x="129" y="222" text-anchor="middle" font-size="15" fill="#334155">inputs</text><text x="129" y="244" text-anchor="middle" font-size="13" fill="#64748b">golden prompts</text><rect x="245" y="150" width="150" height="110" rx="18" fill="#eef2ff" stroke="#6366f1" stroke-width="3"/><text x="320" y="190" text-anchor="middle" font-size="18" font-weight="700" fill="#4338ca">APP / LLM</text><text x="320" y="222" text-anchor="middle" font-size="15" fill="#334155">run the system</text><text x="320" y="244" text-anchor="middle" font-size="13" fill="#64748b">trace outputs</text><rect x="510" y="150" width="170" height="110" rx="18" fill="#fff7ed" stroke="#f59e0b" stroke-width="3"/><text x="595" y="190" text-anchor="middle" font-size="18" font-weight="700" fill="#b45309">CANDIDATE</text><text x="595" y="222" text-anchor="middle" font-size="15" fill="#334155">model output</text><text x="595" y="244" text-anchor="middle" font-size="13" fill="#64748b">what to evaluate</text><rect x="245" y="350" width="190" height="110" rx="18" fill="#fff" stroke="#f59e0b" stroke-width="3"/><text x="340" y="390" text-anchor="middle" font-size="18" font-weight="700" fill="#b45309">EXPECTED / RUBRIC</text><text x="340" y="422" text-anchor="middle" font-size="15" fill="#334155">reference behavior</text><text x="340" y="444" text-anchor="middle" font-size="13" fill="#64748b">scoring criteria</text><rect x="510" y="350" width="170" height="110" rx="18" fill="#fff7ed" stroke="#f59e0b" stroke-width="3"/><text x="595" y="390" text-anchor="middle" font-size="18" font-weight="700" fill="#b45309">JUDGE</text><text x="595" y="422" text-anchor="middle" font-size="15" fill="#334155">compare + explain</text><text x="595" y="444" text-anchor="middle" font-size="13" fill="#64748b">apply rubric</text><rect x="735" y="350" width="110" height="110" rx="18" fill="#ecfdf5" stroke="#10b981" stroke-width="3"/><text x="790" y="390" text-anchor="middle" font-size="18" font-weight="700" fill="#047857">SCORES</text><text x="790" y="422" text-anchor="middle" font-size="15" fill="#334155">metrics</text><text x="790" y="444" text-anchor="middle" font-size="13" fill="#64748b">regression</text><line x1="204" y1="205" x2="245" y2="205" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/><line x1="395" y1="205" x2="510" y2="205" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/><path d="M595 260V350" fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/><line x1="435" y1="405" x2="510" y2="405" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/><line x1="680" y1="405" x2="735" y2="405" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/><rect x="214" y="493" width="472" height="40" rx="14" fill="#fff" stroke="#10b981" stroke-width="2"/><text x="450" y="519" text-anchor="middle" font-size="15" font-weight="700" fill="#047857">Release only when the quality gate passes</text></g></svg>
