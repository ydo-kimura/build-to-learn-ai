<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-label="LlamaIndex separates one-time indexing from query-time retrieval and answer generation">
  <defs>
    <marker id="a" markerWidth="4" markerHeight="4" refX="8" refY="4" markerUnits="strokeWidth" viewBox="0 0 8 8" orient="auto"><path d="M0 0L8 4L0 8Z" fill="#64748b"/></marker>
    <marker id="purple" markerWidth="4" markerHeight="4" refX="8" refY="4" markerUnits="strokeWidth" viewBox="0 0 8 8" orient="auto"><path d="M0 0L8 4L0 8Z" fill="#8b5cf6"/></marker>
    <filter id="s" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity=".10"/></filter>
  </defs>
  <rect width="1200" height="700" rx="28" fill="#f8fafc"/>
  <text x="70" y="78" font-family="DejaVu Sans,sans-serif" font-size="32" font-weight="800" fill="#172554">LlamaIndex: data to query</text>
  <text x="70" y="113" font-family="DejaVu Sans,sans-serif" font-size="17" fill="#64748b">Build the index once; each query retrieves context before the answer is synthesized.</text>

  <rect x="60" y="150" width="1080" height="190" rx="24" fill="#eff6ff" stroke="#bfdbfe" stroke-width="2"/>
  <text x="90" y="188" font-family="DejaVu Sans,sans-serif" font-size="16" font-weight="800" fill="#1d4ed8">INDEXING · RUN ONCE</text>
  <g filter="url(#s)">
    <rect x="170" y="220" width="220" height="90" rx="18" fill="#fff" stroke="#2563eb" stroke-width="3"/>
    <text x="280" y="258" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="21" font-weight="800" fill="#1d4ed8">Documents</text>
    <text x="280" y="286" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="15" fill="#64748b">load and split</text>
  </g>
  <g filter="url(#s)">
    <rect x="490" y="220" width="220" height="90" rx="18" fill="#fff" stroke="#7c3aed" stroke-width="3"/>
    <text x="600" y="258" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="21" font-weight="800" fill="#6d28d9">VectorStoreIndex</text>
    <text x="600" y="286" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="15" fill="#64748b">embed and store</text>
  </g>
  <g filter="url(#s)">
    <rect x="810" y="220" width="220" height="90" rx="18" fill="#fff" stroke="#8b5cf6" stroke-width="3"/>
    <text x="920" y="258" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="21" font-weight="800" fill="#6d28d9">Stored index</text>
    <text x="920" y="286" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="15" fill="#64748b">searchable nodes</text>
  </g>
  <path d="M390 265H490" fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#a)"/>
  <path d="M710 265H810" fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#a)"/>

  <rect x="60" y="380" width="1080" height="220" rx="24" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="2"/>
  <text x="90" y="418" font-family="DejaVu Sans,sans-serif" font-size="16" font-weight="800" fill="#15803d">QUERY TIME · RUN FOR EACH QUESTION</text>
  <g filter="url(#s)">
    <rect x="100" y="465" width="200" height="90" rx="18" fill="#fff" stroke="#16a34a" stroke-width="3"/>
    <text x="200" y="503" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="21" font-weight="800" fill="#15803d">Question</text>
    <text x="200" y="531" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="15" fill="#64748b">user query</text>
  </g>
  <g filter="url(#s)">
    <rect x="400" y="465" width="220" height="90" rx="18" fill="#fff" stroke="#f59e0b" stroke-width="3"/>
    <text x="510" y="503" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="21" font-weight="800" fill="#b45309">Retriever</text>
    <text x="510" y="531" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="15" fill="#64748b">find relevant nodes</text>
  </g>
  <g filter="url(#s)">
    <rect x="780" y="440" width="300" height="130" rx="22" fill="#fff" stroke="#16a34a" stroke-width="3"/>
    <rect x="805" y="480" width="250" height="54" rx="14" fill="#dcfce7"/>
    <text x="930" y="513" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="20" font-weight="800" fill="#15803d">QueryEngine</text>
    <text x="930" y="548" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="15" fill="#475569">question + context → answer</text>
  </g>
  <path d="M300 510H400" fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#a)"/>
  <path d="M920 310V390H510V465" fill="none" stroke="#8b5cf6" stroke-width="3" stroke-dasharray="9 8" marker-end="url(#purple)"/>
  <text x="715" y="365" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="14" font-weight="700" fill="#6d28d9">query the stored index</text>
  <path d="M620 510H720" fill="none" stroke="#64748b" stroke-width="3"/>
  <path d="M200 555V590H720V510" fill="none" stroke="#16a34a" stroke-width="3"/>
  <circle cx="720" cy="510" r="5" fill="#64748b"/>
  <path d="M720 510H780" fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#a)"/>
  <text x="700" y="470" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="12" font-weight="700" fill="#15803d">merge question</text>
  <text x="700" y="488" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="12" font-weight="700" fill="#15803d">+ retrieved context</text>
  <text x="600" y="640" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="19" font-weight="700" fill="#334155">LlamaIndex hides indexing details while keeping the query-time path explicit.</text>
</svg>
