<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1536 860" role="img" aria-label="Confusion matrix maps actual and predicted labels to precision and recall">
  <defs><linearGradient id="bg" x2="1" y2="1"><stop stop-color="#f8fbff"/><stop offset="1" stop-color="#eef2ff"/></linearGradient><linearGradient id="blue"><stop stop-color="#2563eb"/><stop offset="1" stop-color="#4f46e5"/></linearGradient><filter id="shadow"><feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#172554" flood-opacity=".12"/></filter></defs>
  <rect width="1536" height="860" rx="28" fill="url(#bg)"/><rect x="40" y="34" width="1456" height="112" rx="22" fill="#fff" filter="url(#shadow)"/><rect x="70" y="63" width="210" height="54" rx="27" fill="url(#blue)"/><text x="175" y="99" text-anchor="middle" font-family="Arial,sans-serif" font-size="22" font-weight="700" fill="#fff">EVALUATION</text><text x="312" y="100" font-family="Arial,sans-serif" font-size="38" font-weight="700" fill="#172554">Read errors, not just accuracy</text><text x="70" y="184" font-family="Arial,sans-serif" font-size="22" fill="#475569">The confusion matrix shows what the classifier got right, what it missed, and what it reported by mistake.</text>
  <g filter="url(#shadow)"><rect x="40" y="224" width="820" height="570" rx="24" fill="#fff"/><rect x="40" y="224" width="820" height="74" rx="24" fill="url(#blue)"/><rect x="40" y="274" width="820" height="24" fill="url(#blue)"/><text x="76" y="271" font-family="Arial,sans-serif" font-size="28" font-weight="700" fill="#fff">Confusion matrix</text><text x="535" y="350" text-anchor="middle" font-family="Arial,sans-serif" font-size="23" font-weight="700" fill="#475569">Predicted label</text><text x="204" y="520" transform="rotate(-90 204 520)" text-anchor="middle" font-family="Arial,sans-serif" font-size="23" font-weight="700" fill="#475569">Actual label</text><text x="475" y="390" text-anchor="middle" font-family="Arial,sans-serif" font-size="21" fill="#64748b">Positive</text><text x="700" y="390" text-anchor="middle" font-family="Arial,sans-serif" font-size="21" fill="#64748b">Negative</text><text x="290" y="472" text-anchor="middle" font-family="Arial,sans-serif" font-size="21" fill="#64748b">Positive</text><text x="290" y="635" text-anchor="middle" font-family="Arial,sans-serif" font-size="21" fill="#64748b">Negative</text><rect x="360" y="415" width="230" height="130" rx="16" fill="#dcfce7" stroke="#4ade80" stroke-width="3"/><text x="475" y="465" text-anchor="middle" font-family="Arial,sans-serif" font-size="27" font-weight="700" fill="#15803d">TP</text><text x="475" y="500" text-anchor="middle" font-family="Arial,sans-serif" font-size="20" fill="#166534">true positive</text><rect x="600" y="415" width="230" height="130" rx="16" fill="#fee2e2" stroke="#f87171" stroke-width="3"/><text x="715" y="465" text-anchor="middle" font-family="Arial,sans-serif" font-size="27" font-weight="700" fill="#b91c1c">FN</text><text x="715" y="500" text-anchor="middle" font-family="Arial,sans-serif" font-size="20" fill="#991b1b">missed positive</text><rect x="360" y="550" width="230" height="130" rx="16" fill="#ffedd5" stroke="#fb923c" stroke-width="3"/><text x="475" y="600" text-anchor="middle" font-family="Arial,sans-serif" font-size="27" font-weight="700" fill="#c2410c">FP</text><text x="475" y="635" text-anchor="middle" font-family="Arial,sans-serif" font-size="20" fill="#9a3412">false alarm</text><rect x="600" y="550" width="230" height="130" rx="16" fill="#dbeafe" stroke="#60a5fa" stroke-width="3"/><text x="715" y="600" text-anchor="middle" font-family="Arial,sans-serif" font-size="27" font-weight="700" fill="#1d4ed8">TN</text><text x="715" y="635" text-anchor="middle" font-family="Arial,sans-serif" font-size="20" fill="#1e40af">true negative</text></g>
  <g filter="url(#shadow)"><rect x="900" y="224" width="596" height="570" rx="24" fill="#fff"/><rect x="900" y="224" width="596" height="74" rx="24" fill="#0f766e"/><rect x="900" y="274" width="596" height="24" fill="#0f766e"/><text x="936" y="271" font-family="Arial,sans-serif" font-size="28" font-weight="700" fill="#fff">Two useful questions</text><rect x="950" y="360" width="496" height="132" rx="18" fill="#ecfdf5" stroke="#5eead4" stroke-width="3"/><text x="990" y="402" font-family="Arial,sans-serif" font-size="22" font-weight="700" fill="#0f766e">Precision</text><text x="990" y="444" font-family="Arial,sans-serif" font-size="22" fill="#334155">Of predicted positives,</text><text x="990" y="476" font-family="Arial,sans-serif" font-size="22" font-weight="700" fill="#0f766e">how many were correct?</text><text x="1398" y="437" text-anchor="end" font-family="Arial,sans-serif" font-size="25" font-weight="700" fill="#0f766e">TP / (TP + FP)</text><rect x="950" y="540" width="496" height="132" rx="18" fill="#eff6ff" stroke="#93c5fd" stroke-width="3"/><text x="990" y="582" font-family="Arial,sans-serif" font-size="22" font-weight="700" fill="#1d4ed8">Recall</text><text x="990" y="624" font-family="Arial,sans-serif" font-size="22" fill="#334155">Of actual positives,</text><text x="990" y="656" font-family="Arial,sans-serif" font-size="22" font-weight="700" fill="#1d4ed8">how many did we find?</text><text x="1398" y="617" text-anchor="end" font-family="Arial,sans-serif" font-size="25" font-weight="700" fill="#1d4ed8">TP / (TP + FN)</text><text x="1198" y="728" text-anchor="middle" font-family="Arial,sans-serif" font-size="22" font-weight="700" fill="#475569">Choose the metric that matches</text><text x="1198" y="758" text-anchor="middle" font-family="Arial,sans-serif" font-size="22" font-weight="700" fill="#475569">the cost of each error.</text></g>
</svg>
