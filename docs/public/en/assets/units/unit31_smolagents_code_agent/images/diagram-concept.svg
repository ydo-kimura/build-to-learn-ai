<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 430" role="img" aria-label="smolagents code agent loop">
  <defs><marker id="arrow" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto"><path d="M0 0L7 3.5L0 7Z" fill="#64748b"/></marker><style>.title{font:700 23px Inter,Arial,sans-serif;fill:#172554}.label{font:700 16px Inter,Arial,sans-serif}.note{font:500 13px Inter,Arial,sans-serif;fill:#475569}.small{font:600 12px Inter,Arial,sans-serif;fill:#64748b}</style></defs>
  <rect width="760" height="430" rx="22" fill="#f8fafc"/><rect x="24" y="22" width="712" height="58" rx="15" fill="#fff" stroke="#2563eb" stroke-width="2"/><text x="380" y="59" text-anchor="middle" class="title">Code Agent: write, run, inspect</text>
  <rect x="42" y="104" width="676" height="270" rx="20" fill="#fff" stroke="#dbe4f0" stroke-width="2"/><text x="72" y="137" class="small">THE CODE-FIRST LOOP</text>
  <g transform="translate(32 0)">
  <rect x="72" y="177" width="155" height="88" rx="16" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/><text x="149" y="211" text-anchor="middle" class="label" fill="#1d4ed8">Generate code</text><text x="149" y="237" text-anchor="middle" class="note">translate task to Python</text>
  <line x1="227" y1="221" x2="270" y2="221" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="270" y="177" width="155" height="88" rx="16" fill="#fff7ed" stroke="#f97316" stroke-width="2"/><text x="347" y="211" text-anchor="middle" class="label" fill="#c2410c">Sandbox</text><text x="347" y="237" text-anchor="middle" class="note">execute safely</text>
  <line x1="425" y1="221" x2="468" y2="221" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="468" y="177" width="155" height="88" rx="16" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/><text x="545" y="211" text-anchor="middle" class="label" fill="#047857">Inspect result</text><text x="545" y="237" text-anchor="middle" class="note">fix or return answer</text>
  <path d="M545 265V315H149V265" fill="none" stroke="#64748b" stroke-width="2" stroke-dasharray="7 6" marker-end="url(#arrow)"/><text x="347" y="340" text-anchor="middle" class="small">iterate only when the result needs correction</text>
  </g>
  <text x="380" y="405" text-anchor="middle" class="note">Code is the action language: one execution can combine several calculations or tool calls.</text>
</svg>
