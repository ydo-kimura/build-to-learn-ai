<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">LoRA and QLoRA adaptation workflow</title>
  <desc id="desc">Start with a base model, freeze or optionally quantize it, attach a LoRA adapter, then train the adapter and evaluate the result.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="7" stdDeviation="9" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
    <marker id="arrow" markerWidth="4" markerHeight="4" refX="8" refY="4" orient="auto" markerUnits="strokeWidth" viewBox="0 0 8 8">
      <path d="M0 0L8 4L0 8Z" fill="#64748b"/>
    </marker>
  </defs>

  <rect width="1200" height="560" rx="28" fill="#f8fafc"/>
  <g font-family="Inter, Arial, sans-serif">
    <text x="60" y="72" fill="#07122f" font-size="36" font-weight="800">Parameter-efficient adaptation</text>
    <text x="62" y="106" fill="#64748b" font-size="18">The base stays fixed while the attached adapter learns.</text>

    <g filter="url(#shadow)">
      <rect x="45" y="180" width="230" height="210" rx="24" fill="#ffffff" stroke="#60a5fa" stroke-width="3"/>
      <rect x="345" y="180" width="230" height="210" rx="24" fill="#ffffff" stroke="#f59e0b" stroke-width="3"/>
      <rect x="645" y="180" width="230" height="210" rx="24" fill="#ffffff" stroke="#34d399" stroke-width="3"/>
      <rect x="945" y="180" width="210" height="210" rx="24" fill="#ffffff" stroke="#a78bfa" stroke-width="3"/>
    </g>

    <text x="160" y="226" fill="#1556c0" font-size="18" font-weight="800" text-anchor="middle">BASE MODEL</text>
    <g opacity="0.98">
      <rect x="100" y="264" width="104" height="54" rx="13" fill="#bfdbfe" stroke="#60a5fa"/>
      <rect x="108" y="272" width="104" height="54" rx="13" fill="#dbeafe" stroke="#60a5fa"/>
      <rect x="116" y="280" width="104" height="54" rx="13" fill="#eff6ff" stroke="#60a5fa"/>
    </g>
    <text x="168" y="316" fill="#12346a" font-family="SFMono-Regular, Consolas, monospace" font-size="27" font-weight="800" text-anchor="middle">W</text>

    <text x="460" y="226" fill="#b45309" font-size="18" font-weight="800" text-anchor="middle">FREEZE W</text>
    <rect x="392" y="263" width="136" height="50" rx="16" fill="#dbeafe" stroke="#60a5fa"/>
    <text x="460" y="295" fill="#1556c0" font-size="17" font-weight="800" text-anchor="middle">LOCKED</text>
    <rect x="396" y="326" width="128" height="36" rx="18" fill="#ffedd5" stroke="#fdba74"/>
    <text x="460" y="350" fill="#c65d16" font-size="13" font-weight="800" text-anchor="middle">QLoRA · 4-BIT</text>

    <text x="760" y="226" fill="#07824d" font-size="18" font-weight="800" text-anchor="middle">ATTACH LORA</text>
    <rect x="687" y="268" width="60" height="70" rx="15" fill="#ecfdf5" stroke="#34d399" stroke-width="2"/>
    <rect x="773" y="268" width="60" height="70" rx="15" fill="#ecfdf5" stroke="#34d399" stroke-width="2"/>
    <text x="717" y="311" fill="#07824d" font-family="SFMono-Regular, Consolas, monospace" font-size="28" font-weight="800" text-anchor="middle">A</text>
    <text x="803" y="311" fill="#07824d" font-family="SFMono-Regular, Consolas, monospace" font-size="28" font-weight="800" text-anchor="middle">B</text>
    <path d="M750 303H766" stroke="#64748b" stroke-width="2.5"/>
    <text x="760" y="365" fill="#08633f" font-size="15" font-weight="800" text-anchor="middle">TRAINABLE</text>

    <text x="1050" y="226" fill="#6d43c5" font-size="18" font-weight="800" text-anchor="middle">TRAIN &amp; EVALUATE</text>
    <path d="M1000 292h24l15 18 30-48 31 45" fill="none" stroke="#8b5cf6" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="1000" cy="292" r="5" fill="#8b5cf6"/>
    <circle cx="1100" cy="307" r="5" fill="#8b5cf6"/>
    <text x="1050" y="356" fill="#5b399e" font-size="15" font-weight="800" text-anchor="middle">UPDATE A + B</text>

    <path d="M275 285H345" fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
    <path d="M575 285H645" fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
    <path d="M875 285H945" fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>

    <rect x="342" y="448" width="516" height="58" rx="29" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="600" y="486" fill="#334155" font-size="20" font-weight="700" text-anchor="middle">base → freeze → attach → adapt</text>
  </g>
</svg>
