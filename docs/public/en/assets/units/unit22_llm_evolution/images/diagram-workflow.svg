<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-label="Agent loop capabilities">
<defs><marker id="a" markerWidth="4" markerHeight="4" refX="8" refY="4" markerUnits="strokeWidth" viewBox="0 0 8 8" orient="auto"><path d="M0 0L8 4L0 8Z" fill="#64748b"/></marker><filter id="s"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity=".10"/></filter></defs><rect width="1200" height="700" rx="28" fill="#f8fafc"/><text x="70" y="78" font-family="DejaVu Sans,sans-serif" font-size="32" font-weight="800" fill="#172554">The Agent Loop</text><text x="70" y="113" font-family="DejaVu Sans,sans-serif" font-size="17" fill="#64748b">An agent repeats a small cycle until the task is complete.</text>
<path d="M301.5 315H388.5" stroke="#64748b" stroke-width="3" marker-end="url(#a)"/><path d="M601.5 315H688.5" stroke="#64748b" stroke-width="3" marker-end="url(#a)"/><path d="M901.5 315H978.5" stroke="#64748b" stroke-width="3" marker-end="url(#a)"/><path d="M1055 401.5V540H190V401.5" fill="none" stroke="#16a34a" stroke-width="3" stroke-dasharray="10 10" marker-end="url(#a)"/>
<g filter="url(#s)"><rect x="80" y="210" width="220" height="190" rx="24" fill="#fff" stroke="#2563eb" stroke-width="3"/><circle cx="190" cy="270" r="34" fill="#dbeafe"/><text x="190" y="280" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="22" font-weight="800" fill="#1d4ed8">1</text><text x="190" y="346" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="25" font-weight="800" fill="#1e3a8a">Plan</text><text x="190" y="375" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="15" fill="#64748b">break the task down</text></g><g filter="url(#s)"><rect x="390" y="210" width="210" height="190" rx="24" fill="#fff" stroke="#7c3aed" stroke-width="3"/><circle cx="495" cy="270" r="34" fill="#ede9fe"/><text x="495" y="280" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="22" font-weight="800" fill="#6d28d9">2</text><text x="495" y="346" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="25" font-weight="800" fill="#5b21b6">Act</text><text x="495" y="375" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="15" fill="#64748b">call a tool</text></g><g filter="url(#s)"><rect x="690" y="210" width="210" height="190" rx="24" fill="#fff" stroke="#f59e0b" stroke-width="3"/><circle cx="795" cy="270" r="34" fill="#fef3c7"/><text x="795" y="280" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="22" font-weight="800" fill="#b45309">3</text><text x="795" y="346" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="25" font-weight="800" fill="#92400e">Observe</text><text x="795" y="375" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="15" fill="#64748b">inspect the result</text></g><g filter="url(#s)"><rect x="980" y="210" width="150" height="190" rx="24" fill="#fff" stroke="#16a34a" stroke-width="3"/><circle cx="1055" cy="270" r="34" fill="#dcfce7"/><text x="1055" y="280" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="22" font-weight="800" fill="#15803d">4</text><text x="1055" y="346" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="22" font-weight="800" fill="#166534">Decide</text><text x="1055" y="375" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="15" fill="#64748b">finish or retry</text></g><text x="600" y="630" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="19" font-weight="700" fill="#334155">The loop adds autonomy to a basic LLM call.</text></svg>
