<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1536 860" role="img" aria-label="Regularization keeps a model simple so it generalizes beyond training data">
  <defs><linearGradient id="bg" x2="1" y2="1"><stop stop-color="#f8fbff"/><stop offset="1" stop-color="#eef2ff"/></linearGradient><linearGradient id="blue"><stop stop-color="#2563eb"/><stop offset="1" stop-color="#4f46e5"/></linearGradient><filter id="shadow"><feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#172554" flood-opacity=".12"/></filter></defs>
  <rect width="1536" height="860" rx="28" fill="url(#bg)"/><rect x="40" y="34" width="1456" height="112" rx="22" fill="#fff" filter="url(#shadow)"/>
  <rect x="70" y="63" width="238" height="54" rx="27" fill="url(#blue)"/><text x="189" y="99" text-anchor="middle" font-family="Arial,sans-serif" font-size="20" font-weight="700" fill="#fff">REGULARIZATION</text><text x="340" y="100" font-family="Arial,sans-serif" font-size="38" font-weight="700" fill="#172554">Prefer a model that generalizes</text>
  <text x="70" y="184" font-family="Arial,sans-serif" font-size="22" fill="#475569">A flexible model can memorize noise. A regularization penalty acts like a brake, keeping the learned rule simple.</text>
  <g filter="url(#shadow)"><rect x="40" y="224" width="690" height="570" rx="24" fill="#fff"/><rect x="40" y="224" width="690" height="74" rx="24" fill="#dc2626"/><rect x="40" y="274" width="690" height="24" fill="#dc2626"/><text x="76" y="271" font-family="Arial,sans-serif" font-size="28" font-weight="700" fill="#fff">Overfit: memorize the noise</text>
    <g stroke="#e2e8f0" stroke-width="2"><path d="M110 390H660M110 490H660M110 590H660M110 690H660"/><path d="M210 350V710M310 350V710M410 350V710M510 350V710M610 350V710"/></g><path d="M110 710H670M110 710V350" stroke="#334155" stroke-width="4"/><path d="M120 660 C170 420 215 680 270 470 S370 690 420 430 S520 690 565 420 S620 620 660 370" fill="none" stroke="#dc2626" stroke-width="8" stroke-linecap="round"/><g fill="#2563eb" stroke="#fff" stroke-width="5"><circle cx="150" cy="620" r="11"/><circle cx="205" cy="500" r="11"/><circle cx="260" cy="570" r="11"/><circle cx="320" cy="470" r="11"/><circle cx="380" cy="545" r="11"/><circle cx="440" cy="430" r="11"/><circle cx="500" cy="500" r="11"/><circle cx="560" cy="400" r="11"/><circle cx="620" cy="430" r="11"/></g><text x="400" y="756" text-anchor="middle" font-family="Arial,sans-serif" font-size="23" font-weight="700" fill="#b91c1c">low training error • poor on new data</text></g>
  <g filter="url(#shadow)"><rect x="770" y="224" width="726" height="570" rx="24" fill="#fff"/><rect x="770" y="224" width="726" height="74" rx="24" fill="#0f766e"/><rect x="770" y="274" width="726" height="24" fill="#0f766e"/><text x="806" y="271" font-family="Arial,sans-serif" font-size="28" font-weight="700" fill="#fff">Regularized: keep the useful trend</text>
    <g stroke="#e2e8f0" stroke-width="2"><path d="M840 390H1430M840 490H1430M840 590H1430M840 690H1430"/><path d="M940 350V710M1040 350V710M1140 350V710M1240 350V710M1340 350V710M1440 350V710"/></g><path d="M840 710H1450M840 710V350" stroke="#334155" stroke-width="4"/><path d="M850 660 L950 610 L1050 555 L1150 510 L1250 455 L1350 410 L1440 365" fill="none" stroke="#0f766e" stroke-width="8" stroke-linecap="round"/><g fill="#2563eb" stroke="#fff" stroke-width="5"><circle cx="880" cy="640" r="11"/><circle cx="950" cy="520" r="11"/><circle cx="1030" cy="580" r="11"/><circle cx="1110" cy="470" r="11"/><circle cx="1200" cy="530" r="11"/><circle cx="1280" cy="420" r="11"/><circle cx="1360" cy="450" r="11"/><circle cx="1420" cy="350" r="11"/></g><rect x="980" y="308" width="380" height="42" rx="14" fill="#ecfdf5"/><text x="1170" y="337" text-anchor="middle" font-family="Arial,sans-serif" font-size="21" font-weight="700" fill="#0f766e">penalty → smaller coefficients</text><text x="1200" y="756" text-anchor="middle" font-family="Arial,sans-serif" font-size="23" font-weight="700" fill="#0f766e">slightly higher training error • better generalization</text></g>
</svg>
