<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 430" role="img" aria-labelledby="title desc">
  <title id="title">MCP host, client, and server architecture</title>
  <desc id="desc">The MCP Client inside the Host sends JSON-RPC messages to the MCP Server.</desc>
  <defs>
    <marker id="arrow" markerWidth="4" markerHeight="4" refX="8" refY="4" markerUnits="strokeWidth" viewBox="0 0 8 8" orient="auto"><path d="M0 0L8 4L0 8Z" fill="#64748b"/></marker>
    <style>.title{font:700 23px Inter,Arial,sans-serif;fill:#172554}.label{font:700 17px Inter,Arial,sans-serif}.note{font:500 13px Inter,Arial,sans-serif;fill:#475569}.small{font:600 12px Inter,Arial,sans-serif;fill:#64748b}</style>
  </defs>
  <rect width="760" height="430" rx="22" fill="#f8fafc"/>
  <rect x="24" y="22" width="712" height="58" rx="15" fill="#fff" stroke="#7c3aed" stroke-width="2"/>
  <text x="380" y="59" text-anchor="middle" class="title">MCP: host, client, and server</text>
  <rect x="42" y="104" width="676" height="260" rx="20" fill="#fff" stroke="#dbe4f0" stroke-width="2"/>

  <rect x="56" y="144" width="230" height="166" rx="18" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="171" y="180" text-anchor="middle" class="label" fill="#1d4ed8">Host</text>
  <text x="171" y="204" text-anchor="middle" class="note">LLM application</text>
  <rect x="80" y="232" width="182" height="48" rx="12" fill="#fff" stroke="#93c5fd" stroke-width="2"/>
  <text x="171" y="262" text-anchor="middle" class="label" fill="#2563eb">MCP Client</text>

  <line x1="262" y1="246" x2="400" y2="246" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="331" y="224" text-anchor="middle" class="small" fill="#2563eb">request</text>
  <line x1="400" y1="266" x2="262" y2="266" stroke="#0f766e" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="331" y="296" text-anchor="middle" class="small" fill="#0f766e">response</text>

  <rect x="400" y="144" width="304" height="166" rx="18" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="2"/>
  <text x="552" y="180" text-anchor="middle" class="label" fill="#6d28d9">MCP Server</text>
  <text x="552" y="204" text-anchor="middle" class="note">capabilities exposed safely</text>
  <rect x="416" y="232" width="84" height="48" rx="12" fill="#fff" stroke="#a78bfa" stroke-width="2"/>
  <rect x="510" y="232" width="84" height="48" rx="12" fill="#fff" stroke="#a78bfa" stroke-width="2"/>
  <rect x="604" y="232" width="84" height="48" rx="12" fill="#fff" stroke="#a78bfa" stroke-width="2"/>
  <text x="458" y="262" text-anchor="middle" class="small">Tools</text>
  <text x="552" y="262" text-anchor="middle" class="small">Resources</text>
  <text x="646" y="262" text-anchor="middle" class="small">Prompts</text>
  <text x="380" y="398" text-anchor="middle" class="note">The client sends a request and receives a response through the standard protocol.</text>
</svg>
