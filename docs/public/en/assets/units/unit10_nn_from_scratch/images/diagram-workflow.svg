<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-label="Training loop from forward pass to parameter update">
<defs><marker id="a" markerWidth="4" markerHeight="4" refX="8" refY="4" markerUnits="strokeWidth" viewBox="0 0 8 8" orient="auto"><path d="M0 0L8 4L0 8Z" fill="#64748b"/></marker><style>.title{font:700 24px sans-serif;fill:#fff}.h{font:700 18px sans-serif;fill:#0f172a}.s{font:500 14px sans-serif;fill:#64748b}.flow{stroke:#64748b;stroke-width:3;fill:none;marker-end:url(#a)}</style></defs>
<rect width="960" height="540" rx="24" fill="#f8fafc"/><rect x="28" y="24" width="904" height="68" rx="16" fill="#0f172a"/><text x="64" y="67" class="title">Training loop</text><text x="896" y="66" text-anchor="end" class="s" fill="#cbd5e1">repeat until loss stabilizes</text>
<rect x="44" y="122" width="872" height="348" rx="20" fill="#fff" stroke="#e2e8f0" stroke-width="2"/>
<g><rect x="90" y="220" width="160" height="104" rx="16" fill="#dbeafe" stroke="#3b82f6" stroke-width="3"/><rect x="290" y="220" width="160" height="104" rx="16" fill="#fee2e2" stroke="#ef4444" stroke-width="3"/><rect x="490" y="220" width="160" height="104" rx="16" fill="#ffedd5" stroke="#f97316" stroke-width="3"/><rect x="690" y="220" width="160" height="104" rx="16" fill="#dcfce7" stroke="#22c55e" stroke-width="3"/></g>
<g text-anchor="middle"><text x="170" y="262" class="h">Forward</text><text x="170" y="288" class="s">predict ŷ</text><text x="370" y="262" class="h">Loss</text><text x="370" y="288" class="s">compare y vs ŷ</text><text x="570" y="262" class="h">Backward</text><text x="570" y="288" class="s">compute gradients</text><text x="770" y="262" class="h">Update</text><text x="770" y="288" class="s">change weights</text></g>
<path d="M251.5 272H288.5" class="flow"/><path d="M451.5 272H488.5" class="flow"/><path d="M651.5 272H688.5" class="flow"/><path d="M770 325.5V405H170V325.5" class="flow"/><text x="480" y="394" text-anchor="middle" class="s">one epoch / mini-batch cycle</text>
<rect x="160" y="148" width="640" height="42" rx="12" fill="#f1f5f9"/><text x="480" y="175" text-anchor="middle" class="s">prediction → error signal → gradient → better parameters</text>
</svg>
