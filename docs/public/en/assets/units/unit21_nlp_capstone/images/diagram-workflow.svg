<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" role="img" aria-labelledby="title desc"><title id="title">Choosing an NLP modeling path</title><desc id="desc">A practical comparison between a TF-IDF baseline and a neural Transformer approach including embeddings.</desc><defs><marker id="a" markerWidth="4" markerHeight="4" refX="8" refY="4" markerUnits="strokeWidth" viewBox="0 0 8 8" orient="auto"><path d="M0 0L8 4L0 8Z" fill="#64748b"/></marker></defs><rect width="900" height="520" rx="24" fill="#f8fafc"/><rect x="32" y="28" width="836" height="72" rx="16" fill="#fff" stroke="#16a34a" stroke-width="3"/><text x="64" y="74" font-family="DejaVu Sans,sans-serif" font-size="28" font-weight="700" fill="#14532d">Start with a baseline, then earn complexity</text><text x="838" y="73" text-anchor="end" font-family="DejaVu Sans,sans-serif" font-size="16" fill="#16a34a">model choice</text><g font-family="DejaVu Sans,sans-serif"><rect x="58" y="162" width="350" height="270" rx="20" fill="#fff" stroke="#f97316" stroke-width="2"/><rect x="58" y="162" width="350" height="58" rx="20" fill="#fff7ed"/><text x="86" y="199" font-size="21" font-weight="700" fill="#c2410c">Baseline · TF-IDF + ML</text><text x="88" y="254" font-size="16" fill="#334155">fast, interpretable reference point</text><rect x="82" y="282" width="66" height="48" rx="10" fill="#f1f5f9"/><text x="115" y="312" text-anchor="middle" font-size="14" fill="#475569">text</text><rect x="176" y="282" width="80" height="48" rx="10" fill="#dbeafe"/><text x="216" y="312" text-anchor="middle" font-size="14" fill="#1d4ed8">TF-IDF</text><rect x="284" y="282" width="100" height="48" rx="10" fill="#ffedd5"/><text x="334" y="312" text-anchor="middle" font-size="13" fill="#c2410c">classifier</text><path d="M148 306H176" fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#a)"/><path d="M256 306H284" fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#a)"/><text x="88" y="374" font-size="15" fill="#64748b">small data · fast to explain</text><rect x="442" y="162" width="400" height="270" rx="20" fill="#fff" stroke="#7c3aed" stroke-width="2"/><rect x="442" y="162" width="400" height="58" rx="20" fill="#f5f3ff"/><text x="470" y="199" font-size="21" font-weight="700" fill="#6d28d9">Neural path · Transformer</text><text x="462" y="254" font-size="16" fill="#334155">learn contextual representations end to end</text><rect x="454" y="282" width="68" height="48" rx="10" fill="#dbeafe"/><text x="488" y="312" text-anchor="middle" font-size="13" fill="#1d4ed8">tokens</text><rect x="545" y="282" width="88" height="48" rx="10" fill="#ede9fe"/><text x="589" y="312" text-anchor="middle" font-size="13" fill="#6d28d9">embeddings</text><rect x="656" y="282" width="82" height="48" rx="10" fill="#ede9fe"/><text x="697" y="312" text-anchor="middle" font-size="13" fill="#6d28d9">attention</text><rect x="761" y="282" width="69" height="48" rx="10" fill="#dcfce7"/><text x="795.5" y="312" text-anchor="middle" font-size="13" fill="#15803d">output</text><path d="M522 306H545" fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#a)"/><path d="M633 306H656" fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#a)"/><path d="M738 306H761" fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#a)"/><text x="462" y="374" font-size="15" fill="#64748b">more data · richer context · higher cost</text></g><rect x="58" y="456" width="784" height="36" rx="10" fill="#fefce8"/><text x="450" y="480" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="15" fill="#854d0e">Compare on validation data; do not choose by architecture name alone.</text></svg>
