<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" role="img" aria-labelledby="title desc"><title id="title">Tiny Transformer translation flow</title><desc id="desc">A translation example passes through tokenization, encoder, decoder, and autoregressive output.</desc><defs><marker id="a" markerWidth="4" markerHeight="4" refX="8" refY="4" markerUnits="strokeWidth" viewBox="0 0 8 8" orient="auto"><path d="M0 0L8 4L0 8Z" fill="#64748b"/></marker></defs><rect width="900" height="520" rx="24" fill="#f8fafc"/><rect x="32" y="28" width="836" height="72" rx="16" fill="#fff" stroke="#2563eb" stroke-width="3"/><text x="64" y="74" font-family="DejaVu Sans,sans-serif" font-size="28" font-weight="700" fill="#172554">A tiny Transformer learns translation</text><text x="838" y="73" text-anchor="end" font-family="DejaVu Sans,sans-serif" font-size="16" fill="#2563eb">capstone flow</text><g font-family="DejaVu Sans,sans-serif"><rect x="54" y="176" width="174" height="210" rx="18" fill="#fff" stroke="#94a3b8" stroke-width="2"/><text x="84" y="216" font-size="19" font-weight="700" fill="#172554">Input</text><text x="84" y="258" font-size="18" fill="#334155">I like AI</text><rect x="84" y="292" width="110" height="42" rx="10" fill="#f1f5f9"/><text x="139" y="319" text-anchor="middle" font-size="16" fill="#475569">tokens</text><path d="M229 280H259" fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#a)"/><rect x="260" y="176" width="174" height="210" rx="18" fill="#fff" stroke="#7c3aed" stroke-width="2"/><text x="290" y="216" font-size="19" font-weight="700" fill="#6d28d9">Encoder</text><text x="290" y="258" font-size="16" fill="#475569">self-attention</text><text x="290" y="284" font-size="16" fill="#475569">+ position</text><rect x="290" y="312" width="114" height="42" rx="10" fill="#ede9fe"/><text x="347" y="339" text-anchor="middle" font-size="16" font-weight="700" fill="#6d28d9">context</text><path d="M435 280H465" fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#a)"/><rect x="466" y="176" width="174" height="210" rx="18" fill="#fff" stroke="#f59e0b" stroke-width="2"/><text x="496" y="216" font-size="19" font-weight="700" fill="#b45309">Decoder</text><text x="496" y="258" font-size="16" fill="#475569">masked attention</text><text x="496" y="284" font-size="16" fill="#475569">cross-attention</text><rect x="496" y="312" width="114" height="42" rx="10" fill="#fef3c7"/><text x="553" y="339" text-anchor="middle" font-size="16" font-weight="700" fill="#b45309">next token</text><path d="M641 280H671" fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#a)"/><rect x="672" y="176" width="174" height="210" rx="18" fill="#fff" stroke="#16a34a" stroke-width="2"/><text x="702" y="216" font-size="19" font-weight="700" fill="#15803d">Output</text><text x="702" y="258" font-size="18" fill="#334155">私は</text><text x="702" y="286" font-size="18" fill="#334155">AIが</text><text x="702" y="314" font-size="18" fill="#334155">好き</text><text x="702" y="354" font-size="14" fill="#64748b">repeat to decode</text></g><rect x="54" y="432" width="792" height="56" rx="14" fill="#eff6ff"/><text x="450" y="467" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="17" font-weight="600" fill="#1e40af">Training teaches the model to predict the next target token.</text></svg>
