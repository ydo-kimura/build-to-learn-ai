<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1536 860" role="img" aria-label="SVM chooses the decision boundary with the widest margin to the nearest points">
  <defs><linearGradient id="bg" x2="1" y2="1"><stop stop-color="#f8fbff"/><stop offset="1" stop-color="#eef2ff"/></linearGradient><linearGradient id="blue"><stop stop-color="#2563eb"/><stop offset="1" stop-color="#4f46e5"/></linearGradient><filter id="shadow"><feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#172554" flood-opacity=".12"/></filter></defs>
  <rect width="1536" height="860" rx="28" fill="url(#bg)"/><rect x="40" y="34" width="1456" height="112" rx="22" fill="#fff" filter="url(#shadow)"/><rect x="70" y="63" width="165" height="54" rx="27" fill="url(#blue)"/><text x="152" y="99" text-anchor="middle" font-family="Arial,sans-serif" font-size="22" font-weight="700" fill="#fff">SVM</text><text x="267" y="100" font-family="Arial,sans-serif" font-size="38" font-weight="700" fill="#172554">Place the widest safe boundary</text><text x="70" y="184" font-family="Arial,sans-serif" font-size="22" fill="#475569">The closest examples anchor the boundary. SVM maximizes the empty space—the margin—between the two classes.</text>
  <g filter="url(#shadow)"><rect x="40" y="224" width="1060" height="570" rx="24" fill="#fff"/><rect x="40" y="224" width="1060" height="74" rx="24" fill="url(#blue)"/><rect x="40" y="274" width="1060" height="24" fill="url(#blue)"/><text x="76" y="271" font-family="Arial,sans-serif" font-size="28" font-weight="700" fill="#fff">Support vectors define the margin</text><path d="M150 700H1020M150 700V350" stroke="#334155" stroke-width="4"/><path d="M250 660L880 360" fill="none" stroke="#1d4ed8" stroke-width="8" stroke-linecap="round"/><path d="M250 610L880 310M250 710L880 410" fill="none" stroke="#93c5fd" stroke-width="4" stroke-dasharray="14 10"/><path d="M260 710L870 410" fill="none" stroke="#bfdbfe" stroke-width="20" opacity=".55"/><g fill="#2563eb" stroke="#fff" stroke-width="5"><circle cx="300" cy="600" r="14"/><circle cx="430" cy="545" r="14"/><circle cx="570" cy="475" r="14"/><circle cx="720" cy="405" r="14"/></g><g fill="#f97316" stroke="#fff" stroke-width="5"><circle cx="350" cy="650" r="14"/><circle cx="500" cy="575" r="14"/><circle cx="650" cy="505" r="14"/><circle cx="790" cy="435" r="14"/></g><g fill="#fff" stroke="#7c3aed" stroke-width="6"><circle cx="430" cy="545" r="21"/><circle cx="650" cy="505" r="21"/></g><text x="760" y="330" font-family="Arial,sans-serif" font-size="23" font-weight="700" fill="#1d4ed8">decision boundary</text><text x="860" y="590" text-anchor="middle" font-family="Arial,sans-serif" font-size="23" font-weight="700" fill="#6d28d9">maximum margin</text><text x="430" y="755" text-anchor="middle" font-family="Arial,sans-serif" font-size="23" font-weight="700" fill="#6d28d9">support vectors are the closest points</text></g>
  <g filter="url(#shadow)"><rect x="1140" y="224" width="356" height="570" rx="24" fill="#fff"/><rect x="1140" y="224" width="356" height="74" rx="24" fill="#0f766e"/><rect x="1140" y="274" width="356" height="24" fill="#0f766e"/><text x="1176" y="271" font-family="Arial,sans-serif" font-size="28" font-weight="700" fill="#fff">Why it works</text><circle cx="1318" cy="410" r="66" fill="#ecfdf5" stroke="#14b8a6" stroke-width="5"/><text x="1318" y="402" text-anchor="middle" font-family="Arial,sans-serif" font-size="24" font-weight="700" fill="#0f766e">wide</text><text x="1318" y="435" text-anchor="middle" font-family="Arial,sans-serif" font-size="22" fill="#475569">margin</text><text x="1318" y="550" text-anchor="middle" font-family="Arial,sans-serif" font-size="23" font-weight="700" fill="#0f766e">more tolerance</text><text x="1318" y="588" text-anchor="middle" font-family="Arial,sans-serif" font-size="21" fill="#475569">when new points shift</text><rect x="1180" y="650" width="276" height="68" rx="14" fill="#eff6ff"/><text x="1318" y="678" text-anchor="middle" font-family="Arial,sans-serif" font-size="23" font-weight="700" fill="#1d4ed8">kernel</text><text x="1318" y="704" text-anchor="middle" font-family="Arial,sans-serif" font-size="23" font-weight="700" fill="#1d4ed8">→ curved boundary</text></g>
</svg>
