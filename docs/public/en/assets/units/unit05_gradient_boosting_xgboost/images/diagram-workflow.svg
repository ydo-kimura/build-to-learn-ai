<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" role="img" aria-label="Comparison of Random Forest parallel voting and XGBoost sequential correction">
  <defs>
    <marker id="arrow" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L8 4L0 8Z" fill="#64748b"/></marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="5" stdDeviation="5" flood-color="#0f172a" flood-opacity=".10"/></filter>
  </defs>
  <rect width="900" height="520" rx="28" fill="#f7f9fc"/>
  <rect x="32" y="28" width="836" height="76" rx="18" fill="#fff" stroke="#2563eb" stroke-width="2" filter="url(#shadow)"/>
  <text x="64" y="60" font-family="DejaVu Sans, sans-serif" font-size="14" letter-spacing="2" fill="#2563eb" font-weight="700">ENSEMBLE STRATEGIES</text>
  <text x="64" y="86" font-family="DejaVu Sans, sans-serif" font-size="22" fill="#0f172a" font-weight="700">Parallel voting versus sequential correction</text>
  <rect x="32" y="126" width="402" height="356" rx="22" fill="#fff" stroke="#dbe3ef" stroke-width="2"/>
  <rect x="466" y="126" width="402" height="356" rx="22" fill="#fff" stroke="#dbe3ef" stroke-width="2"/>
  <rect x="32" y="126" width="402" height="62" rx="22" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <rect x="466" y="126" width="402" height="62" rx="22" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="233" y="164" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-size="18" fill="#1d4ed8" font-weight="700">Random Forest</text>
  <text x="667" y="164" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-size="18" fill="#15803d" font-weight="700">XGBoost</text>
  <g filter="url(#shadow)">
    <circle cx="112" cy="250" r="20" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/><circle cx="233" cy="250" r="20" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/><circle cx="354" cy="250" r="20" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <text x="112" y="256" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-size="12" fill="#1d4ed8" font-weight="700">T1</text><text x="233" y="256" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-size="12" fill="#1d4ed8" font-weight="700">T2</text><text x="354" y="256" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-size="12" fill="#1d4ed8" font-weight="700">T3</text>
    <path d="M112 270v52m0 0h242m-121 0v-52m121 52v-52" fill="none" stroke="#3b82f6" stroke-width="2.5"/>
    <rect x="130" y="346" width="206" height="54" rx="16" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/><text x="233" y="380" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-size="16" fill="#1d4ed8" font-weight="700">majority vote</text>
    <rect x="498" y="214" width="120" height="58" rx="16" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/><text x="558" y="250" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-size="15" fill="#b91c1c" font-weight="700">error</text>
    <rect x="654" y="214" width="120" height="58" rx="16" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/><text x="714" y="250" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-size="15" fill="#b45309" font-weight="700">correction</text>
    <rect x="576" y="346" width="182" height="54" rx="16" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/><text x="667" y="380" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-size="16" fill="#15803d" font-weight="700">add the next tree</text>
  </g>
  <path d="M618 243H654" fill="none" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M714 272V346" fill="none" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M233 322V346" fill="none" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="76" y="438" font-family="DejaVu Sans, sans-serif" font-size="14" fill="#64748b">Trees are independent.</text>
  <text x="510" y="438" font-family="DejaVu Sans, sans-serif" font-size="14" fill="#64748b">Trees are learned in sequence.</text>
