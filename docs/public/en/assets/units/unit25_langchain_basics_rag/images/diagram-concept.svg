<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-label="LangChain RAG indexing and retrieval components with question and context merged before generation">
  <defs>
    <marker id="a" markerWidth="4" markerHeight="4" refX="8" refY="4" markerUnits="strokeWidth" viewBox="0 0 8 8" orient="auto"><path d="M0 0L8 4L0 8Z" fill="#64748b"/></marker>
    <marker id="purple" markerWidth="4" markerHeight="4" refX="8" refY="4" markerUnits="strokeWidth" viewBox="0 0 8 8" orient="auto"><path d="M0 0L8 4L0 8Z" fill="#8b5cf6"/></marker>
    <filter id="s" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity=".10"/></filter>
  </defs>
  <rect width="1200" height="700" rx="28" fill="#f8fafc"/>
  <text x="70" y="78" font-family="DejaVu Sans,sans-serif" font-size="32" font-weight="800" fill="#172554">LangChain RAG pipeline</text>
  <text x="70" y="113" font-family="DejaVu Sans,sans-serif" font-size="17" fill="#64748b">Index documents into a vector store, then retrieve context for a question before generating an answer.</text>

  <rect x="60" y="160" width="1070" height="205" rx="24" fill="#eff6ff" stroke="#bfdbfe" stroke-width="2"/>
  <text x="90" y="198" font-family="DejaVu Sans,sans-serif" font-size="16" font-weight="800" fill="#1d4ed8">INDEXING CHAIN</text>
  <g filter="url(#s)">
    <rect x="100" y="230" width="200" height="95" rx="18" fill="#fff" stroke="#2563eb" stroke-width="3"/>
    <text x="200" y="270" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="21" font-weight="800" fill="#1d4ed8">Loader</text>
    <text x="200" y="299" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="15" fill="#64748b">documents</text>
  </g>
  <g filter="url(#s)">
    <rect x="360" y="230" width="200" height="95" rx="18" fill="#fff" stroke="#7c3aed" stroke-width="3"/>
    <text x="460" y="270" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="21" font-weight="800" fill="#6d28d9">Splitter</text>
    <text x="460" y="299" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="15" fill="#64748b">chunks</text>
  </g>
  <g filter="url(#s)">
    <rect x="620" y="230" width="200" height="95" rx="18" fill="#fff" stroke="#f59e0b" stroke-width="3"/>
    <text x="720" y="270" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="21" font-weight="800" fill="#b45309">Embeddings</text>
    <text x="720" y="299" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="15" fill="#64748b">vectors</text>
  </g>
  <g filter="url(#s)">
    <rect x="880" y="230" width="200" height="95" rx="18" fill="#fff" stroke="#8b5cf6" stroke-width="3"/>
    <text x="980" y="270" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="21" font-weight="800" fill="#6d28d9">Vector store</text>
    <text x="980" y="299" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="15" fill="#64748b">indexed chunks</text>
  </g>
  <path d="M300 278H360" fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#a)"/>
  <path d="M560 278H620" fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#a)"/>
  <path d="M820 278H880" fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#a)"/>

  <g filter="url(#s)">
    <rect x="90" y="450" width="190" height="100" rx="18" fill="#fff" stroke="#16a34a" stroke-width="3"/>
    <text x="185" y="491" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="21" font-weight="800" fill="#15803d">Question</text>
    <text x="185" y="520" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="15" fill="#64748b">user query</text>
  </g>
  <g filter="url(#s)">
    <rect x="355" y="450" width="210" height="100" rx="18" fill="#fff" stroke="#0f766e" stroke-width="3"/>
    <text x="460" y="491" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="21" font-weight="800" fill="#0f766e">Retriever</text>
    <text x="460" y="520" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="15" fill="#64748b">query → top-k docs</text>
  </g>
  <g filter="url(#s)">
    <rect x="735" y="425" width="395" height="150" rx="22" fill="#fff" stroke="#16a34a" stroke-width="3"/>
    <rect x="775" y="450" width="315" height="100" rx="14" fill="#dcfce7"/>
    <text x="932" y="490" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="19" font-weight="800" fill="#15803d">Chain: question + context</text>
    <text x="932" y="520" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="19" font-weight="800" fill="#15803d">→ answer</text>
  </g>
  <path d="M280 500H355" fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#a)"/>
  <path d="M980 325V405H460V450" fill="none" stroke="#8b5cf6" stroke-width="3" stroke-dasharray="9 8" marker-end="url(#purple)"/>
  <text x="720" y="387" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="14" font-weight="700" fill="#6d28d9">search this store</text>
  <path d="M565 500H650" fill="none" stroke="#64748b" stroke-width="3"/>
  <path d="M185 550V590H650V500" fill="none" stroke="#16a34a" stroke-width="3"/>
  <circle cx="650" cy="500" r="5" fill="#64748b"/>
  <path d="M650 500H735" fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#a)"/>
  <text x="650" y="462" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="13" font-weight="700" fill="#15803d">merge question</text>
  <text x="650" y="480" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="13" font-weight="700" fill="#15803d">+ retrieved context</text>
  <text x="600" y="635" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="19" font-weight="700" fill="#334155">LangChain keeps retrieval and generation composable without hiding the data flow.</text>
</svg>
