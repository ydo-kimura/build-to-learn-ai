<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" role="img" aria-label="Decision tree classifies animals with a sequence of yes or no questions">
  <defs>
    <marker id="arrow" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L8 4L0 8Z" fill="#64748b"/></marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="5" stdDeviation="5" flood-color="#0f172a" flood-opacity=".10"/></filter>
  </defs>
  <rect width="900" height="520" rx="28" fill="#f7f9fc"/>
  <rect x="32" y="28" width="836" height="76" rx="18" fill="#fff" stroke="#2563eb" stroke-width="2" filter="url(#shadow)"/>
  <text x="64" y="60" font-family="DejaVu Sans, sans-serif" font-size="14" letter-spacing="2" fill="#2563eb" font-weight="700">DECISION TREE</text>
  <text x="64" y="86" font-family="DejaVu Sans, sans-serif" font-size="22" fill="#0f172a" font-weight="700">Classify an animal by asking the best questions</text>
  <rect x="32" y="126" width="836" height="356" rx="22" fill="#fff" stroke="#dbe3ef" stroke-width="2"/>
  <text x="76" y="164" font-family="DejaVu Sans, sans-serif" font-size="13" fill="#64748b" font-weight="700">START WITH FEATURES</text>
  <g filter="url(#shadow)">
    <rect x="334" y="164" width="232" height="58" rx="16" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <text x="450" y="200" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-size="18" fill="#1d4ed8" font-weight="700">Feathers?</text>
    <rect x="122" y="346" width="190" height="58" rx="16" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="217" y="382" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-size="18" fill="#15803d" font-weight="700">Bird</text>
    <rect x="524" y="286" width="190" height="58" rx="16" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
    <text x="619" y="322" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-size="18" fill="#b45309" font-weight="700">Walks?</text>
    <rect x="482" y="412" width="158" height="48" rx="14" fill="#ede9fe" stroke="#8b5cf6" stroke-width="2"/>
    <text x="561" y="442" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-size="16" fill="#6d28d9" font-weight="700">Dog</text>
    <rect x="676" y="412" width="158" height="48" rx="14" fill="#fce7f3" stroke="#ec4899" stroke-width="2"/>
    <text x="755" y="442" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-size="16" fill="#be185d" font-weight="700">Cat</text>
  </g>
  <path d="M450 222V250H217V346" fill="none" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M450 222V250H619V286" fill="none" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M619 344V374H561V412" fill="none" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M619 344V374H755V412" fill="none" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrow)"/>
  <g font-family="DejaVu Sans, sans-serif" font-size="13" font-weight="700">
    <rect x="252" y="254" width="50" height="26" rx="13" fill="#dcfce7"/><text x="277" y="272" text-anchor="middle" fill="#15803d">YES</text>
    <rect x="500" y="254" width="46" height="26" rx="13" fill="#fee2e2"/><text x="523" y="272" text-anchor="middle" fill="#b91c1c">NO</text>
    <rect x="500" y="380" width="50" height="26" rx="13" fill="#dcfce7"/><text x="525" y="398" text-anchor="middle" fill="#15803d">YES</text>
    <rect x="704" y="380" width="46" height="26" rx="13" fill="#fee2e2"/><text x="727" y="398" text-anchor="middle" fill="#b91c1c">NO</text>
  </g>
  <text x="76" y="472" font-family="DejaVu Sans, sans-serif" font-size="14" fill="#64748b">Each split narrows the possibilities until a leaf gives the prediction.</text>
</svg>
