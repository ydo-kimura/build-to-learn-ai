<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-label="End-to-end image classification pipeline">
<defs><marker id="a" markerWidth="4" markerHeight="4" refX="8" refY="4" markerUnits="strokeWidth" viewBox="0 0 8 8" orient="auto"><path d="M0 0L8 4L0 8Z" fill="#64748b"/></marker><style>.t{font:700 24px sans-serif;fill:#fff}.h{font:700 17px sans-serif;fill:#0f172a}.s{font:500 13px sans-serif;fill:#64748b}.f{stroke:#64748b;stroke-width:3;fill:none;marker-end:url(#a)}</style></defs>
<rect width="960" height="540" rx="24" fill="#f8fafc"/><rect x="28" y="24" width="904" height="68" rx="16" fill="#0f172a"/><text x="64" y="67" class="t">Deep learning capstone pipeline</text><text x="896" y="66" text-anchor="end" class="s" fill="#cbd5e1">data → model → evidence</text>
<rect x="44" y="122" width="872" height="348" rx="20" fill="#fff" stroke="#e2e8f0" stroke-width="2"/><g><rect x="64" y="228" width="135" height="100" rx="15" fill="#dbeafe" stroke="#3b82f6" stroke-width="3"/><rect x="234" y="228" width="135" height="100" rx="15" fill="#ffedd5" stroke="#f97316" stroke-width="3"/><rect x="404" y="228" width="135" height="100" rx="15" fill="#e2e8f0" stroke="#64748b" stroke-width="3"/><rect x="574" y="228" width="135" height="100" rx="15" fill="#ede9fe" stroke="#8b5cf6" stroke-width="3"/><rect x="744" y="228" width="150" height="100" rx="15" fill="#dcfce7" stroke="#22c55e" stroke-width="3"/></g><g text-anchor="middle"><text x="132" y="266" class="h">Load</text><text x="132" y="292" class="s">dataset</text><text x="302" y="266" class="h">Augment</text><text x="302" y="292" class="s">train transform</text><text x="472" y="266" class="h">Train</text><text x="472" y="292" class="s">fine-tune</text><text x="642" y="266" class="h">Validate</text><text x="642" y="292" class="s">loss + accuracy</text><text x="819" y="266" class="h">Explain</text><text x="819" y="292" class="s">curves</text></g><path d="M200.5 278H232.5" class="f"/><path d="M370.5 278H402.5" class="f"/><path d="M540.5 278H572.5" class="f"/><path d="M710.5 278H742.5" class="f"/><text x="480" y="405" text-anchor="middle" class="s">A useful model is more than a high score: it needs a reproducible evaluation story.</text>
