<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-label="PyTorch training step from loss through backward gradients to optimizer update">
<defs><marker id="a" markerWidth="4" markerHeight="4" refX="8" refY="4" markerUnits="strokeWidth" viewBox="0 0 8 8" orient="auto"><path d="M0 0L8 4L0 8Z" fill="#64748b"/></marker><style>.t{font:700 24px sans-serif;fill:#fff}.h{font:700 16px sans-serif;fill:#0f172a}.s{font:500 13px sans-serif;fill:#64748b}.f{stroke:#64748b;stroke-width:3;fill:none;marker-end:url(#a)}</style></defs>
<rect width="960" height="540" rx="24" fill="#f8fafc"/><rect x="28" y="24" width="904" height="68" rx="16" fill="#0f172a"/><text x="64" y="67" class="t">One PyTorch training step</text><text x="896" y="66" text-anchor="end" class="s" fill="#cbd5e1">autograd + optimizer</text>
<rect x="44" y="122" width="872" height="348" rx="20" fill="#fff" stroke="#e2e8f0" stroke-width="2"/>
<rect x="85" y="228" width="130" height="92" rx="14" fill="#dbeafe" stroke="#3b82f6" stroke-width="3"/><rect x="245" y="228" width="130" height="92" rx="14" fill="#ede9fe" stroke="#8b5cf6" stroke-width="3"/><rect x="405" y="228" width="130" height="92" rx="14" fill="#fee2e2" stroke="#ef4444" stroke-width="3"/><rect x="565" y="228" width="130" height="92" rx="14" fill="#fef3c7" stroke="#f59e0b" stroke-width="3"/><rect x="725" y="228" width="150" height="92" rx="14" fill="#ffedd5" stroke="#f97316" stroke-width="3"/>
<g text-anchor="middle"><text x="150" y="264" class="h">Batch</text><text x="150" y="288" class="s">x, y</text><text x="310" y="264" class="h">Model</text><text x="310" y="288" class="s">ŷ = model(x)</text><text x="470" y="264" class="h">Loss</text><text x="470" y="288" class="s">loss(ŷ, y)</text><text x="630" y="258" class="h">Backward /</text><text x="630" y="280" class="h">Gradients</text><text x="630" y="302" class="s">loss.backward()</text><text x="800" y="258" class="h">Optimizer</text><text x="800" y="280" class="h">update</text><text x="800" y="302" class="s">optimizer.step()</text></g>
<path d="M215 274H245" class="f"/><path d="M375 274H405" class="f"/><path d="M535 274H565" class="f"/><path d="M695 274H725" class="f"/>
<rect x="150" y="156" width="660" height="34" rx="10" fill="#f1f5f9"/><text x="480" y="179" text-anchor="middle" class="s">Forward: batch → model → loss</text><text x="480" y="410" text-anchor="middle" class="s">Backward computes gradients, then the optimizer updates the model parameters.</text>
</svg>
