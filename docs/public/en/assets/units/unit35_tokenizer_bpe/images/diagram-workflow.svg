<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">Tokenizer runtime workflow</title>
  <desc id="desc">Text is tokenized into subword pieces, mapped to token IDs, and passed to the model input.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="7" stdDeviation="9" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0 0L9 4.5L0 9Z" fill="#64748b"/>
    </marker>
  </defs>

  <rect width="1200" height="560" rx="28" fill="#f8fafc"/>
  <g font-family="Inter, Arial, sans-serif">
    <text x="60" y="72" fill="#07122f" font-size="36" font-weight="800">Tokenizer at runtime</text>
    <text x="62" y="106" fill="#64748b" font-size="18">A fixed vocabulary turns text into the integer sequence a model reads.</text>

    <g filter="url(#shadow)">
      <rect x="45" y="190" width="230" height="190" rx="24" fill="#ffffff" stroke="#60a5fa" stroke-width="3"/>
      <rect x="345" y="190" width="230" height="190" rx="24" fill="#ffffff" stroke="#34d399" stroke-width="3"/>
      <rect x="645" y="190" width="230" height="190" rx="24" fill="#ffffff" stroke="#a78bfa" stroke-width="3"/>
      <rect x="945" y="190" width="210" height="190" rx="24" fill="#ffffff" stroke="#f59e0b" stroke-width="3"/>
    </g>

    <text x="160" y="234" fill="#1556c0" font-size="18" font-weight="800" text-anchor="middle">TEXT</text>
    <text x="160" y="304" fill="#07122f" font-family="SFMono-Regular, Consolas, monospace" font-size="30" font-weight="800" text-anchor="middle">playing</text>

    <text x="460" y="234" fill="#07824d" font-size="18" font-weight="800" text-anchor="middle">TOKENIZE</text>
    <rect x="374" y="270" width="98" height="64" rx="15" fill="#dbeafe" stroke="#60a5fa"/>
    <rect x="484" y="270" width="68" height="64" rx="15" fill="#d1fae5" stroke="#34d399"/>
    <text x="423" y="311" fill="#1556c0" font-family="SFMono-Regular, Consolas, monospace" font-size="22" font-weight="800" text-anchor="middle">play</text>
    <text x="518" y="311" fill="#07824d" font-family="SFMono-Regular, Consolas, monospace" font-size="22" font-weight="800" text-anchor="middle">ing</text>

    <text x="760" y="234" fill="#6d43c5" font-size="18" font-weight="800" text-anchor="middle">TOKEN IDS</text>
    <text x="760" y="305" fill="#07122f" font-family="SFMono-Regular, Consolas, monospace" font-size="28" font-weight="800" text-anchor="middle">[421, 287]</text>

    <text x="1050" y="234" fill="#b45309" font-size="18" font-weight="800" text-anchor="middle">MODEL INPUT</text>
    <g fill="#fef3c7" stroke="#f59e0b" stroke-width="2">
      <rect x="990" y="270" width="120" height="30" rx="8"/>
      <rect x="990" y="309" width="120" height="30" rx="8" opacity="0.76"/>
      <rect x="990" y="348" width="120" height="12" rx="6" opacity="0.5"/>
    </g>

    <path d="M275 285H344" fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
    <path d="M575 285H644" fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
    <path d="M875 285H944" fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>

    <rect x="350" y="445" width="500" height="58" rx="29" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="600" y="482" fill="#334155" font-size="20" font-weight="700" text-anchor="middle">text → tokens → IDs → model</text>
  </g>
</svg>
