<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 320" role="img" aria-label="Linear regression vs sigmoid for classification">
  <rect width="700" height="320" rx="12" fill="#f8fafc"/>
  <text x="130" y="28" font-family="DejaVu Sans, sans-serif" font-size="14" fill="#dc2626" font-weight="700">Linear (bad for classification)</text>
  <text x="450" y="28" font-family="DejaVu Sans, sans-serif" font-size="14" fill="#059669" font-weight="700">Sigmoid (0 to 1 probability)</text>
  <rect x="20" y="40" width="300" height="250" rx="8" fill="#fff" stroke="#e2e8f0"/>
  <line x1="50" y1="250" x2="290" y2="250" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="50" y1="250" x2="50" y2="70" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="0" y1="160" x2="320" y2="160" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="6 4"/>
  <line x1="60" y1="230" x2="280" y2="90" stroke="#dc2626" stroke-width="2.5"/>
  <circle cx="100" cy="210" r="6" fill="#3b82f6"/>
  <circle cx="140" cy="190" r="6" fill="#3b82f6"/>
  <circle cx="180" cy="170" r="6" fill="#3b82f6"/>
  <circle cx="220" cy="150" r="6" fill="#ef4444"/>
  <circle cx="260" cy="130" r="6" fill="#ef4444"/>
  <text x="70" y="268" font-family="DejaVu Sans, sans-serif" font-size="11" fill="#dc2626">Can output -0.2 or 1.5 (invalid)</text>
  <rect x="380" y="40" width="300" height="250" rx="8" fill="#fff" stroke="#e2e8f0"/>
  <line x1="410" y1="250" x2="650" y2="250" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="410" y1="250" x2="410" y2="70" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="380" y1="200" x2="680" y2="200" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="6 4"/>
  <line x1="380" y1="120" x2="680" y2="120" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="6 4"/>
  <text x="655" y="205" font-family="DejaVu Sans, sans-serif" font-size="10" fill="#94a3b8">0</text>
  <text x="655" y="125" font-family="DejaVu Sans, sans-serif" font-size="10" fill="#94a3b8">1</text>
  <path d="M430,248 C470,248 500,90 530,78 C560,66 610,72 630,78" fill="none" stroke="#7c3aed" stroke-width="3"/>
  <line x1="530" y1="78" x2="530" y2="250" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="536" y="95" font-family="DejaVu Sans, sans-serif" font-size="11" fill="#7c3aed" font-weight="600">0.8 -&gt; class 1</text>
  <circle cx="470" cy="220" r="6" fill="#3b82f6"/>
  <circle cx="510" cy="200" r="6" fill="#3b82f6"/>
  <circle cx="560" cy="100" r="6" fill="#ef4444"/>
  <circle cx="600" cy="85" r="6" fill="#ef4444"/>
  <text x="420" y="268" font-family="DejaVu Sans, sans-serif" font-size="11" fill="#059669">Probability in [0, 1] (valid)</text>
</svg>
