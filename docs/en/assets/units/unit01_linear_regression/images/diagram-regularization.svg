<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 300" role="img" aria-label="Overfitting vs regularization comparison">
  <rect width="720" height="300" rx="12" fill="#f8fafc"/>
  <text x="120" y="28" font-family="DejaVu Sans, sans-serif" font-size="14" fill="#dc2626" font-weight="700">Overfitting</text>
  <text x="480" y="28" font-family="DejaVu Sans, sans-serif" font-size="14" fill="#059669" font-weight="700">Regularized (Ridge / Lasso)</text>
  <rect x="20" y="40" width="320" height="240" rx="8" fill="#fff" stroke="#e2e8f0"/>
  <path d="M50,220 C90,210 110,80 150,100 S210,200 250,90 S310,60 290,70" fill="none" stroke="#dc2626" stroke-width="3"/>
  <circle cx="70" cy="200" r="5" fill="#3b82f6"/>
  <circle cx="110" cy="170" r="5" fill="#3b82f6"/>
  <circle cx="150" cy="140" r="5" fill="#3b82f6"/>
  <circle cx="190" cy="120" r="5" fill="#3b82f6"/>
  <circle cx="230" cy="100" r="5" fill="#3b82f6"/>
  <circle cx="270" cy="85" r="5" fill="#3b82f6"/>
  <text x="40" y="265" font-family="DejaVu Sans, sans-serif" font-size="11" fill="#64748b">Memorizes noise - poor on new data</text>
  <rect x="380" y="40" width="320" height="240" rx="8" fill="#fff" stroke="#e2e8f0"/>
  <line x1="410" y1="210" x2="670" y2="80" stroke="#059669" stroke-width="3"/>
  <circle cx="430" cy="195" r="5" fill="#3b82f6"/>
  <circle cx="470" cy="170" r="5" fill="#3b82f6"/>
  <circle cx="510" cy="145" r="5" fill="#3b82f6"/>
  <circle cx="550" cy="125" r="5" fill="#3b82f6"/>
  <circle cx="590" cy="105" r="5" fill="#3b82f6"/>
  <circle cx="630" cy="90" r="5" fill="#3b82f6"/>
  <rect x="560" y="180" width="120" height="70" rx="6" fill="#ecfdf5" stroke="#6ee7b7"/>
  <text x="572" y="202" font-family="DejaVu Sans, sans-serif" font-size="11" fill="#047857">Ridge: shrink coeffs</text>
  <text x="572" y="220" font-family="DejaVu Sans, sans-serif" font-size="11" fill="#047857">Lasso: zero out weak</text>
  <text x="572" y="238" font-family="DejaVu Sans, sans-serif" font-size="11" fill="#047857">features</text>
  <text x="400" y="265" font-family="DejaVu Sans, sans-serif" font-size="11" fill="#64748b">Simpler model - generalizes better</text>
</svg>
