<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 380" role="img" aria-label="Chain of prompts">
  <rect width="700" height="380" rx="12" fill="#f8fafc"/>
  <rect x="24" y="20" width="652" height="56" rx="8" fill="#fff" stroke="#3b82f6" stroke-width="2"/>
  <text x="350" y="54" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-size="20" fill="#3b82f6" font-weight="700">Chain of prompts</text>
  <rect x="24" y="88" width="652" height="252" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="1.5"/>
  <g transform="translate(90, 108)"><rect x="0" y="30" width="78" height="48" rx="8" fill="#3b82f622" stroke="#3b82f6" stroke-width="2"/>
<text x="39.0" y="57.85" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-size="11" fill="#3b82f6" font-weight="600">Prompt A</text>
<line x1="78" y1="54.0" x2="98" y2="54.0" stroke="#64748b" stroke-width="1.5"/><polygon points="98,54.0 92,51.0 92,57.0" fill="#64748b"/>
<rect x="106" y="30" width="78" height="48" rx="8" fill="#8b5cf622" stroke="#8b5cf6" stroke-width="2"/>
<text x="145.0" y="57.85" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-size="11" fill="#8b5cf6" font-weight="600">→ output</text>
<line x1="184" y1="54.0" x2="204" y2="54.0" stroke="#64748b" stroke-width="1.5"/><polygon points="204,54.0 198,51.0 198,57.0" fill="#64748b"/>
<rect x="212" y="30" width="92" height="48" rx="8" fill="#f59e0b22" stroke="#f59e0b" stroke-width="2"/>
<text x="258.0" y="57.85" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-size="11" fill="#f59e0b" font-weight="600">→ Prompt B</text>
<line x1="304" y1="54.0" x2="324" y2="54.0" stroke="#64748b" stroke-width="1.5"/><polygon points="324,54.0 318,51.0 318,57.0" fill="#64748b"/>
<rect x="332" y="30" width="72" height="48" rx="8" fill="#22c55e22" stroke="#22c55e" stroke-width="2"/>
<text x="368.0" y="57.85" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-size="11" fill="#22c55e" font-weight="600">→ final</text></g>
  <text x="350" y="352" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-size="12" fill="#64748b">Feed prior output into next prompt</text>
