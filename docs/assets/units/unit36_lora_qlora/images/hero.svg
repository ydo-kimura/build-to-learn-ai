<svg xmlns="http://www.w3.org/2000/svg" width="1536" height="1024" viewBox="0 0 1536 1024" role="img" aria-labelledby="title desc">
  <title id="title">LoRA and QLoRA</title>
  <desc id="desc">A large frozen base model is paired with a much smaller trainable LoRA adapter, with a small 4-bit QLoRA accent.</desc>
  <defs>
    <linearGradient id="baseCard" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eff6ff"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="adapterCard" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ecfdf5"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#0f172a" flood-opacity="0.1"/>
    </filter>
  </defs>

  <rect width="1536" height="1024" fill="#ffffff"/>
  <circle cx="1480" cy="68" r="150" fill="#f5f3ff" opacity="0.8"/>
  <circle cx="70" cy="970" r="150" fill="#ecfdf5" opacity="0.75"/>

  <g font-family="Inter, Arial, sans-serif">
    <text x="88" y="124" fill="#07122f" font-size="88" font-weight="800" letter-spacing="-2">LoRA &amp; QLoRA</text>
    <text x="92" y="177" fill="#52627a" font-size="29">A frozen model with a small trainable adapter</text>
    <rect x="1292" y="86" width="154" height="50" rx="25" fill="#eee9ff" stroke="#b9a7ef"/>
    <text x="1369" y="119" fill="#6340b2" font-size="18" font-weight="800" text-anchor="middle" letter-spacing="1">UNIT 36</text>

    <g filter="url(#shadow)">
      <rect x="142" y="316" width="540" height="402" rx="38" fill="url(#baseCard)" stroke="#60a5fa" stroke-width="3"/>
      <rect x="872" y="382" width="430" height="270" rx="34" fill="url(#adapterCard)" stroke="#34d399" stroke-width="3"/>
    </g>

    <rect x="190" y="364" width="240" height="44" rx="22" fill="#dbeafe"/>
    <text x="310" y="394" fill="#1556c0" font-size="18" font-weight="800" text-anchor="middle" letter-spacing="1">FROZEN BASE MODEL</text>
    <g opacity="0.98">
      <rect x="248" y="454" width="300" height="140" rx="24" fill="#bfdbfe" stroke="#60a5fa" stroke-width="2"/>
      <rect x="266" y="470" width="300" height="140" rx="24" fill="#dbeafe" stroke="#60a5fa" stroke-width="2"/>
      <rect x="284" y="486" width="300" height="140" rx="24" fill="#eff6ff" stroke="#60a5fa" stroke-width="2"/>
    </g>
    <text x="434" y="572" fill="#12346a" font-family="SFMono-Regular, Consolas, monospace" font-size="72" font-weight="800" text-anchor="middle">W</text>
    <rect x="190" y="648" width="214" height="42" rx="21" fill="#ffedd5" stroke="#fdba74"/>
    <text x="297" y="676" fill="#c65d16" font-size="16" font-weight="800" text-anchor="middle">QLoRA · 4-BIT BASE</text>

    <circle cx="777" cy="517" r="48" fill="#ffffff" stroke="#a78bfa" stroke-width="3"/>
    <path d="M754 517h46M777 494v46" stroke="#6d43c5" stroke-width="5" stroke-linecap="round"/>

    <rect x="916" y="424" width="218" height="44" rx="22" fill="#d1fae5"/>
    <text x="1025" y="454" fill="#07824d" font-size="18" font-weight="800" text-anchor="middle" letter-spacing="1">LORA ADAPTER</text>
    <rect x="930" y="500" width="112" height="92" rx="20" fill="#ecfdf5" stroke="#34d399" stroke-width="2"/>
    <rect x="1132" y="500" width="112" height="92" rx="20" fill="#ecfdf5" stroke="#34d399" stroke-width="2"/>
    <text x="986" y="558" fill="#07824d" font-family="SFMono-Regular, Consolas, monospace" font-size="46" font-weight="800" text-anchor="middle">A</text>
    <text x="1188" y="558" fill="#07824d" font-family="SFMono-Regular, Consolas, monospace" font-size="46" font-weight="800" text-anchor="middle">B</text>
    <path d="M1042 546H1132" stroke="#64748b" stroke-width="4" stroke-linecap="round"/>
    <rect x="996" y="596" width="182" height="42" rx="21" fill="#ffffff" stroke="#a7f3d0"/>
    <text x="1087" y="624" fill="#08633f" font-size="17" font-weight="800" text-anchor="middle">TRAINABLE</text>

    <text x="768" y="842" fill="#334155" font-family="SFMono-Regular, Consolas, monospace" font-size="40" font-weight="800" text-anchor="middle">W + ΔW</text>
  </g>
</svg>
