<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">LoRA structure</title>
  <desc id="desc">Frozen base weights W are combined with a trainable low-rank update B times A to form an adapted transformation.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="7" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.09"/>
    </filter>
    <marker id="arrow" markerWidth="4" markerHeight="4" refX="8" refY="4" orient="auto" markerUnits="strokeWidth" viewBox="0 0 8 8">
      <path d="M0 0L8 4L0 8Z" fill="#64748b"/>
    </marker>
  </defs>

  <rect width="1200" height="700" rx="28" fill="#f8fafc"/>
  <g font-family="Inter, Arial, sans-serif">
    <text x="60" y="74" fill="#07122f" font-size="38" font-weight="800">LoRA: add a low-rank update</text>
    <text x="62" y="108" fill="#64748b" font-size="18">Keep W fixed and learn only the small matrices A and B.</text>

    <g filter="url(#shadow)">
      <rect x="60" y="180" width="300" height="360" rx="28" fill="#ffffff" stroke="#60a5fa" stroke-width="3"/>
      <rect x="455" y="180" width="350" height="360" rx="28" fill="#ffffff" stroke="#34d399" stroke-width="3"/>
      <rect x="905" y="220" width="235" height="280" rx="28" fill="#ffffff" stroke="#a78bfa" stroke-width="3"/>
    </g>

    <rect x="96" y="218" width="170" height="38" rx="19" fill="#dbeafe"/>
    <text x="181" y="244" fill="#1556c0" font-size="16" font-weight="800" text-anchor="middle">FROZEN BASE</text>
    <g opacity="0.98">
      <rect x="112" y="300" width="180" height="100" rx="20" fill="#bfdbfe" stroke="#60a5fa" stroke-width="2"/>
      <rect x="126" y="314" width="180" height="100" rx="20" fill="#dbeafe" stroke="#60a5fa" stroke-width="2"/>
      <rect x="140" y="328" width="180" height="100" rx="20" fill="#eff6ff" stroke="#60a5fa" stroke-width="2"/>
    </g>
    <text x="230" y="395" fill="#12346a" font-family="SFMono-Regular, Consolas, monospace" font-size="58" font-weight="800" text-anchor="middle">W</text>
    <text x="210" y="482" fill="#52627a" font-size="17" font-weight="700" text-anchor="middle">no gradient update</text>

    <circle cx="407" cy="360" r="31" fill="#ffffff" stroke="#a78bfa" stroke-width="3"/>
    <path d="M391 360h32M407 344v32" stroke="#6d43c5" stroke-width="4" stroke-linecap="round"/>

    <rect x="492" y="218" width="216" height="38" rx="19" fill="#d1fae5"/>
    <text x="600" y="244" fill="#07824d" font-size="16" font-weight="800" text-anchor="middle">TRAINABLE ADAPTER</text>
    <rect x="505" y="308" width="92" height="112" rx="18" fill="#ecfdf5" stroke="#34d399" stroke-width="2"/>
    <rect x="663" y="308" width="92" height="112" rx="18" fill="#ecfdf5" stroke="#34d399" stroke-width="2"/>
    <text x="551" y="372" fill="#07824d" font-family="SFMono-Regular, Consolas, monospace" font-size="44" font-weight="800" text-anchor="middle">A</text>
    <text x="709" y="372" fill="#07824d" font-family="SFMono-Regular, Consolas, monospace" font-size="44" font-weight="800" text-anchor="middle">B</text>
    <path d="M597 364H663" fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
    <text x="630" y="466" fill="#08633f" font-family="SFMono-Regular, Consolas, monospace" font-size="25" font-weight="800" text-anchor="middle">ΔW = B × A</text>
    <text x="630" y="500" fill="#52627a" font-size="17" font-weight="700" text-anchor="middle">low-rank update</text>

    <path d="M805 360H905" fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
    <text x="847" y="334" fill="#52627a" font-size="15" font-weight="700" text-anchor="middle">combine</text>

    <rect x="942" y="258" width="162" height="38" rx="19" fill="#ede9fe"/>
    <text x="1023" y="284" fill="#6d43c5" font-size="16" font-weight="800" text-anchor="middle">ADAPTED</text>
    <text x="1023" y="380" fill="#07122f" font-family="SFMono-Regular, Consolas, monospace" font-size="38" font-weight="800" text-anchor="middle">W + BA</text>
    <text x="1023" y="430" fill="#52627a" font-size="17" font-weight="700" text-anchor="middle">task behavior</text>

    <rect x="338" y="600" width="524" height="58" rx="29" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="600" y="638" fill="#334155" font-size="20" font-weight="700" text-anchor="middle">Only A and B receive gradient updates.</text>
  </g>
</svg>
