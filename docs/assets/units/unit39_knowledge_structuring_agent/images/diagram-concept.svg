<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" role="img" aria-label="Knowledge extraction pipeline">
  <defs><marker id="arrow" markerWidth="4" markerHeight="4" refX="8" refY="4" markerUnits="strokeWidth" viewBox="0 0 8 8" orient="auto"><path d="M0 0L8 4L0 8Z" fill="#64748b"/></marker></defs>
  <rect width="900" height="500" rx="24" fill="#f8fafc"/>
  <text x="54" y="58" font-family="Arial,sans-serif" font-size="28" font-weight="700" fill="#0f2d6b">Knowledge Structuring Agent</text>
  <text x="54" y="88" font-family="Arial,sans-serif" font-size="15" fill="#64748b">Turn unstructured documents into validated records</text>
  <g font-family="Arial,sans-serif">
    <rect x="54" y="150" width="150" height="112" rx="18" fill="#fff7ed" stroke="#f59e0b" stroke-width="3"/>
    <text x="129" y="192" text-anchor="middle" font-size="18" font-weight="700" fill="#b45309">SOURCE</text><text x="129" y="222" text-anchor="middle" font-size="16" fill="#334155">PDF / email</text><text x="129" y="246" text-anchor="middle" font-size="13" fill="#64748b">raw text</text>
    <path d="M204 206H250" fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="250" y="150" width="150" height="112" rx="18" fill="#eff6ff" stroke="#3b82f6" stroke-width="3"/>
    <text x="325" y="192" text-anchor="middle" font-size="18" font-weight="700" fill="#1d4ed8">RETRIEVE</text><text x="325" y="222" text-anchor="middle" font-size="16" fill="#334155">relevant pages</text><text x="325" y="246" text-anchor="middle" font-size="13" fill="#64748b">focused context</text>
    <path d="M400 206H446" fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="446" y="150" width="150" height="112" rx="18" fill="#eef2ff" stroke="#6366f1" stroke-width="3"/>
    <text x="521" y="192" text-anchor="middle" font-size="18" font-weight="700" fill="#4338ca">EXTRACT</text><text x="521" y="222" text-anchor="middle" font-size="16" fill="#334155">LLM + schema</text><text x="521" y="246" text-anchor="middle" font-size="13" fill="#64748b">candidate JSON</text>
    <path d="M596 206H642" fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="642" y="150" width="204" height="112" rx="18" fill="#ecfdf5" stroke="#10b981" stroke-width="3"/>
    <text x="744" y="192" text-anchor="middle" font-size="18" font-weight="700" fill="#047857">VALIDATE</text><text x="744" y="222" text-anchor="middle" font-size="16" fill="#334155">Pydantic checks</text><text x="744" y="246" text-anchor="middle" font-size="13" fill="#64748b">save or escalate</text>
    <rect x="446" y="292" width="150" height="64" rx="16" fill="#fff" stroke="#cbd5e1" stroke-width="2"/><text x="521" y="319" text-anchor="middle" font-size="15" font-weight="700" fill="#475569">RETRY</text><text x="521" y="342" text-anchor="middle" font-size="13" fill="#64748b">fix extraction</text>
    <rect x="642" y="378" width="204" height="72" rx="16" fill="#fff" stroke="#10b981" stroke-width="2"/><text x="744" y="408" text-anchor="middle" font-size="15" font-weight="700" fill="#047857">STRUCTURED RECORD</text><text x="744" y="432" text-anchor="middle" font-size="13" fill="#64748b">trusted downstream input</text>
    <path d="M744 262V290" fill="none" stroke="#94a3b8" stroke-width="2.5"/>
    <circle cx="744" cy="290" r="5" fill="#94a3b8"/>
    <path d="M744 290H620V324H596" fill="none" stroke="#94a3b8" stroke-width="2.5" stroke-dasharray="7 7" marker-end="url(#arrow)"/>
    <text x="680" y="276" text-anchor="middle" font-size="12" fill="#64748b">validation failed</text>
    <path d="M521 292V262" fill="none" stroke="#94a3b8" stroke-width="2.5" stroke-dasharray="7 7" marker-end="url(#arrow)"/>
    <path d="M744 290V378" fill="none" stroke="#10b981" stroke-width="2.5" marker-end="url(#arrow)"/>
  </g>
</svg>
