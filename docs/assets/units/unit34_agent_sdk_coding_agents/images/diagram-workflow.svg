<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 430" role="img" aria-label="Safe coding agent workflow">
  <defs><marker id="arrow" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto"><path d="M0 0L7 3.5L0 7Z" fill="#64748b"/></marker><style>.title{font:700 23px Inter,Arial,sans-serif;fill:#172554}.label{font:700 15px Inter,Arial,sans-serif}.note{font:500 13px Inter,Arial,sans-serif;fill:#475569}.small{font:600 12px Inter,Arial,sans-serif;fill:#64748b}</style></defs>
  <rect width="760" height="430" rx="22" fill="#f8fafc"/><rect x="24" y="22" width="712" height="58" rx="15" fill="#fff" stroke="#2563eb" stroke-width="2"/><text x="380" y="59" text-anchor="middle" class="title">Safe autonomous development</text>
  <rect x="42" y="104" width="676" height="270" rx="20" fill="#fff" stroke="#dbe4f0" stroke-width="2"/><text x="72" y="137" class="small">GUARDRAILS AROUND EVERY ACTION</text>
  <rect x="72" y="190" width="138" height="78" rx="16" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/><text x="141" y="222" text-anchor="middle" class="label" fill="#1d4ed8">Propose diff</text><text x="141" y="246" text-anchor="middle" class="note">small change</text>
  <line x1="210" y1="229" x2="242" y2="229" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="242" y="190" width="138" height="78" rx="16" fill="#fff7ed" stroke="#f97316" stroke-width="2"/><text x="311" y="222" text-anchor="middle" class="label" fill="#c2410c">Policy check</text><text x="311" y="246" text-anchor="middle" class="note">allow / deny</text>
  <line x1="380" y1="229" x2="412" y2="229" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="412" y="190" width="138" height="78" rx="16" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="2"/><text x="481" y="222" text-anchor="middle" class="label" fill="#6d28d9">Run tests</text><text x="481" y="246" text-anchor="middle" class="note">sandboxed</text>
  <line x1="550" y1="229" x2="582" y2="229" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="582" y="190" width="104" height="78" rx="16" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/><text x="634" y="222" text-anchor="middle" class="label" fill="#047857">Review</text><text x="634" y="246" text-anchor="middle" class="note">merge gate</text>
  <text x="380" y="405" text-anchor="middle" class="note">Deny by default, isolate execution, and require review before high-impact changes.</text>
</svg>
