<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 430" role="img" aria-label="Coding agent development loop">
  <defs><marker id="arrow" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto"><path d="M0 0L7 3.5L0 7Z" fill="#64748b"/></marker><style>.title{font:700 23px Inter,Arial,sans-serif;fill:#172554}.label{font:700 16px Inter,Arial,sans-serif}.note{font:500 13px Inter,Arial,sans-serif;fill:#475569}.small{font:600 12px Inter,Arial,sans-serif;fill:#64748b}</style></defs>
  <rect width="760" height="430" rx="22" fill="#f8fafc"/><rect x="24" y="22" width="712" height="58" rx="15" fill="#fff" stroke="#2563eb" stroke-width="2"/><text x="380" y="59" text-anchor="middle" class="title">Coding Agent: inspect, edit, verify</text>
  <rect x="42" y="104" width="676" height="270" rx="20" fill="#fff" stroke="#dbe4f0" stroke-width="2"/><text x="72" y="137" class="small">SMALL, TESTED ITERATIONS</text>
  <g transform="translate(32 0)">
  <rect x="72" y="180" width="155" height="86" rx="16" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/><text x="149" y="214" text-anchor="middle" class="label" fill="#1d4ed8">Read repo</text><text x="149" y="239" text-anchor="middle" class="note">understand context</text>
  <line x1="227" y1="223" x2="270" y2="223" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="270" y="180" width="155" height="86" rx="16" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="2"/><text x="347" y="214" text-anchor="middle" class="label" fill="#6d28d9">Edit code</text><text x="347" y="239" text-anchor="middle" class="note">make a small diff</text>
  <line x1="425" y1="223" x2="468" y2="223" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="468" y="180" width="155" height="86" rx="16" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/><text x="545" y="214" text-anchor="middle" class="label" fill="#047857">Run tests</text><text x="545" y="239" text-anchor="middle" class="note">inspect feedback</text>
  <path d="M545 266V315H149V266" fill="none" stroke="#64748b" stroke-width="2" stroke-dasharray="7 6" marker-end="url(#arrow)"/><text x="347" y="340" text-anchor="middle" class="small">repeat with approval gates and a clean diff</text>
  </g>
  <text x="380" y="405" text-anchor="middle" class="note">The agent earns permission to change more by proving each small change works.</text>
</svg>
