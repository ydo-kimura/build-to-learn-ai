<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-label="Vector similarity search"><defs><marker id="a" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0 0L8 3L0 6Z" fill="#64748b"/></marker><filter id="s"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity=".10"/></filter></defs><rect width="1200" height="700" rx="28" fill="#f8fafc"/><text x="70" y="78" font-family="DejaVu Sans,sans-serif" font-size="32" font-weight="800" fill="#172554">Similarity search</text><text x="70" y="113" font-family="DejaVu Sans,sans-serif" font-size="17" fill="#64748b">A query vector is compared with stored vectors; the nearest chunks become context.</text><path d="M390 340H510" stroke="#64748b" stroke-width="4" marker-end="url(#a)"/><path d="M790 340H910" stroke="#64748b" stroke-width="4" marker-end="url(#a)"/><g filter="url(#s)"><rect x="70" y="190" width="320" height="300" rx="24" fill="#fff" stroke="#2563eb" stroke-width="3"/><text x="230" y="245" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="23" font-weight="800" fill="#1d4ed8">Question</text><rect x="120" y="285" width="220" height="70" rx="14" fill="#dbeafe"/><text x="230" y="328" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="19" fill="#1e40af">embed(query)</text><text x="230" y="415" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="16" fill="#64748b">one point in vector space</text></g><g filter="url(#s)"><rect x="510" y="150" width="280" height="380" rx="24" fill="#fff" stroke="#7c3aed" stroke-width="3"/><text x="650" y="210" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="23" font-weight="800" fill="#6d28d9">Vector space</text><g fill="#c4b5fd"><circle cx="585" cy="300" r="9"/><circle cx="625" cy="370" r="9"/><circle cx="705" cy="280" r="9"/><circle cx="735" cy="410" r="9"/><circle cx="680" cy="345" r="14" fill="#f59e0b"/></g><circle cx="680" cy="345" r="34"