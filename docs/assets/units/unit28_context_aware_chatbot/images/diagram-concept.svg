<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-label="Chatbot conversation memory"><defs><marker id="a" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0 0L8 3L0 6Z" fill="#64748b"/></marker><filter id="s"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity=".10"/></filter></defs><rect width="1200" height="700" rx="28" fill="#f8fafc"/><text x="70" y="78" font-family="DejaVu Sans,sans-serif" font-size="32" font-weight="800" fill="#172554">Memory gives the chatbot context</text><text x="70" y="113" font-family="DejaVu Sans,sans-serif" font-size="17" fill="#64748b">The API is stateless; the application sends the conversation history each turn.</text><path d="M300 340H390" stroke="#64748b" stroke-width="4" marker-end="url(#a)"/><path d="M810 340H900" stroke="#64748b" stroke-width="4" marker-end="url(#a)"/><g filter="url(#s)"><rect x="70" y="185" width="230" height="310" rx="24" fill="#fff" stroke="#2563eb" stroke-width="3"/><text x="185" y="245" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="23" font-weight="800" fill="#1d4ed8">Conversation</text><rect x="110" y="285" width="150" height="45" rx="12" fill="#dbeafe"/><text x="185" y="314" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="17" fill="#1e40af">User: hello</text><rect x="110" y="345" width="150" height="45" rx="12" fill="#ede9fe"/><text x="185" y="374" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="17" fill="#6d28d9">Bot: hi!</text><text x="185" y="440" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="16" fill="#64748b">append each turn</text></g><g filter="url(#s)"><rect x="390" y="150" width="420" height="380" rx="28" fill="#fff" stroke="#7c3aed" stroke-width="3"/><text x="600" y="215" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="24" font-weight="800" fill="#6d28d9">Session history</text><rect x="460" y="270" width="280" height="70" rx="14" fill="#ede9fe"/><text x="600" y="313" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="19" fill="#6d28d9">[user, assistant, …]</text><path d="M600 340V420" stroke="#7c3aed" stroke-width="3" marker-end="url(#a)"/><rect x="480" y="420" width="240" height="44" rx="12" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="2"/><text x="600" y="447" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="16" fill="#64748b">MessagesPlaceholder</text></g><g filter="url(#s)"><rect x="900" y="185" width="230" height="310" rx="24" fill="#fff" stroke="#16a34a" stroke-width="3"/><text x="1015" y="245" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="23" font-weight="800" fill="#15803d">LLM</text><rect x="940" y="285" width="150" height="45" rx="12" fill="#dcfce7"/><text x="1015" y="314" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="17" fill="#166534">history + new</text><text x="1015" y="390" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="16" fill="#64748b">answer with context</text></g><text x="600" y="620" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="19" font-weight="700" fill="#334155">Memory lives in the application layer, not inside the stateless API.</text></svg>
