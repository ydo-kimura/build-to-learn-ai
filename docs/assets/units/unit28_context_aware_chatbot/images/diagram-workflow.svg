<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-label="Context aware chat loop"><defs><marker id="a" markerWidth="4" markerHeight="4" refX="8" refY="4" markerUnits="strokeWidth" viewBox="0 0 8 8" orient="auto"><path d="M0 0L8 4L0 8Z" fill="#64748b"/></marker><filter id="s"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity=".10"/></filter></defs><rect width="1200" height="700" rx="28" fill="#f8fafc"/><text x="70" y="78" font-family="DejaVu Sans,sans-serif" font-size="32" font-weight="800" fill="#172554">One turn of a context-aware chat</text><text x="70" y="113" font-family="DejaVu Sans,sans-serif" font-size="17" fill="#64748b">Read history, call the model, then store the new user and assistant messages.</text><path d="M271.5 330H348.5" fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#a)"/><path d="M571.5 330H648.5" fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#a)"/><path d="M871.5 330H948.5" fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#a)"/><path d="M1040 446.5V565H170V446.5" fill="none" stroke="#16a34a" stroke-width="3" stroke-dasharray="10 10" marker-end="url(#a)"/><g filter="url(#s)"><rect x="70" y="215" width="200" height="230" rx="24" fill="#fff" stroke="#2563eb" stroke-width="3"/><text x="170" y="275" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="22" font-weight="800" fill="#1d4ed8">1 · User</text><rect x="110" y="320" width="120" height="62" rx="12" fill="#dbeafe"/><text x="170" y="359" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="18" fill="#1e40af">new input</text></g><g filter="url(#s)"><rect x="350" y="215" width="220" height="230" rx="24" fill="#fff" stroke="#7c3aed" stroke-width="3"/><text x="460" y="275" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="22" font-weight="800" fill="#6d28d9">2 · History</text><rect x="400" y="320" width="120" height="62" rx="12" fill="#ede9fe"/><text x="460" y="359" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="18" fill="#6d28d9">append</text></g><g filter="url(#s)"><rect x="650" y="215" width="220" height="230" rx="24" fill="#fff" stroke="#f59e0b" stroke-width="3"/><text x="760" y="275" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="22" font-weight="800" fill="#b45309">3 · API</text><rect x="700" y="320" width="120" height="62" rx="12" fill="#fef3c7"/><text x="760" y="359" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="18" fill="#92400e">send all</text></g><g filter="url(#s)"><rect x="950" y="215" width="180" height="230" rx="24" fill="#fff" stroke="#16a34a" stroke-width="3"/><text x="1040" y="275" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="22" font-weight="800" fill="#15803d">4 · Reply</text><rect x="980" y="320" width="120" height="62" rx="12" fill="#dcfce7"/><text x="1040" y="359" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="18" fill="#166534">store</text></g><text x="600" y="635" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="19" font-weight="700" fill="#334155">The next turn starts with the updated history.</text></svg>
