<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1536 860" role="img" aria-label="The sigmoid function turns any score into a probability between zero and one">
  <defs>
    <linearGradient id="bg" x2="1" y2="1"><stop stop-color="#f8fbff"/><stop offset="1" stop-color="#eef2ff"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#172554" flood-opacity=".12"/></filter>
    <marker id="arrow" markerWidth="4" markerHeight="4" refX="8" refY="4" markerUnits="strokeWidth" viewBox="0 0 8 8" orient="auto"><path d="M0 0L8 4L0 8Z" fill="#2563eb"/></marker>
  </defs>
  <rect width="1536" height="860" rx="28" fill="url(#bg)"/>
  <rect x="40" y="34" width="1456" height="112" rx="22" fill="#fff" filter="url(#shadow)"/>
  <rect x="70" y="63" width="190" height="54" rx="27" fill="#2563eb"/><text x="165" y="99" text-anchor="middle" font-family="Arial,sans-serif" font-size="22" font-weight="700" fill="#fff">CLASSIFIER</text>
  <text x="292" y="100" font-family="Arial,sans-serif" font-size="38" font-weight="700" fill="#172554">Turn a score into a probability</text>
  <text x="70" y="184" font-family="Arial,sans-serif" font-size="22" fill="#475569">The sigmoid function compresses an unbounded linear score into the interval 0–1.</text>
  <g filter="url(#shadow)">
    <rect x="40" y="224" width="620" height="570" rx="24" fill="#fff"/><rect x="40" y="224" width="620" height="74" rx="24" fill="#dc2626"/><rect x="40" y="274" width="620" height="24" fill="#dc2626"/>
    <text x="76" y="271" font-family="Arial,sans-serif" font-size="28" font-weight="700" fill="#fff">Linear score: unbounded</text>
    <rect x="150" y="312" width="350" height="42" rx="12" fill="#fef2f2"/><text x="325" y="340" text-anchor="middle" font-family="Arial,sans-serif" font-size="21" font-weight="700" fill="#b91c1c">not a valid probability</text>
    <path d="M120 694H590M120 694V370" stroke="#334155" stroke-width="4"/><path d="M120 694H590M120 532H590M120 370H590" stroke="#e2e8f0" stroke-width="2" stroke-dasharray="8 8"/><path d="M130 650L570 410" fill="none" stroke="#dc2626" stroke-width="8" stroke-linecap="round"/>
    <text x="104" y="538" text-anchor="end" font-family="Arial,sans-serif" font-size="22" fill="#b91c1c">1.0</text><text x="104" y="699" text-anchor="end" font-family="Arial,sans-serif" font-size="22" fill="#b91c1c">0</text><text x="350" y="748" text-anchor="middle" font-family="Arial,sans-serif" font-size="23" font-weight="700" fill="#b91c1c">may output −0.2 or 1.5</text>
  </g>
  <path d="M660 510H876" fill="none" stroke="#2563eb" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/><text x="768" y="474" text-anchor="middle" font-family="Arial,sans-serif" font-size="21" font-weight="700" fill="#2563eb">sigmoid</text>
  <g filter="url(#shadow)">
    <rect x="876" y="224" width="620" height="570" rx="24" fill="#fff"/><rect x="876" y="224" width="620" height="74" rx="24" fill="#0f766e"/><rect x="876" y="274" width="620" height="24" fill="#0f766e"/>
    <text x="912" y="271" font-family="Arial,sans-serif" font-size="28" font-weight="700" fill="#fff">Sigmoid: bounded output</text>
    <rect x="1020" y="312" width="330" height="42" rx="12" fill="#ecfdf5"/><text x="1185" y="340" text-anchor="middle" font-family="Arial,sans-serif" font-size="21" font-weight="700" fill="#0f766e">probability in [0, 1]</text>
    <path d="M956 694H1425M956 694V370" stroke="#334155" stroke-width="4"/><path d="M956 532H1425M956 370H1425" stroke="#e2e8f0" stroke-width="2" stroke-dasharray="8 8"/><path d="M970 674 C1060 674 1124 669 1158 612 C1177 581 1180 548 1185 532 C1190 516 1194 483 1212 451 C1242 397 1310 378 1410 378" fill="none" stroke="#0f766e" stroke-width="9" stroke-linecap="round"/>
    <text x="940" y="538" text-anchor="end" font-family="Arial,sans-serif" font-size="22" fill="#0f766e">0.5</text><text x="940" y="378" text-anchor="end" font-family="Arial,sans-serif" font-size="22" fill="#0f766e">1.0</text><text x="1190" y="748" text-anchor="middle" font-family="Arial,sans-serif" font-size="23" font-weight="700" fill="#0f766e">0.8 → class 1  ·  0.2 → class 0</text>
  </g>
</svg>
