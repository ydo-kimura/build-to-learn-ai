<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" role="img" aria-labelledby="title desc">
  <title id="title">Text to TF-IDF features</title><desc id="desc">A four-step pipeline from raw text through preprocessing and TF-IDF to a sparse feature vector.</desc>
  <defs><marker id="a" markerWidth="4" markerHeight="4" refX="8" refY="4" markerUnits="strokeWidth" viewBox="0 0 8 8" orient="auto"><path d="M0 0L8 4L0 8Z" fill="#64748b"/></marker></defs>
  <rect width="900" height="520" rx="24" fill="#f8fafc"/><rect x="32" y="28" width="836" height="72" rx="16" fill="#fff" stroke="#2563eb" stroke-width="3"/>
  <text x="64" y="74" font-family="DejaVu Sans,sans-serif" font-size="28" font-weight="700" fill="#172554">From text to useful features</text><text x="838" y="73" text-anchor="end" font-family="DejaVu Sans,sans-serif" font-size="16" fill="#2563eb">NLP preprocessing</text>
  <text x="450" y="138" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="16" fill="#64748b">Clean the document, then give each word a measurable importance</text>
  <g font-family="DejaVu Sans,sans-serif">
    <rect x="54" y="188" width="180" height="190" rx="18" fill="#fff" stroke="#94a3b8" stroke-width="2"/><circle cx="84" cy="220" r="18" fill="#dbeafe"/><text x="84" y="226" text-anchor="middle" font-size="16" font-weight="700" fill="#1d4ed8">1</text><text x="110" y="226" font-size="18" font-weight="700" fill="#172554">Raw text</text><rect x="76" y="258" width="136" height="70" rx="10" fill="#f1f5f9"/><text x="90" y="284" font-size="15" fill="#334155">The model learns</text><text x="90" y="307" font-size="15" fill="#334155">from documents.</text><text x="76" y="352" font-size="14" fill="#64748b">sentences</text>
    <line x1="234" y1="283" x2="276" y2="283" stroke="#64748b" stroke-width="3" marker-end="url(#a)"/>
    <rect x="276" y="188" width="180" height="190" rx="18" fill="#fff" stroke="#3b82f6" stroke-width="2"/><circle cx="306" cy="220" r="18" fill="#dbeafe"/><text x="306" y="226" text-anchor="middle" font-size="16" font-weight="700" fill="#1d4ed8">2</text><text x="332" y="226" font-size="18" font-weight="700" fill="#172554">Normalize</text><g font-size="14" fill="#1d4ed8"><rect x="300" y="258" width="132" height="28" rx="8" fill="#dbeafe"/><text x="366" y="277" text-anchor="middle">lowercase</text><rect x="300" y="296" width="132" height="28" rx="8" fill="#e0e7ff"/><text x="366" y="315" text-anchor="middle">remove noise</text></g><text x="300" y="352" font-size="14" fill="#64748b">clean tokens</text>
    <line x1="456" y1="283" x2="498" y2="283" stroke="#64748b" stroke-width="3" marker-end="url(#a)"/>
    <rect x="498" y="188" width="180" height="190" rx="18" fill="#fff" stroke="#7c3aed" stroke-width="2"/><circle cx="528" cy="220" r="18" fill="#ede9fe"/><text x="528" y="226" text-anchor="middle" font-size="16" font-weight="700" fill="#6d28d9">3</text><text x="554" y="226" font-size="18" font-weight="700" fill="#172554">TF-IDF</text><text x="528" y="270" font-size="16" fill="#6d28d9">TF × IDF</text><text x="528" y="301" font-size="14" fill="#475569">frequent here</text><text x="528" y="324" font-size="14" fill="#475569">rare overall</text><text x="528" y="352" font-size="14" fill="#64748b">importance score</text>
    <line x1="678" y1="283" x2="720" y2="283" stroke="#64748b" stroke-width="3" marker-end="url(#a)"/>
    <rect x="720" y="188" width="126" height="190" rx="18" fill="#fff" stroke="#16a34a" stroke-width="2"/><circle cx="750" cy="220" r="18" fill="#dcfce7"/><text x="750" y="226" text-anchor="middle" font-size="16" font-weight="700" fill="#15803d">4</text><text x="776" y="226" font-size="17" font-weight="700" fill="#172554">Vector</text><g fill="#2563eb"><rect x="750" y="260" width="70" height="14" rx="4"/><rect x="750" y="284" width="32" height="14" rx="4"/><rect x="750" y="308" width="55" height="14" rx="4"/></g><text x="750" y="352" font-size="14" fill="#64748b">sparse input</text>
  </g><rect x="54" y="420" width="792" height="54" rx="14" fill="#eff6ff"/><text x="450" y="454" text-anchor="middle" font-family="DejaVu Sans,sans-serif" font-size="17" font-weight="600" fill="#1e40af">The output is numeric, so a classifier can learn from text.</text>
</svg>
