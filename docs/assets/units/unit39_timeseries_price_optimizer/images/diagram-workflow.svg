<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" role="img" aria-label="Constrained dynamic pricing workflow">
  <defs><marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 Z" fill="#64748b"/></marker></defs>
  <rect width="900" height="500" rx="24" fill="#f8fafc"/><text x="54" y="58" font-family="Arial,sans-serif" font-size="28" font-weight="700" fill="#4c1d95">Constrained Dynamic Pricing</text><text x="54" y="88" font-family="Arial,sans-serif" font-size="15" fill="#64748b">Predict demand, then choose the best feasible price</text>
  <g font-family="Arial,sans-serif">
    <rect x="54" y="162" width="176" height="106" rx="18" fill="#eff6ff" stroke="#3b82f6" stroke-width="3"/><text x="142" y="200" text-anchor="middle" font-size="18" font-weight="700" fill="#1d4ed8">DEMAND DATA</text><text x="142" y="232" text-anchor="middle" font-size="15" fill="#334155">price · promo · season</text><text x="142" y="254" text-anchor="middle" font-size="13" fill="#64748b">historical observations</text>
    <line x1="230" y1="215" x2="280" y2="215" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="280" y="162" width="176" height="106" rx="18" fill="#eef2ff" stroke="#6366f1" stroke-width="3"/><text x="368" y="200" text-anchor="middle" font-size="18" font-weight="700" fill="#4338ca">MODEL</text><text x="368" y="232" text-anchor="middle" font-size="15" fill="#334155">predict demand</text><text x="368" y="254" text-anchor="middle" font-size="13" fill="#64748b">with uncertainty</text>
    <line x1="456" y1="215" x2="506" y2="215" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="506" y="162" width="176" height="106" rx="18" fill="#fff7ed" stroke="#f59e0b" stroke-width="3"/><text x="594" y="200" text-anchor="middle" font-size="18" font-weight="700" fill="#b45309">CANDIDATES</text><text x="594" y="232" text-anchor="middle" font-size="15" fill="#334155">price range</text><text x="594" y="254" text-anchor="middle" font-size="13" fill="#64748b">business constraints</text>
    <line x1="682" y1="215" x2="732" y2="215" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="732" y="162" width="114" height="106" rx="18" fill="#ecfdf5" stroke="#10b981" stroke-width="3"/><text x="789" y="200" text-anchor="middle" font-size="18" font-weight="700" fill="#047857">OPTIMUM</text><text x="789" y="232" text-anchor="middle" font-size="15" fill="#334155">max revenue</text><text x="789" y="254" text-anchor="middle" font-size="13" fill="#64748b">safe price</text>
    <rect x="186" y="344" width="528" height="70" rx="18" fill="#fff" stroke="#cbd5e1" stroke-width="2"/><text x="450" y="374" text-anchor="middle" font-size="16" font-weight="700" fill="#475569">Optimize inside a business-approved price boundary</text><text x="450" y="398" text-anchor="middle" font-size="13" fill="#64748b">Never trust an unconstrained extrapolation</text>
  </g>
</svg>
