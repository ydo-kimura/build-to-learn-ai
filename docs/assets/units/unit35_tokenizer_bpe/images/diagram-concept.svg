<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">How BPE builds subword tokens</title>
  <desc id="desc">Characters are grouped by repeated frequent-pair merges, producing reusable vocabulary tokens.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="7" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.09"/>
    </filter>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0 0L9 4.5L0 9Z" fill="#64748b"/>
    </marker>
  </defs>

  <rect width="1200" height="700" rx="28" fill="#f8fafc"/>
  <g font-family="Inter, Arial, sans-serif">
    <text x="60" y="74" fill="#07122f" font-size="38" font-weight="800">How BPE builds subwords</text>
    <text x="62" y="108" fill="#64748b" font-size="18">Repeated frequent-pair merges grow a reusable vocabulary.</text>

    <g filter="url(#shadow)">
      <rect x="60" y="160" width="310" height="390" rx="26" fill="#ffffff" stroke="#60a5fa" stroke-width="3"/>
      <rect x="445" y="160" width="310" height="390" rx="26" fill="#ffffff" stroke="#34d399" stroke-width="3"/>
      <rect x="830" y="160" width="310" height="390" rx="26" fill="#ffffff" stroke="#a78bfa" stroke-width="3"/>
    </g>

    <circle cx="104" cy="204" r="22" fill="#1769e0"/>
    <text x="104" y="212" fill="#ffffff" font-size="20" font-weight="800" text-anchor="middle">1</text>
    <text x="140" y="212" fill="#12346a" font-size="24" font-weight="800">Characters</text>
    <text x="94" y="258" fill="#64748b" font-size="17">Start with small units</text>
    <g fill="#eff6ff" stroke="#60a5fa" stroke-width="2">
      <rect x="88" y="310" width="46" height="62" rx="12"/><rect x="142" y="310" width="46" height="62" rx="12"/>
      <rect x="196" y="310" width="46" height="62" rx="12"/><rect x="250" y="310" width="46" height="62" rx="12"/>
      <rect x="304" y="310" width="46" height="62" rx="12"/>
      <rect x="115" y="388" width="46" height="62" rx="12"/><rect x="169" y="388" width="46" height="62" rx="12"/>
    </g>
    <g fill="#1556c0" font-family="SFMono-Regular, Consolas, monospace" font-size="24" font-weight="800" text-anchor="middle">
      <text x="111" y="349">p</text><text x="165" y="349">l</text><text x="219" y="349">a</text><text x="273" y="349">y</text><text x="327" y="349">i</text>
      <text x="138" y="427">n</text><text x="192" y="427">g</text>
    </g>

    <circle cx="489" cy="204" r="22" fill="#0b9b60"/>
    <text x="489" y="212" fill="#ffffff" font-size="20" font-weight="800" text-anchor="middle">2</text>
    <text x="525" y="212" fill="#08633f" font-size="24" font-weight="800">Frequent merge</text>
    <text x="479" y="258" fill="#64748b" font-size="17">Combine a common neighbor pair</text>
    <rect x="486" y="310" width="92" height="68" rx="16" fill="#ecfdf5" stroke="#34d399" stroke-width="2"/>
    <rect x="622" y="310" width="92" height="68" rx="16" fill="#ecfdf5" stroke="#34d399" stroke-width="2"/>
    <text x="532" y="353" fill="#07824d" font-family="SFMono-Regular, Consolas, monospace" font-size="28" font-weight="800" text-anchor="middle">pl</text>
    <text x="668" y="353" fill="#07824d" font-family="SFMono-Regular, Consolas, monospace" font-size="28" font-weight="800" text-anchor="middle">ay</text>
    <text x="600" y="353" fill="#64748b" font-size="28" font-weight="700" text-anchor="middle">+</text>
    <path d="M600 392V445" fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="530" y="446" width="140" height="68" rx="16" fill="#d1fae5" stroke="#10b981" stroke-width="2"/>
    <text x="600" y="489" fill="#047857" font-family="SFMono-Regular, Consolas, monospace" font-size="28" font-weight="800" text-anchor="middle">play</text>

    <circle cx="874" cy="204" r="22" fill="#7448c9"/>
    <text x="874" y="212" fill="#ffffff" font-size="20" font-weight="800" text-anchor="middle">3</text>
    <text x="910" y="212" fill="#5b399e" font-size="24" font-weight="800">Vocabulary</text>
    <text x="864" y="258" fill="#64748b" font-size="17">Reuse learned tokens</text>
    <rect x="872" y="310" width="110" height="72" rx="17" fill="#dbeafe" stroke="#60a5fa" stroke-width="2"/>
    <rect x="994" y="310" width="104" height="72" rx="17" fill="#d1fae5" stroke="#34d399" stroke-width="2"/>
    <text x="927" y="355" fill="#1556c0" font-family="SFMono-Regular, Consolas, monospace" font-size="27" font-weight="800" text-anchor="middle">play</text>
    <text x="1046" y="355" fill="#07824d" font-family="SFMono-Regular, Consolas, monospace" font-size="27" font-weight="800" text-anchor="middle">ing</text>
    <rect x="872" y="414" width="226" height="74" rx="17" fill="#f5f3ff" stroke="#a78bfa" stroke-width="2"/>
    <text x="985" y="446" fill="#6d43c5" font-size="16" font-weight="800" text-anchor="middle">TOKEN IDS</text>
    <text x="985" y="472" fill="#07122f" font-family="SFMono-Regular, Consolas, monospace" font-size="21" font-weight="800" text-anchor="middle">421 · 287</text>

    <path d="M370 355H444" fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
    <text x="407" y="331" fill="#52627a" font-size="15" font-weight="700" text-anchor="middle">count</text>
    <path d="M755 355H829" fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
    <text x="785" y="331" fill="#52627a" font-size="15" font-weight="700" text-anchor="middle">repeat</text>

    <rect x="330" y="600" width="540" height="58" rx="29" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="600" y="638" fill="#334155" font-size="20" font-weight="700" text-anchor="middle">characters → merges → reusable tokens</text>
  </g>
</svg>
