<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 430" role="img" aria-label="smolagents task execution workflow">
  <defs><marker id="arrow" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto"><path d="M0 0L7 3.5L0 7Z" fill="#64748b"/></marker><style>.title{font:700 23px Inter,Arial,sans-serif;fill:#172554}.label{font:700 16px Inter,Arial,sans-serif}.note{font:500 13px Inter,Arial,sans-serif;fill:#475569}.small{font:600 12px Inter,Arial,sans-serif;fill:#64748b}</style></defs>
  <rect width="760" height="430" rx="22" fill="#f8fafc"/><rect x="24" y="22" width="712" height="58" rx="15" fill="#fff" stroke="#2563eb" stroke-width="2"/><text x="380" y="59" text-anchor="middle" class="title">smolagents execution flow</text>
  <rect x="42" y="104" width="676" height="270" rx="20" fill="#fff" stroke="#dbe4f0" stroke-width="2"/><text x="72" y="137" class="small">FROM REQUEST TO ANSWER</text>
  <rect x="60" y="180" width="136" height="86" rx="16" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/><text x="128" y="214" text-anchor="middle" class="label" fill="#1d4ed8">Task</text><text x="128" y="239" text-anchor="middle" class="note">user request</text>
  <line x1="196" y1="223" x2="228" y2="223" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="228" y="180" width="136" height="86" rx="16" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="2"/><text x="296" y="214" text-anchor="middle" class="label" fill="#6d28d9">Plan</text><text x="296" y="239" text-anchor="middle" class="note">write code</text>
  <line x1="364" y1="223" x2="396" y2="223" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="396" y="180" width="136" height="86" rx="16" fill="#fff7ed" stroke="#f97316" stroke-width="2"/><text x="464" y="214" text-anchor="middle" class="label" fill="#c2410c">Execute</text><text x="464" y="239" text-anchor="middle" class="note">sandbox runtime</text>
  <line x1="532" y1="223" x2="564" y2="223" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="564" y="180" width="136" height="86" rx="16" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/><text x="632" y="214" text-anchor="middle" class="label" fill="#047857">Result</text><text x="632" y="239" text-anchor="middle" class="note">answer</text>
  <text x="380" y="405" text-anchor="middle" class="note">The sandbox turns generated code into a controlled, inspectable action.</text>
</svg>
