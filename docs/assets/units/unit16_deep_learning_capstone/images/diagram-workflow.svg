<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-label="Training and validation loss curves with early stopping at the best checkpoint">
<defs><style>.t{font:700 24px sans-serif;fill:#fff}.h{font:700 17px sans-serif;fill:#0f172a}.s{font:500 14px sans-serif;fill:#64748b}</style></defs>
<rect width="960" height="540" rx="24" fill="#f8fafc"/><rect x="28" y="24" width="904" height="68" rx="16" fill="#0f172a"/><text x="64" y="67" class="t">Monitor train / validation loss</text><text x="896" y="66" text-anchor="end" class="s" fill="#cbd5e1">stop at the best checkpoint</text>
<rect x="44" y="122" width="872" height="348" rx="20" fill="#fff" stroke="#e2e8f0" stroke-width="2"/><line x1="130" y1="394" x2="810" y2="394" stroke="#94a3b8" stroke-width="2"/><line x1="130" y1="190" x2="130" y2="394" stroke="#94a3b8" stroke-width="2"/><path d="M150 210C270 250 350 290 470 325S650 350 790 360" fill="none" stroke="#3b82f6" stroke-width="4"/><path d="M150 220C260 260 360 300 470 335S570 320 650 275S730 225 790 210" fill="none" stroke="#f97316" stroke-width="4"/><line x1="480" y1="194" x2="480" y2="394" stroke="#22c55e" stroke-width="3" stroke-dasharray="8 8"/><circle cx="480" cy="335" r="9" fill="#22c55e"/><rect x="382" y="146" width="196" height="42" rx="12" fill="#dcfce7"/><text x="480" y="173" text-anchor="middle" class="h">best checkpoint</text><g><rect x="810" y="175" width="96" height="44" rx="12" fill="#dbeafe"/><text x="858" y="203" text-anchor="middle" class="h">train loss</text><rect x="810" y="225" width="96" height="44" rx="12" fill="#ffedd5"/><text x="858" y="253" text-anchor="middle" class="h">val loss</text></g><text x="108" y="300" text-anchor="middle" transform="rotate(-90 108 300)" class="s">loss</text><text x="790" y="422" text-anchor="middle" class="s">epoch</text><text x="480" y="452" text-anchor="middle" class="s">When validation loss rises while train loss falls, overfitting has begun.</text>
</svg>
