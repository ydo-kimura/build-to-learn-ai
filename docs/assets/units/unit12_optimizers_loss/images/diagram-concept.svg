<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-label="Choosing a loss function for regression or classification">
<defs><marker id="a" markerWidth="12" markerHeight="12" refX="12" refY="6" orient="auto" markerUnits="userSpaceOnUse"><path d="M0 0L12 6L0 12Z" fill="#64748b"/></marker><style>.t{font:700 24px sans-serif;fill:#fff}.h{font:700 19px sans-serif;fill:#0f172a}.s{font:500 14px sans-serif;fill:#64748b}.f{stroke:#64748b;stroke-width:3;fill:none;marker-end:url(#a)}</style></defs>
<rect width="960" height="540" rx="24" fill="#f8fafc"/><rect x="28" y="24" width="904" height="68" rx="16" fill="#0f172a"/><text x="64" y="67" class="t">Loss function = what “wrong” means</text><text x="896" y="66" text-anchor="end" class="s" fill="#cbd5e1">match the task to the metric</text>
<rect x="44" y="122" width="872" height="348" rx="20" fill="#fff" stroke="#e2e8f0" stroke-width="2"/><rect x="392" y="154" width="176" height="54" rx="14" fill="#f1f5f9"/><text x="480" y="188" text-anchor="middle" class="h">prediction − target</text>
<path d="M480 208V226" fill="none" stroke="#64748b" stroke-width="3"/><circle cx="480" cy="226" r="5" fill="#64748b"/><path d="M480 226H260V250" class="f"/><path d="M480 226H700V250" class="f"/>
<rect x="90" y="250" width="340" height="146" rx="18" fill="#dbeafe" stroke="#3b82f6" stroke-width="3"/><rect x="530" y="250" width="340" height="146" rx="18" fill="#fee2e2" stroke="#ef4444" stroke-width="3"/>
<g text-anchor="middle"><text x="260" y="292" class="h">Regression → MSE</text><text x="260" y="323" class="s">continuous value</text><text x="260" y="350" class="s">penalizes squared distance</text><text x="700" y="292" class="h">Classification → Cross Entropy</text><text x="700" y="323" class="s">class probability / logits</text><text x="700" y="350" class="s">penalizes wrong confidence</text></g>
<rect x="178" y="424" width="604" height="30" rx="10" fill="#eff6ff"/><text x="480" y="445" text-anchor="middle" class="s">The loss supplies the signal that the optimizer minimizes.</text>
