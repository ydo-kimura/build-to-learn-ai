<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">Three practical uses branch from a PCA representation</title>
  <desc id="desc">PCA turns many raw features into a compact representation, which can branch into visualization, faster computation, or denoising.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#f8fbff"/><stop offset="1" stop-color="#f5f3ff"/></linearGradient>
    <marker id="flow-arrow" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 1L7 4L0 7" fill="none" stroke="#2563eb" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#1e3a8a" flood-opacity=".12"/></filter>
  </defs>
  <rect width="1200" height="650" rx="28" fill="url(#bg)"/>
  <text x="60" y="68" fill="#0f172a" font-family="Inter,Arial,sans-serif" font-size="36" font-weight="800">Why reduce dimensions?</text>
  <text x="60" y="102" fill="#64748b" font-family="Inter,Arial,sans-serif" font-size="20">PCA creates one compact representation, then the use depends on the goal.</text>
  <g filter="url(#shadow)">
    <rect x="55" y="180" width="230" height="300" rx="24" fill="#fff"/>
    <rect x="330" y="220" width="200" height="220" rx="24" fill="#0f3c9e"/>
    <rect x="600" y="145" width="235" height="150" rx="24" fill="#fff"/>
    <rect x="895" y="145" width="250" height="150" rx="24" fill="#fff"/>
    <rect x="600" y="365" width="235" height="150" rx="24" fill="#fff"/>
    <rect x="895" y="365" width="250" height="150" rx="24" fill="#0f3c9e"/>
  </g>
  <g font-family="Inter,Arial,sans-serif">
    <rect x="82" y="207" width="135" height="30" rx="15" fill="#dbeafe"/><text x="149" y="228" text-anchor="middle" fill="#1d4ed8" font-size="18" font-weight="800">INPUT</text>
    <text x="82" y="276" fill="#0f172a" font-size="26" font-weight="800">Raw features</text>
    <text x="82" y="309" fill="#64748b" font-size="18">Many dimensions</text>
    <g transform="translate(90 350)" fill="#2563eb" opacity=".88"><circle cx="0" cy="28" r="6"/><circle cx="25" cy="5" r="6"/><circle cx="50" cy="38" r="6"/><circle cx="75" cy="15" r="6"/><circle cx="100" cy="46" r="6"/><circle cx="125" cy="22" r="6"/><circle cx="150" cy="52" r="6"/></g>
    <text x="170" y="445" text-anchor="middle" fill="#1d4ed8" font-size="18" font-weight="700">30 features</text>

    <text x="430" y="272" text-anchor="middle" fill="#bfdbfe" font-size="18" font-weight="800" letter-spacing="2">PCA</text>
    <text x="430" y="319" text-anchor="middle" fill="#fff" font-size="27" font-weight="800">Compact</text>
    <text x="430" y="353" text-anchor="middle" fill="#fff" font-size="27" font-weight="800">representation</text>
    <text x="430" y="397" text-anchor="middle" fill="#dbeafe" font-size="18">PC1 + PC2</text>

    <circle cx="180" cy="330" r="0" fill="none"/>
    <path d="M285 330 H320" fill="none" stroke="#2563eb" stroke-width="3" marker-end="url(#flow-arrow)"/>
    <path d="M540 290 C570 255 585 225 595 220" fill="none" stroke="#2563eb" stroke-width="3" marker-end="url(#flow-arrow)"/>
    <path d="M540 330 C660 280 805 225 890 220" fill="none" stroke="#2563eb" stroke-width="3" marker-end="url(#flow-arrow)"/>
    <path d="M540 375 C570 410 585 435 595 440" fill="none" stroke="#2563eb" stroke-width="3" marker-end="url(#flow-arrow)"/>

    <circle cx="640" cy="184" r="28" fill="#dbeafe"/><path d="M624 200 L640 180 L656 200 M628 193 H652" fill="none" stroke="#2563eb" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/><text x="705" y="191" text-anchor="middle" fill="#0f172a" font-size="24" font-weight="800">Visualize</text><text x="717" y="225" text-anchor="middle" fill="#64748b" font-size="18">Plot in 2D or 3D</text><text x="717" y="253" text-anchor="middle" fill="#1d4ed8" font-size="18" font-weight="700">clusters &amp; outliers</text>
    <circle cx="935" cy="184" r="28" fill="#ede9fe"/><path d="M920 198 H950 M923 189 H947 M926 180 H944" stroke="#7c3aed" stroke-width="5" stroke-linecap="round"/><text x="1015" y="191" text-anchor="middle" fill="#0f172a" font-size="24" font-weight="800">Speed up</text><text x="1020" y="225" text-anchor="middle" fill="#64748b" font-size="18">Fewer features</text><text x="1020" y="253" text-anchor="middle" fill="#7c3aed" font-size="18" font-weight="700">less compute</text>
    <circle cx="640" cy="404" r="28" fill="#dcfce7"/><path d="M624 404 L634 414 L657 390" fill="none" stroke="#16a34a" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/><text x="705" y="411" text-anchor="middle" fill="#0f172a" font-size="24" font-weight="800">Denoise</text><text x="717" y="445" text-anchor="middle" fill="#64748b" font-size="18">Keep dominant</text><text x="717" y="473" text-anchor="middle" fill="#15803d" font-size="18" font-weight="700">directions; drop noise</text>

    <text x="1020" y="410" text-anchor="middle" fill="#bfdbfe" font-size="18" font-weight="800" letter-spacing="2">CHOOSE BY GOAL</text><text x="1020" y="456" text-anchor="middle" fill="#fff" font-size="26" font-weight="800">Same PCA output,</text><text x="1020" y="488" text-anchor="middle" fill="#fff" font-size="26" font-weight="800">different uses</text>
  </g>
</svg>
