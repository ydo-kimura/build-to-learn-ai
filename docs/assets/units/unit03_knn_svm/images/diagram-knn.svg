<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1536 860" role="img" aria-label="K-nearest neighbors classifies a new point by majority vote among its three closest neighbors">
  <defs><linearGradient id="bg" x2="1" y2="1"><stop stop-color="#f8fbff"/><stop offset="1" stop-color="#eef2ff"/></linearGradient><linearGradient id="blue"><stop stop-color="#2563eb"/><stop offset="1" stop-color="#4f46e5"/></linearGradient><filter id="shadow"><feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#172554" flood-opacity=".12"/></filter></defs>
  <rect width="1536" height="860" rx="28" fill="url(#bg)"/><rect x="40" y="34" width="1456" height="112" rx="22" fill="#fff" filter="url(#shadow)"/><rect x="70" y="63" width="165" height="54" rx="27" fill="url(#blue)"/><text x="152" y="99" text-anchor="middle" font-family="Arial,sans-serif" font-size="22" font-weight="700" fill="#fff">K-NN</text><text x="267" y="100" font-family="Arial,sans-serif" font-size="38" font-weight="700" fill="#172554">Classify by the closest neighbors</text><text x="70" y="184" font-family="Arial,sans-serif" font-size="22" fill="#475569">K-NN stores the examples, finds the nearest K points, and lets their majority vote decide the new point’s class.</text>
  <g filter="url(#shadow)"><rect x="40" y="224" width="1060" height="570" rx="24" fill="#fff"/><rect x="40" y="224" width="1060" height="74" rx="24" fill="url(#blue)"/><rect x="40" y="274" width="1060" height="24" fill="url(#blue)"/><text x="76" y="271" font-family="Arial,sans-serif" font-size="28" font-weight="700" fill="#fff">1. Find the 3 nearest points</text><path d="M150 700H1020M150 700V350" stroke="#334155" stroke-width="4"/><path d="M150 580H1020M150 460H1020M360 350V700M570 350V700M780 350V700" stroke="#e2e8f0" stroke-width="2"/><g fill="#2563eb" stroke="#fff" stroke-width="5"><circle cx="290" cy="450" r="15"/><circle cx="350" cy="575" r="15"/><circle cx="420" cy="500" r="15"/><circle cx="830" cy="415" r="15"/><circle cx="900" cy="550" r="15"/></g><g fill="#f97316" stroke="#fff" stroke-width="5"><circle cx="780" cy="640" r="15"/><circle cx="950" cy="450" r="15"/><circle cx="690" cy="390" r="15"/></g><circle cx="570" cy="500" r="70" fill="#eff6ff" fill-opacity=".72" stroke="#2563eb" stroke-width="5" stroke-dasharray="12 10"/><circle cx="570" cy="500" r="20" fill="#fff" stroke="#1d4ed8" stroke-width="5"/><text x="570" y="507" text-anchor="middle" font-family="Arial,sans-serif" font-size="21" font-weight="700" fill="#1d4ed8">?</text><path d="M570 500L420 500M570 500L350 575M570 500L290 450" stroke="#2563eb" stroke-width="3" stroke-dasharray="8 8"/><text x="570" y="750" text-anchor="middle" font-family="Arial,sans-serif" font-size="23" font-weight="700" fill="#1d4ed8">distance decides who gets a vote</text><text x="270" y="390" font-family="Arial,sans-serif" font-size="22" font-weight="700" fill="#1d4ed8">Sports</text><text x="840" y="690" font-family="Arial,sans-serif" font-size="22" font-weight="700" fill="#c2410c">Culture</text></g>
  <g filter="url(#shadow)"><rect x="1140" y="224" width="356" height="570" rx="24" fill="#fff"/><rect x="1140" y="224" width="356" height="74" rx="24" fill="#0f766e"/><rect x="1140" y="274" width="356" height="24" fill="#0f766e"/><text x="1176" y="271" font-family="Arial,sans-serif" font-size="28" font-weight="700" fill="#fff">2. Majority vote</text><rect x="1190" y="380" width="256" height="70" rx="14" fill="#dbeafe"/><text x="1318" y="425" text-anchor="middle" font-family="Arial,sans-serif" font-size="24" font-weight="700" fill="#1d4ed8">Sports × 3</text><rect x="1190" y="480" width="256" height="70" rx="14" fill="#ffedd5"/><text x="1318" y="525" text-anchor="middle" font-family="Arial,sans-serif" font-size="24" font-weight="700" fill="#c2410c">Culture × 0</text><circle cx="1318" cy="655" r="56" fill="#ecfdf5" stroke="#14b8a6" stroke-width="5"/><path d="M1288 655L1308 675L1350 625" fill="none" stroke="#0f766e" stroke-width="11" stroke-linecap="round" stroke-linejoin="round"/><text x="1318" y="742" text-anchor="middle" font-family="Arial,sans-serif" font-size="22" font-weight="700" fill="#0f766e">predict Sports</text></g>
</svg>
