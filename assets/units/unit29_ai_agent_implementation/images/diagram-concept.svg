<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 320" role="img" aria-label="ReAct loop">
  <rect width="700" height="320" rx="12" fill="#f8fafc"/>
  <rect x="24" y="20" width="652" height="52" rx="8" fill="#fff" stroke="#3b82f6" stroke-width="2"/>
  <text x="350" y="52" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-size="20" fill="#3b82f6" font-weight="700">ReAct loop</text>
  <rect x="24" y="84" width="652" height="212" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="1.5"/>
  <g transform="translate(40, 100)"><rect x="40" y="40" width="90" height="36" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
<text x="85" y="64" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-size="12" fill="#1d4ed8" font-weight="700">Thought</text>
<line x1="130" y1="58" x2="170" y2="58" stroke="#64748b" stroke-width="2"/><polygon points="170,58 164,55 164,61" fill="#64748b"/>
<rect x="170" y="40" width="90" height="36" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
<text x="215" y="64" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-size="12" fill="#b45309" font-weight="700">Action</text>
<line x1="260" y1="58" x2="300" y2="58" stroke="#64748b" stroke-width="2"/><polygon points="300,58 294,55 294,61" fill="#64748b"/>
<rect x="300" y="40" width="110" height="36" rx="6" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
<text x="355" y="64" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-size="11" fill="#15803d" font-weight="700">Observation</text>
<text x="220" y="100" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-size="11" fill="#64748b">↺ repeat until done</text></g>
  <text x="350" y="296" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-size="13" fill="#64748b">Thought → Action → Observation → repeat</text>
</svg>