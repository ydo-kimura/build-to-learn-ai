<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 320" role="img" aria-label="End-to-end ML pipeline">
  <rect width="700" height="320" rx="12" fill="#f8fafc"/>
  <rect x="24" y="20" width="652" height="52" rx="8" fill="#fff" stroke="#3b82f6" stroke-width="2"/>
  <text x="350" y="52" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-size="20" fill="#3b82f6" font-weight="700">End-to-end ML pipeline</text>
  <rect x="24" y="84" width="652" height="212" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="1.5"/>
  <g transform="translate(40, 100)"><rect x="0" y="50" width="84" height="44" rx="8" fill="#3b82f622" stroke="#3b82f6" stroke-width="2"/>
<text x="42.0" y="78" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-size="11" fill="#3b82f6" font-weight="600">Load</text>
<line x1="84" y1="72" x2="112" y2="72" stroke="#64748b" stroke-width="1.5"/><polygon points="112,72 106,69 106,75" fill="#64748b"/>
<rect x="120" y="50" width="84" height="44" rx="8" fill="#8b5cf622" stroke="#8b5cf6" stroke-width="2"/>
<text x="162.0" y="78" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-size="11" fill="#8b5cf6" font-weight="600">Clean</text>
<line x1="204" y1="72" x2="232" y2="72" stroke="#64748b" stroke-width="1.5"/><polygon points="232,72 226,69 226,75" fill="#64748b"/>
<rect x="240" y="50" width="84" height="44" rx="8" fill="#f59e0b22" stroke="#f59e0b" stroke-width="2"/>
<text x="282.0" y="78" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-size="11" fill="#f59e0b" font-weight="600">Split</text>
<line x1="324" y1="72" x2="352" y2="72" stroke="#64748b" stroke-width="1.5"/><polygon points="352,72 346,69 346,75" fill="#64748b"/>
<rect x="360" y="50" width="84" height="44" rx="8" fill="#22c55e22" stroke="#22c55e" stroke-width="2"/>
<text x="402.0" y="78" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-size="11" fill="#22c55e" font-weight="600">Train</text>
<line x1="444" y1="72" x2="472" y2="72" stroke="#64748b" stroke-width="1.5"/><polygon points="472,72 466,69 466,75" fill="#64748b"/>
<rect x="480" y="50" width="84" height="44" rx="8" fill="#ec489922" stroke="#ec4899" stroke-width="2"/>
<text x="522.0" y="78" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-size="11" fill="#ec4899" font-weight="600">Eval</text></g>
  <text x="350" y="296" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-size="13" fill="#64748b">Load → clean → split → model → tune</text>
</svg>