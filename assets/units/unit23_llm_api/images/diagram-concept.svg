<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 320" role="img" aria-label="API call flow">
  <rect width="700" height="320" rx="12" fill="#f8fafc"/>
  <rect x="24" y="20" width="652" height="52" rx="8" fill="#fff" stroke="#3b82f6" stroke-width="2"/>
  <text x="350" y="52" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-size="20" fill="#3b82f6" font-weight="700">API call flow</text>
  <rect x="24" y="84" width="652" height="212" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="1.5"/>
  <g transform="translate(40, 100)"><rect x="20" y="45" width="100" height="50" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
<text x="70" y="75" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-size="11" fill="#1d4ed8" font-weight="700">Your App</text>
<line x1="120" y1="70" x2="180" y2="70" stroke="#64748b" stroke-width="2"/><polygon points="180,70 174,67 174,73" fill="#64748b"/>
<rect x="180" y="35" width="130" height="70" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
<text x="245" y="62" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-size="11" fill="#b45309" font-weight="700">POST /chat</text>
<text x="245" y="82" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-size="10" fill="#64748b">completions</text>
<line x1="310" y1="70" x2="370" y2="70" stroke="#64748b" stroke-width="2"/><polygon points="370,70 364,67 364,73" fill="#64748b"/>
<rect x="370" y="45" width="100" height="50" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
<text x="420" y="75" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-size="12" fill="#15803d" font-weight="700">JSON</text></g>
  <text x="350" y="296" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-size="13" fill="#64748b">system + user messages → model → completion</text>
