<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 300" role="img" aria-label="Random Forest (parallel) vs XGBoost (sequential + fast)">
  <rect width="720" height="300" rx="12" fill="#f8fafc"/>
  <text x="130" y="28" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-size="15" fill="#dc2626" font-weight="700">Random Forest (parallel)</text>
  <text x="540" y="28" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-size="15" fill="#059669" font-weight="700">XGBoost (sequential + fast)</text>
  <rect x="20" y="40" width="320" height="220" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="1.5"/>
  <g transform="translate(30, 50)"><circle cx="60" cy="40" r="16" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
<line x1="60" y1="56" x2="48" y2="80" stroke="#3b82f6" stroke-width="1.5"/>
<line x1="60" y1="56" x2="72" y2="80" stroke="#3b82f6" stroke-width="1.5"/>
<text x="60" y="95" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-size="10" fill="#64748b">T1</text>
<circle cx="180" cy="40" r="16" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
<line x1="180" y1="56" x2="168" y2="80" stroke="#3b82f6" stroke-width="1.5"/>
<line x1="180" y1="56" x2="192" y2="80" stroke="#3b82f6" stroke-width="1.5"/>
<text x="180" y="95" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-size="10" fill="#64748b">T2</text>
<circle cx="300" cy="40" r="16" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
<line x1="300" y1="56" x2="288" y2="80" stroke="#3b82f6" stroke-width="1.5"/>
<line x1="300" y1="56" x2="312" y2="80" stroke="#3b82f6" stroke-width="1.5"/>
<text x="300" y="95" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-size="10" fill="#64748b">T3</text>
<circle cx="420" cy="40" r="16" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
<line x1="420" y1="56" x2="408" y2="80" stroke="#3b82f6" stroke-width="1.5"/>
<line x1="420" y1="56" x2="432" y2="80" stroke="#3b82f6" stroke-width="1.5"/>
<text x="420" y="95" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-size="10" fill="#64748b">T4</text>
<rect x="120" y="110" width="280" height="32" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
<text x="260" y="132" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-size="13" fill="#1d4ed8" font-weight="700">Parallel vote</text></g>
  <rect x="380" y="40" width="320" height="220" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="1.5"/>
  <g transform="translate(390, 50)"><rect x="20" y="30" width="80" height="36" rx="6" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
<text x="60" y="54" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-size="10" fill="#b91c1c" font-weight="600">err +5m</text>
<line x1="100" y1="48" x2="140" y2="48" stroke="#64748b" stroke-width="2"/><polygon points="140,48 134,45 134,51" fill="#64748b"/>
<rect x="140" y="30" width="80" height="36" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
<text x="180" y="54" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-size="10" fill="#b45309" font-weight="600">fix -4m</text>
<line x1="220" y1="48" x2="260" y2="48" stroke="#64748b" stroke-width="2"/><polygon points="260,48 254,45 254,51" fill="#64748b"/>
<rect x="260" y="30" width="80" height="36" rx="6" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
<text x="300" y="54" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-size="10" fill="#15803d" font-weight="600">fix -1m</text>
<rect x="100" y="100" width="220" height="32" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
<text x="210" y="122" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-size="12" fill="#6d28d9" font-weight="700">Sequential correction</text></g>
  <text x="350" y="284" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-size="13" fill="#64748b">XGBoost: handles missing values, top tabular accuracy</text>
</svg>