<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 320" role="img" aria-label="Coding agent flow">
  <rect width="700" height="320" rx="12" fill="#f8fafc"/>
  <rect x="24" y="20" width="652" height="52" rx="8" fill="#fff" stroke="#3b82f6" stroke-width="2"/>
  <text x="350" y="52" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-size="20" fill="#3b82f6" font-weight="700">Coding agent flow</text>
  <rect x="24" y="84" width="652" height="212" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="1.5"/>
  <g transform="translate(40, 100)"><rect x="20" y="35" width="90" height="40" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
<text x="65" y="60" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-size="10" fill="#1d4ed8" font-weight="700">Read repo</text>
<line x1="110" y1="55" x2="155" y2="55" stroke="#64748b" stroke-width="2"/><polygon points="155,55 149,52 149,58" fill="#64748b"/>
<rect x="155" y="35" width="90" height="40" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
<text x="200" y="60" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-size="10" fill="#b45309" font-weight="700">Edit code</text>
<line x1="245" y1="55" x2="290" y2="55" stroke="#64748b" stroke-width="2"/><polygon points="290,55 284,52 284,58" fill="#64748b"/>
<rect x="290" y="35" width="90" height="40" rx="6" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
<text x="335" y="60" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-size="10" fill="#15803d" font-weight="700">Run tests</text>
<text x="200" y="95" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-size="11" fill="#64748b">Small iterations</text></g>
  <text x="350" y="296" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-size="13" fill="#64748b">Read codebase → propose edits → run tests</text>
</svg>