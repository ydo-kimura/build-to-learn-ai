<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 300" role="img" aria-label="TF-IDF + ML vs Embeddings + NN">
  <rect width="720" height="300" rx="12" fill="#f8fafc"/>
  <text x="130" y="28" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-size="15" fill="#dc2626" font-weight="700">TF-IDF + ML</text>
  <text x="540" y="28" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-size="15" fill="#059669" font-weight="700">Embeddings + NN</text>
  <rect x="20" y="40" width="320" height="220" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="1.5"/>
  <g transform="translate(30, 50)"><text x="10" y="20" text-anchor="start" font-family="DejaVu Sans, sans-serif" font-size="11" fill="#64748b">the cat sat</text>
<line x1="100" y1="40" x2="150" y2="40" stroke="#64748b" stroke-width="2"/><polygon points="150,40 144,37 144,43" fill="#64748b"/>
<rect x="150" y="15" width="200" height="50" rx="4" fill="#fff" stroke="#e2e8f0" stroke-width="1.5"/>
<text x="170" y="30" text-anchor="start" font-family="DejaVu Sans, sans-serif" font-size="9" fill="#475569">cat</text>
<rect x="220" y="22" width="30" height="10" rx="2" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
<text x="170" y="44" text-anchor="start" font-family="DejaVu Sans, sans-serif" font-size="9" fill="#475569">sat</text>
<rect x="260" y="36" width="30" height="10" rx="2" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
<text x="170" y="58" text-anchor="start" font-family="DejaVu Sans, sans-serif" font-size="9" fill="#475569">mat</text>
<rect x="300" y="50" width="30" height="10" rx="2" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
<text x="170" y="75" text-anchor="start" font-family="DejaVu Sans, sans-serif" font-size="10" fill="#1d4ed8" font-weight="600">Sparse TF-IDF vector</text></g>
  <rect x="380" y="40" width="320" height="220" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="1.5"/>
  <g transform="translate(390, 50)"><rect x="20" y="30" width="80" height="80" rx="6" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
<text x="60" y="75" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-size="10" fill="#b91c1c" font-weight="600">one-hot</text>
<text x="60" y="55" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-size="10" fill="#64748b">sparse</text>
<line x1="105" y1="70" x2="155" y2="70" stroke="#64748b" stroke-width="2"/><polygon points="155,70 149,67 149,73" fill="#64748b"/>
<rect x="155" y="30" width="220" height="80" rx="6" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
<circle cx="190" cy="60" r="6" fill="#3b82f6"/>
<circle cx="230" cy="50" r="6" fill="#8b5cf6"/>
<circle cx="270" cy="70" r="6" fill="#ec4899"/>
<circle cx="310" cy="55" r="6" fill="#f59e0b"/>
<circle cx="350" cy="65" r="6" fill="#22c55e"/>
<text x="265" y="100" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-size="10" fill="#6d28d9" font-weight="600">Dense embedding space</text></g>
  <text x="350" y="284" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-size="13" fill="#64748b">Choose stack based on data size and task</text>
</svg>