<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 320" role="img" aria-label="Training loop">
  <rect width="700" height="320" rx="12" fill="#f8fafc"/>
  <rect x="24" y="20" width="652" height="52" rx="8" fill="#fff" stroke="#7c3aed" stroke-width="2"/>
  <text x="350" y="52" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-size="20" fill="#7c3aed" font-weight="700">Training loop</text>
  <rect x="24" y="84" width="652" height="212" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="1.5"/>
  <g transform="translate(40, 100)"><rect x="0" y="55" width="110" height="44" rx="8" fill="#3b82f622" stroke="#3b82f6" stroke-width="2"/>
<text x="55.0" y="83" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-size="11" fill="#3b82f6" font-weight="600">Forward</text>
<line x1="110" y1="77" x2="138" y2="77" stroke="#64748b" stroke-width="1.5"/><polygon points="138,77 132,74 132,80" fill="#64748b"/>
<rect x="146" y="55" width="110" height="44" rx="8" fill="#ef444422" stroke="#ef4444" stroke-width="2"/>
<text x="201.0" y="83" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-size="11" fill="#ef4444" font-weight="600">Loss</text>
<line x1="256" y1="77" x2="284" y2="77" stroke="#64748b" stroke-width="1.5"/><polygon points="284,77 278,74 278,80" fill="#64748b"/>
<rect x="292" y="55" width="110" height="44" rx="8" fill="#f59e0b22" stroke="#f59e0b" stroke-width="2"/>
<text x="347.0" y="83" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-size="11" fill="#f59e0b" font-weight="600">Backward</text>
<line x1="402" y1="77" x2="430" y2="77" stroke="#64748b" stroke-width="1.5"/><polygon points="430,77 424,74 424,80" fill="#64748b"/>
<rect x="438" y="55" width="110" height="44" rx="8" fill="#22c55e22" stroke="#22c55e" stroke-width="2"/>
<text x="493.0" y="83" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-size="11" fill="#22c55e" font-weight="600">Update</text></g>
  <text x="350" y="296" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-size="13" fill="#64748b">Compute loss, backprop gradients, update weights</text>
</svg>