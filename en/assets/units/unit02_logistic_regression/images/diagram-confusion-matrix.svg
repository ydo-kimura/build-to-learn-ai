<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 360" role="img" aria-label="Confusion matrix and classification metrics">
  <rect width="560" height="360" rx="12" fill="#f8fafc"/>
  <text x="180" y="30" font-family="system-ui,sans-serif" font-size="15" fill="#1e293b" font-weight="700">Confusion Matrix</text>
  <text x="330" y="78" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#475569" font-weight="600">Predicted</text>
  <text x="330" y="98" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#64748b">Positive</text>
  <text x="430" y="98" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#64748b">Negative</text>
  <text x="95" y="175" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#64748b" transform="rotate(-90 95 175)">Actual</text>
  <text x="120" y="145" font-family="system-ui,sans-serif" font-size="11" fill="#64748b">Pos</text>
  <text x="120" y="215" font-family="system-ui,sans-serif" font-size="11" fill="#64748b">Neg</text>
  <rect x="280" y="120" width="90" height="60" rx="6" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="325" y="148" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#15803d" font-weight="700">TP</text>
  <text x="325" y="166" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#166534">True Positive</text>
  <rect x="380" y="120" width="90" height="60" rx="6" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
  <text x="425" y="148" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#b91c1c" font-weight="700">FN</text>
  <text x="425" y="166" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#991b1b">False Negative</text>
  <rect x="280" y="190" width="90" height="60" rx="6" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
  <text x="325" y="218" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#b91c1c" font-weight="700">FP</text>
  <text x="325" y="236" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#991b1b">False Positive</text>
  <rect x="380" y="190" width="90" height="60" rx="6" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="425" y="218" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#15803d" font-weight="700">TN</text>
  <text x="425" y="236" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#166534">True Negative</text>
  <rect x="40" y="270" width="480" height="70" rx="8" fill="#fff" stroke="#e2e8f0"/>
  <text x="60" y="295" font-family="system-ui,sans-serif" font-size="12" fill="#7c3aed" font-weight="600">Precision = TP / (TP + FP)</text>
  <text x="60" y="318" font-family="system-ui,sans-serif" font-size="12" fill="#0891b2" font-weight="600">Recall = TP / (TP + FN)</text>
  <text x="300" y="295" font-family="system-ui,sans-serif" font-size="12" fill="#64748b">Fewer false alarms</text>
  <text x="300" y="318" font-family="system-ui,sans-serif" font-size="12" fill="#64748b">Fewer missed cases</text>
</svg>
